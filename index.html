<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERMINAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap">
<style>
/* fonts loaded via <link> in <head> for non-blocking render */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--bg1:#0a0a0a;--bg2:#0f0f0f;--bg3:#141414;--bg4:#1a1a1a;
  --border:#1e1e1e;--border2:#262626;--border3:#2e2e2e;
  --text:#cccccc;--text-dim:#707070;--text-mid:#a0a0a0;--text-bright:#f0f0f0;
  --green:#00c853;--red:#e53935;--amber:#ffab00;--blue:#1565c0;--cyan:#00acc1;
  --purple:#7b1fa2;--orange:#e65100;
  --font:'IBM Plex Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.45}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#222}

/* ── TICKER TAPE ── */
#ticker-tape{
  height:26px;background:#040404;border-bottom:1px solid #151515;
  overflow:hidden;white-space:nowrap;position:relative;
}
#ticker-inner{
  display:flex;align-items:center;
  position:absolute;top:0;left:0;height:100%;
  will-change:transform;
}
#ticker-inner:hover{animation-play-state:paused}
@keyframes tickerScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ti{display:inline-flex;align-items:center;margin:0 14px;font-size:11px;line-height:26px;letter-spacing:.4px;flex-shrink:0}
.ti-sym{color:#666;margin-right:5px}
.ti-px{color:#999;margin-right:4px}
.ti-up{color:#00c853}
.ti-dn{color:#e53935}
.ti-sep{color:#1e1e1e;margin:0 2px;flex-shrink:0}

/* ── TOPBAR ── */
#topbar{
  height:30px;background:var(--bg1);border-bottom:1px solid var(--border2);
  display:flex;align-items:center;padding:0 8px;gap:10px;z-index:2000;position:relative;
}
#logo{color:var(--amber);font-weight:600;font-size:12px;letter-spacing:3px;white-space:nowrap}
#cmdwrap{width:420px;flex-shrink:0;display:flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border2);padding:0 6px}
#cmdbar{
  flex:1;background:transparent;border:none;color:var(--text-bright);
  font-family:var(--font);font-size:12px;outline:none;caret-color:var(--amber);
}
#cmdbar::placeholder{color:var(--text-dim)}
#topright{display:flex;align-items:center;gap:10px}
#mktstrip-live{display:flex;align-items:center;font-size:10px;letter-spacing:.5px;white-space:nowrap;font-family:var(--font)}
#live-fetching-text{color:#cc8800;margin-left:10px}

/* ── SHORTCUT BAR ── */
#shortcuts{
  height:36px;background:#080808;border-bottom:1px solid #222;
  display:flex;align-items:center;padding:0 6px;gap:3px;z-index:1999;overflow:visible;
}
/* shared base for all panel buttons */
.scbtn-home,.scbtn-market,.scbtn-rates,.scbtn-macro,.scbtn-tool{
  border:1px solid transparent;
  font-family:var(--font);font-size:11px;font-weight:600;
  padding:0 11px;cursor:pointer;height:26px;white-space:nowrap;letter-spacing:.8px;
  border-radius:2px;flex:1;min-width:0;
  display:inline-flex;align-items:center;justify-content:center;
  transition:background .1s,color .1s,border-color .1s;
}
/* HOME — amber */
.scbtn-home{
  color:#d4950a;background:#1a1200;border-color:#3a2800;font-size:12px;font-weight:700;letter-spacing:1.2px;
}
.scbtn-home:hover{color:#ffbb33;background:#251900;border-color:#6a4800;}
/* Market — blue */
.scbtn-market{color:#7aabcc;background:#080e14;border-color:#1a3048;}
.scbtn-market:hover{color:#aad4f0;background:#0d1825;border-color:#2a5080;}
/* Rates — green */
.scbtn-rates{color:#5aaa7a;background:#070e0a;border-color:#163022;}
.scbtn-rates:hover{color:#88ddaa;background:#0c1a10;border-color:#2a6040;}
/* Macro/News — orange */
.scbtn-macro{color:#cc9944;background:#110d04;border-color:#3a2c0e;}
.scbtn-macro:hover{color:#ffcc66;background:#1c1508;border-color:#6a5020;}
/* Tools — cyan */
.scbtn-tool{color:#44a0bb;background:#06090d;border-color:#122030;}
.scbtn-tool:hover{color:#66ccee;background:#0b1520;border-color:#205070;}
/* divider between groups */
.sc-div{width:1px;background:#252525;margin:4px 3px;flex-shrink:0;height:20px;align-self:center;}
/* legacy .scbtn fallback (ACCESS button) */
.scbtn{background:#0a0a0a;border:1px solid #252525;color:#707070;font-family:var(--font);font-size:10px;padding:0 10px;cursor:pointer;height:26px;white-space:nowrap;letter-spacing:.5px;border-radius:2px;}
.scbtn:hover{color:var(--amber);background:#111;border-color:#444;}
.scbtn .k{display:none}
#sc-right{display:flex;align-items:center;gap:0;margin-left:6px;flex-shrink:0;}

/* ── WORKSPACE ── */
#loading-screen{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:#020202;z-index:99998;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;transition:opacity 0.6s ease;
  overflow:hidden;
}
#loading-screen.fade-out{opacity:0;}
#loading-screen.gone{display:none;}
/* Grid overlay */
#loading-screen::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,171,0,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,171,0,0.03) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}
.ld-logo{margin-bottom:24px;position:relative;display:flex;align-items:center;justify-content:center;animation:ldFadeIn 0.8s ease both}
.ld-bar-wrap{width:340px;height:2px;background:#111;margin-bottom:18px;overflow:hidden;position:relative;border-radius:1px}
.ld-bar{height:2px;background:linear-gradient(90deg,#996600,#ffab00,#ffdd88);width:0%;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);border-radius:1px;position:relative}
.ld-bar::after{content:'';position:absolute;top:0;right:0;width:40px;height:100%;background:linear-gradient(90deg,transparent,rgba(255,221,136,0.6));animation:ldShimmer 1.2s ease-in-out infinite}
.ld-bar-glow{position:absolute;top:-3px;right:-2px;width:6px;height:6px;background:#ffab00;border-radius:50%;box-shadow:0 0 8px 2px #ffab00;opacity:0;transition:opacity 0.3s}
.ld-status{font-size:9px;color:#555;letter-spacing:2px;height:14px;margin-bottom:44px;transition:opacity 0.3s ease;animation:ldFadeIn 0.6s 0.3s ease both}
.ld-stats{display:flex;gap:36px;margin-top:0;animation:ldFadeIn 0.6s 0.5s ease both}
.ld-stat{text-align:center}
.ld-stat-label{font-size:8px;color:#3a3a3a;letter-spacing:1.5px;margin-bottom:4px}
.ld-stat-val{font-size:10px;color:#3a3a3a;font-weight:600;letter-spacing:1px;transition:color 0.4s ease}
@keyframes ldFadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes ldShimmer{0%,100%{opacity:0}50%{opacity:1}}
#workspace{
  position:relative;width:100%;height:calc(100vh - 70px);
  background-color:#050608;
  background-image:
    linear-gradient(rgba(255,255,255,0.048) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.048) 1px, transparent 1px),
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
  background-position: -1px -1px, -1px -1px, -1px -1px, -1px -1px;
  overflow:hidden;
}


/* ── WELCOME ── */
#welcome{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;pointer-events:none;user-select:none;
}
#welcome .wt{font-size:22px;font-weight:600;color:#141414;letter-spacing:10px}
#welcome .ws{font-size:9px;color:#181818;letter-spacing:4px;margin-top:6px}
#welcome .wg{margin-top:20px;display:flex;flex-wrap:wrap;gap:4px;justify-content:center;max-width:600px}
#welcome .wc{background:transparent;border:1px solid #141414;color:#1e1e1e;font-family:var(--font);font-size:9px;padding:2px 8px}

/* ── WINDOWS ── */
.win{
  position:absolute;background:var(--bg1);border:1px solid var(--border2);
  display:flex;flex-direction:column;min-width:300px;min-height:180px;
}
.win.z-top{border-color:var(--border3)}
.win.win-fullscreen{
  position:fixed!important;top:0!important;left:0!important;
  width:100vw!important;height:100vh!important;
  z-index:9000!important;border:2px solid var(--border3)!important;
  border-radius:0;
}
.wh{
  height:28px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 8px;cursor:move;user-select:none;
  gap:6px;flex-shrink:0;
}
.wh-cmd{color:var(--amber);font-size:10px;font-weight:600;letter-spacing:1px}
.wh-title{color:var(--text-dim);font-size:10px}
.wh-ts{color:#555;font-size:9px;margin-left:auto}
.wh-close{
  width:20px;height:20px;background:#1a0a0a;border:1px solid #442222;
  color:#884444;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-left:4px;border-radius:2px;
}
.wh-close:hover{background:var(--red);color:#fff;border-color:var(--red)}
.wh-fs{
  width:20px;height:20px;background:#0a0a0a;border:1px solid #333;
  color:#555;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-left:2px;border-radius:2px;
}
.wh-fs:hover{background:#1a1a00;color:var(--amber);border-color:#cc8800}
.wh-refresh{
  width:20px;height:20px;background:#0a0a0a;border:1px solid #333;
  color:#444;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-left:2px;border-radius:2px;
}
.wh-refresh:hover{background:#001a0a;color:var(--green);border-color:#1a3a1a}
.wb{flex:1;overflow:auto;font-size:11px;padding:6px;position:relative}
.wb:has(.ptabs-container){overflow:hidden;padding:0}
.wr{position:absolute;bottom:0;right:0;width:10px;height:10px;cursor:se-resize;
    background:linear-gradient(135deg,transparent 50%,#222 50%)}


.ptabs-container{display:flex;flex-direction:column;height:100%}
.ptabs{display:flex;gap:0;border-bottom:2px solid #1a1a1a;flex-shrink:0;background:#050505}
.ptab{padding:5px 16px;font-size:10px;color:#686868;cursor:pointer;border-bottom:2px solid transparent;letter-spacing:.8px;white-space:nowrap;margin-bottom:-2px;transition:color .1s}
.ptab:hover{color:var(--amber);background:#0a0a0a}
.ptab.active{color:var(--amber);border-bottom-color:var(--amber);background:#080808}
.ptabs-body{flex:1;overflow:auto;min-height:0}
.psection{display:none}
.psection.active{display:block}

/* ── COMMON TABLE ── */
.t{width:100%;border-collapse:collapse;font-size:11px}
.t th{color:#c0c0c0;font-size:10px;font-weight:600;text-align:right;padding:2px 6px;
      border-bottom:1px solid var(--border);white-space:nowrap;letter-spacing:0.5px}
.t th:first-child{text-align:left}
.t td{font-size:11px;padding:3px 6px;border-bottom:1px solid #0d0d0d;text-align:right;white-space:nowrap;color:#c8c8c8}
.t td:first-child{text-align:left;color:var(--text-bright)}
.t tr:hover td{background:var(--bg2)}
.t .up{color:var(--green)}
.t .dn{color:var(--red)}
.t .neu{color:#aaa}
.t .hl{color:var(--amber)}
.t .w{color:var(--text-mid)}

/* Section label */
.sl{color:var(--amber);font-size:10px;font-weight:600;letter-spacing:1.5px;
    padding:4px 0 2px;border-bottom:1px solid #111;margin-bottom:2px}
.sl2{color:#686868;font-size:9px;letter-spacing:1px;padding:3px 0 2px;border-bottom:1px solid #0d0d0d;margin-bottom:1px}

/* Metric rows */
.mr{display:flex;gap:8px;padding:2px 0;font-size:11px;border-bottom:1px solid #0a0a0a}
.ml{color:var(--text-dim);flex:1}
.mv{color:var(--text-bright)}

/* Spreads footer */
.sf{display:flex;gap:14px;padding:3px 0;font-size:11px;border-top:1px solid var(--border);margin-top:3px;flex-wrap:wrap}
.si{display:flex;gap:5px}
.sil{color:#a0a0a0}
.siv{color:var(--amber);font-weight:600}

/* Regime badge */
.regime{display:inline-block;padding:1px 5px;font-size:9px;font-weight:600;letter-spacing:1px;border:1px solid}
.regime.normal{color:var(--green);border-color:#003300}
.regime.flat{color:var(--amber);border-color:#cc8800}
.regime.inverted{color:var(--red);border-color:#3a0000}

/* Toggle btns */
.tr-row{display:flex;gap:3px;margin-bottom:4px;flex-wrap:wrap}
.tbtn{background:var(--bg2);border:1px solid var(--border);color:var(--text-dim);
      font-family:var(--font);font-size:9px;padding:2px 6px;cursor:pointer}
.tbtn.active{color:var(--amber);border-color:#cc8800;background:#1a1000}
.tbtn:hover{color:var(--text)}

/* Heatmap cells */
.hm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;margin-top:2px}
.hm-cell{padding:6px 5px;border:1px solid var(--border);cursor:pointer;min-height:50px}
.hm-cell:hover{border-color:var(--border3)}
.hm-name{font-size:10px;color:var(--text-mid);margin-bottom:2px}
.hm-val{font-size:12px;font-weight:600}
.hm-sub{font-size:10px;color:var(--text-mid);margin-top:1px}

/* News items */

.news-item:hover 



.news-tag{font-size:9px;padding:0 4px;border:1px solid;font-weight:600;letter-spacing:0.5px}
.news-tag.macro{color:#00acc1;border-color:#00232a}
.news-tag.eq{color:#00c853;border-color:#003318}
.news-tag.energy{color:#ff8f00;border-color:#3a1f00}
.news-tag.credit{color:#aa00ff;border-color:#1e0033}
.news-tag.geo{color:#e53935;border-color:#3a0000}
.news-hl{font-size:11px;color:#d0d0d0;line-height:1.35}


/* Map */
.map-sidebar{width:190px;flex-shrink:0;display:flex;flex-direction:column;gap:3px;overflow-y:auto}

/* Calendar */
.cal-item{display:grid;grid-template-columns:50px 42px 14px 22px 1fr 52px 52px;gap:0;border-bottom:1px solid #0d0d0d;padding:1px 6px;align-items:center}
.cal-item>div{padding:3px 2px;font-size:10px;color:#b8b8b8}
.cal-hdr>div{font-size:9px;color:#808080;padding:2px 4px;border-bottom:1px solid var(--border);font-weight:600;letter-spacing:0.5px}
.cal-hdr{display:grid;grid-template-columns:55px 28px 1fr 60px 60px 60px}
.cal-miss{color:var(--red)}
.cal-beat{color:var(--green)}
.cal-inline{color:var(--text-mid)}
.cal-hi{background:#0d0d00}

/* Central bank */
.cb-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:4px}
.cb-card{background:var(--bg2);border:1px solid var(--border);padding:5px 6px}
.cb-name{color:var(--amber);font-size:9px;font-weight:600;margin-bottom:3px;letter-spacing:1px}

/* DES company */
.des-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.des-stat{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #0a0a0a;font-size:10px}
.des-label{color:#909090}
.des-val{color:var(--text-bright)}

/* Vol indicator */


/* Flash animation */
.flash{animation:fla 0.5s ease}
@keyframes fla{0%,100%{background:transparent}40%{background:rgba(255,171,0,0.06)}}

/* Vertical label */
.v-sep{width:1px;background:var(--border);margin:0 4px;flex-shrink:0}
/* Leaflet popup dark theme override */
.term-popup .leaflet-popup-content-wrapper{
  background:#0f0f0f;border:1px solid #262626;border-radius:0;
  box-shadow:0 4px 20px rgba(0,0,0,0.9);padding:0;
}
.term-popup .leaflet-popup-content{margin:8px 10px;color:#b8b8b8;font-family:'IBM Plex Mono',monospace;font-size:10px;line-height:1.5}
.term-popup .leaflet-popup-tip-container{display:none}
.term-popup .leaflet-popup-close-button{color:#444;font-size:14px;top:4px;right:6px}
.term-popup .leaflet-popup-close-button:hover{color:#ffab00}
.leaflet-container{background:#000;font-family:'IBM Plex Mono',monospace}
.leaflet-control-zoom a{background:#0f0f0f;color:#888;border:1px solid #222;border-radius:0;font-family:'IBM Plex Mono',monospace}
.leaflet-control-zoom a:hover{background:#1a1a1a;color:#ffab00}
.leaflet-bar{border:1px solid #1e1e1e;box-shadow:none;border-radius:0}

/* ── SEARCH TYPE BADGE ── */
#search-type-badge{
  font-size:8px;font-weight:600;letter-spacing:1px;padding:1px 5px;
  border:1px solid transparent;white-space:nowrap;transition:all .15s;
  min-width:54px;text-align:center;flex-shrink:0;
}
#search-type-badge.t-equity  {color:#00c853;border-color:#003318;background:#001a0a}
#search-type-badge.t-bond    {color:#00acc1;border-color:#00232a;background:#001318}
#search-type-badge.t-fx      {color:#ffab00;border-color:#cc8800;background:#1a1000}
#search-type-badge.t-macro   {color:#7b1fa2;border-color:#1e0033;background:#0d0018}
#search-type-badge.t-cmdty   {color:#e65100;border-color:#3a1400;background:#1a0800}
#search-type-badge.t-command {color:#b8b8b8;border-color:#2e2e2e;background:#111}
#search-type-badge.t-filing  {color:#e53935;border-color:#3a0000;background:#180000}
#search-type-badge.t-ambiguous{color:#888;border-color:#222;background:#0a0a0a}

/* ── AUTOCOMPLETE DROPDOWN ── */
#ac-drop{
  position:fixed;background:var(--bg2);border:1px solid var(--border3);
  z-index:9000;min-width:340px;max-width:540px;max-height:260px;overflow-y:auto;
  display:none;box-shadow:0 8px 32px rgba(0,0,0,.9);
}
.ac-item{
  display:flex;align-items:center;gap:8px;padding:4px 8px;cursor:pointer;
  border-bottom:1px solid #0d0d0d;
}
.ac-item:hover,.ac-item.ac-sel{background:var(--bg3)}
.ac-key{color:var(--amber);font-size:10px;font-weight:600;min-width:90px;flex-shrink:0}
.ac-label{color:var(--text);font-size:10px;flex:1}
.ac-meta{color:var(--text-mid);font-size:10px;white-space:nowrap}
.ac-badge{font-size:8px;font-weight:600;letter-spacing:.5px;padding:0 4px;border:1px solid;flex-shrink:0}
.ac-badge.equity  {color:#00c853;border-color:#003318}
.ac-badge.bond    {color:#00acc1;border-color:#00232a}
.ac-badge.fx      {color:#ffab00;border-color:#cc8800}
.ac-badge.macro   {color:#7b1fa2;border-color:#1e0033}
.ac-badge.cmdty   {color:#e65100;border-color:#3a1400}
.ac-badge.command {color:#888;border-color:#555}
.ac-badge.filing  {color:#e53935;border-color:#3a0000}
.ac-sep{padding:2px 8px;font-size:9px;color:#666;letter-spacing:1px;background:#050505;border-bottom:1px solid #0d0d0d}

/* ── SEARCH RESULTS WINDOW ── */
.sr-row{display:grid;grid-template-columns:100px 1fr 80px;gap:0;border-bottom:1px solid #0d0d0d;cursor:pointer}
.sr-row>div{padding:3px 6px;font-size:10px}
.sr-row:hover>div{background:var(--bg2)}
.sr-hdr>div{font-size:9px;color:#888;padding:2px 6px;border-bottom:1px solid var(--border)}
.no-match{padding:14px;text-align:center;color:#555;font-size:10px;letter-spacing:1px}


/* ── SCREENER ── */
#scrn-wrap{display:flex;flex-direction:column;height:100%;gap:0}
#scrn-filters{
  flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border2);
  padding:6px 8px;display:flex;flex-wrap:wrap;gap:6px;align-items:flex-end;
}
.scrn-fgroup{display:flex;flex-direction:column;gap:2px}
.scrn-flabel{font-size:10px;color:#a0a0a0;letter-spacing:.5px;font-weight:600}
.scrn-input{
  background:var(--bg3);border:1px solid var(--border2);color:var(--text-bright);
  font-family:var(--font);font-size:11px;padding:3px 6px;width:88px;outline:none;
}
.scrn-input:focus{border-color:#cc8800}
.scrn-select{
  background:var(--bg3);border:1px solid var(--border2);color:var(--text-bright);
  font-family:var(--font);font-size:11px;padding:3px 5px;width:110px;outline:none;
  -webkit-appearance:none;appearance:none;cursor:pointer;
}
.scrn-select:focus{border-color:#cc8800}
.scrn-btn{

  flex-shrink:0;padding:3px 8px;font-size:10px;color:var(--text-mid);

#scrn-table th{
  position:sticky;top:0;background:var(--bg2);font-size:10px;color:#909090;
  font-weight:600;padding:4px 6px;border-bottom:1px solid var(--border2);

// ═══════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════
const fmt = (v,d=2)=>v!=null?v.toFixed(d):'--';
function fmtC(v,d=2){
  if(v==null)return`<span class="neu">--</span>`;
  if(v>0)return`<span class="up">+${v.toFixed(d)}</span>`;
  if(v<0)return`<span class="dn">${v.toFixed(d)}</span>`;
  return`<span class="neu">0.${'0'.repeat(d)}</span>`;
}
function fmtCS(v,d=2){if(v>0)return`+${v.toFixed(d)}`;return v.toFixed(d);}
const getTs=()=>new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});

// ── Panel tab switcher ──
function switchTab(groupId, tabId){
  const container = document.getElementById('ptc-'+groupId);
  if(!container) return;
  container.querySelectorAll('.ptab').forEach(t=>t.classList.toggle('active', t.getAttribute('data-tab')===tabId));
  container.querySelectorAll('.psection').forEach(s=>s.classList.toggle('active', s.getAttribute('data-section')===tabId));
}
function buildTabs(groupId, tabs){
  // Build tab bar buttons
  const tabBar = tabs.map((t,i)=>
    `<div class="ptab${i===0?' active':''}" data-tab="${t.id}" onclick="switchTab('${groupId}','${t.id}')">${t.label}</div>`
  ).join('');
  // Build pane wrappers — content injected as raw HTML inside data-section divs
  const panes = tabs.map((t,i)=>
    `<div class="psection${i===0?' active':''}" data-section="${t.id}">${t.content}</div>`
  ).join('');
  return `<div id="ptc-${groupId}" class="ptabs-container"><div class="ptabs">${tabBar}</div><div class="ptabs-body">${panes}</div></div>`;
}

// ═══════════════════════════════════════════
// WINDOW MANAGER
// ═══════════════════════════════════════════
let zTop=100;
const WR={};
let _spawnCount=0;
function getSpawnPos(sz){
  // Always spawn near center, with a small readable cascade offset
  const W=window.innerWidth, H=window.innerHeight-70;
  const sw=sz[0]||540, sh=sz[1]||360;
  const cx=Math.floor((W-sw)/2), cy=Math.floor((H-sh)/2);
  const offset=(_spawnCount%6)*24; // gentle cascade, resets after 6
  _spawnCount++;
  return {x:Math.max(10,cx+offset), y:Math.max(10,cy+offset)};
}

const WTITLES={
  HOME:'MARKET OVERVIEW',
  FI:'TREASURY MONITOR',EQ:'EQUITY MONITOR',FX:'FX & RATES',CMDTY:'COMMODITIES & ENERGY',
  MACRO:'MACRO CALENDAR & CB',NEWS:'NEWS TERMINAL',
  INFL:'INFLATION MONITOR',AUCTION:'AUCTION MONITOR',
  VOL:'VOLATILITY & RISK',EQS:'EQUITY SEARCH',CHART:'PRICE CHART'
};
const WSIZES={
  HOME:[1100,640],
  FI:[680,400],EQ:[700,440],FX:[580,360],CMDTY:[600,380],
  MACRO:[720,420],NEWS:[560,460],SPREAD:[620,400],INFL:[580,380],AUCTION:[780,260],
  VOL:[460,300],EQS:[620,560],CHART:[680,420]
};

function OW(cmd,extra){
  // HEAT: all sub-modes share a single window — switch mode if already open
  if(cmd==='HEAT'){
    if(WR['HEAT']){ WR['HEAT'].style.zIndex=++zTop; switchHeatMode(extra||'sector'); return; }
  }
  const winKey = cmd==='HEAT' ? 'HEAT' : cmd+(extra?'_'+extra:'');
  if(WR[winKey]){WR[winKey].style.zIndex=++zTop;return}
  const w=document.createElement('div');
  w.className='win';
  const sz=WSIZES[cmd]||[540,360];
  const sp=getSpawnPos(sz);
  w.style.cssText=`left:${sp.x}px;top:${sp.y}px;z-index:${++zTop};`;
  w.style.width=sz[0]+'px';w.style.height=sz[1]+'px';
  const title=WTITLES[cmd]||cmd;
  w.innerHTML=`
    <div class="wh">
      <span class="wh-cmd">${cmd}</span>
      <span class="wh-title">${title}</span>
      <span class="wh-ts" id="wts-${winKey}">${getTs()}</span>
      <div class="wh-refresh" title="Refresh" onclick="refreshWin('${winKey}','${cmd}','${extra||''}')">↻</div>
      <div class="wh-fs" title="Fullscreen" onclick="toggleFS('${winKey}')">⛶</div>
      <div class="wh-close" onclick="CW('${winKey}')">✕</div>
    </div>
    <div class="wb" id="wb-${winKey}"></div>
    <div class="wr"></div>`;
  document.getElementById('workspace').appendChild(w);
  WR[winKey]=w;
  makeDrag(w);makeResize(w);
  w.addEventListener('mousedown',()=>{w.style.zIndex=++zTop});
  renderW(cmd,winKey,extra);
}

function CW(key){if(WR[key]){WR[key].remove();delete WR[key]}}

function refreshWin(winKey, cmd, extra){
  const w = WR[winKey]; if(!w) return;
  const b = w.querySelector('.wb'); if(!b) return;
  const ts = w.querySelector(`#wts-${winKey}`);
  if(ts) ts.textContent = getTs();
  // Spin the refresh icon briefly
  const btn = w.querySelector('.wh-refresh');
  if(btn){ btn.style.transform='rotate(360deg)'; btn.style.transition='transform 0.4s'; setTimeout(()=>{btn.style.transform='';btn.style.transition=''},500); }
  switch(cmd){
    case'FI':    b.innerHTML=rFI();    setTimeout(drawYieldCurve,40); break;
    case'EQ':    b.innerHTML=rEQ();    break;
    case'FX':    b.innerHTML=rFX();    break;
    case'CMDTY': b.innerHTML=rCMDTY(); break;
    case'MACRO': b.innerHTML=rMACRO(); break;
    case'HOME':
      try{
        b.innerHTML=rHOME();
      }catch(e){
        console.error('[rHOME crash]', e);
        b.innerHTML=`<div style="padding:20px;color:red;font-family:monospace;font-size:11px">
          <div style="color:#ff4444;margin-bottom:8px">HOME RENDER ERROR</div>
          <div style="color:#888">${e.message}</div>
          <div style="color:#555;margin-top:6px;font-size:9px">${(e.stack||'').split('\n').slice(0,4).join('<br>')}</div>
        </div>`;
      }
      setTimeout(()=>{try{initHOME();}catch(e){console.error('[initHOME crash]',e);}},30);
      break;
    default: break;
  }
}

// ── FULLSCREEN TOGGLE ──
// Saves/restores position+size so exiting FS returns to original layout
const FS_STATE = {}; // key -> {left,top,width,height}
function toggleFS(key){
  const w = WR[key]; if(!w) return;
  const btn = w.querySelector('.wh-fs');
  if(w.classList.contains('win-fullscreen')){
    // Restore
    w.classList.remove('win-fullscreen');
    const s = FS_STATE[key];
    if(s){ w.style.left=s.left; w.style.top=s.top; w.style.width=s.width; w.style.height=s.height; }
    w.querySelector('.wr').style.display='';
    if(btn) btn.textContent='⛶';
    // Re-draw canvases that depend on size
    setTimeout(()=>repaintWin(key),30);
  } else {
    // Save state & go full
    FS_STATE[key]={left:w.style.left,top:w.style.top,width:w.style.width,height:w.style.height};
    w.classList.add('win-fullscreen');
    w.style.zIndex=++zTop;
    w.querySelector('.wr').style.display='none';
    if(btn) btn.textContent='⊡';
    setTimeout(()=>repaintWin(key),30);
  }
}
// Re-trigger canvas draws after resize
function repaintWin(key){
  const cmd = key.split('_')[0];
  if(cmd==='HEAT'){ const t=document.querySelector('.heat-tab.active'); drawHEAT(t?t.dataset.mode:'sector'); }
  else if(cmd==='HOME')   initHOME();
  else if(cmd==='EQ')     drawEQ();
}

function renderW(cmd,key,extra){
  const b=document.getElementById('wb-'+key);
  if(!b)return;
  switch(cmd){
    case'FI':     b.innerHTML=rFI(); setTimeout(drawYieldCurve,40); break;
    case'EQ':     b.innerHTML=rEQ();setTimeout(()=>drawEQ(),30);break;
    case'FX':     b.innerHTML=rFX();break;
    case'CMDTY':  b.innerHTML=rCMDTY();break;
    case'MACRO':  b.innerHTML=rMACRO();break;
    case'EQS':    b.innerHTML=rEQS(extra);setTimeout(()=>{if(extra)fetchEQS(extra.toUpperCase())},30);break;
    case'CHART':  b.innerHTML=rCHART(extra);setTimeout(()=>loadChartData(),60);break;
    case'HELP':   b.innerHTML=rHELP();break;
    case'SRCH':   b.innerHTML=rSRCH(extra);break;
    case'HOME':
      try{ b.innerHTML=rHOME(); }
      catch(e){ console.error('[rHOME crash]',e); b.innerHTML=`<pre style="color:red;padding:10px;font-size:10px">${e.message}\n${e.stack||''}</pre>`; }
      setTimeout(()=>{try{initHOME();}catch(e){console.error('[initHOME crash]',e);}},30);
      break;
    case'HEAT':   b.innerHTML=rHEAT(extra||'sector');setTimeout(()=>drawHEAT(extra||'sector'),30);break;

  }
}

function makeDrag(el){
  const h=el.querySelector('.wh');
  h.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('wh-close'))return;
    const ox=el.offsetLeft,oy=el.offsetTop,sx=e.clientX,sy=e.clientY;
    const mm=ev=>{el.style.left=Math.max(0,ox+ev.clientX-sx)+'px';el.style.top=Math.max(0,oy+ev.clientY-sy)+'px'};
    const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu)};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);e.preventDefault();
  });
}
function makeResize(el){
  const h=el.querySelector('.wr');
  h.addEventListener('mousedown',e=>{
    const sw=el.offsetWidth,sh=el.offsetHeight,sx=e.clientX,sy=e.clientY;
    const mm=ev=>{el.style.width=Math.max(300,sw+ev.clientX-sx)+'px';el.style.height=Math.max(160,sh+ev.clientY-sy)+'px'};
    const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu)};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);e.preventDefault();
  });
}

function drawYieldCurve(){
  const canvas = document.getElementById('yield-curve-canvas');
  if(!canvas) return;
  const t = D.fixedIncome.treasuries;
  const W = canvas.parentElement.offsetWidth - 4;
  canvas.width = W; canvas.height = 160;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,160);

  const pts = t.filter(r=>r.yield>0);
  if(!pts.length) return;

  const yields = pts.map(r=>r.yield);
  const mn = Math.min(...yields) - 0.1;
  const mx = Math.max(...yields) + 0.1;
  const pad = {l:38,r:8,t:10,b:20};
  const pw = W-pad.l-pad.r, ph = 160-pad.t-pad.b;
  const xp = i => pad.l + (i/(pts.length-1))*pw;
  const yp = v => pad.t + (1-(v-mn)/(mx-mn))*ph;

  // Grid lines
  const gridYs = 4;
  for(let i=0;i<=gridYs;i++){
    const v = mn + (mx-mn)*(i/gridYs);
    const y = yp(v);
    ctx.strokeStyle='#111'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='#333'; ctx.font='8px IBM Plex Mono'; ctx.textAlign='right';
    ctx.fillText(v.toFixed(2)+'%', pad.l-2, y+3);
  }

  // Determine curve color by regime
  const y2=t[4]?.yield||0, y10=t[8]?.yield||0;
  const inverted = y10 < y2;
  const lineCol = inverted ? '#e53935' : '#00c853';

  // Fill under curve
  const grad = ctx.createLinearGradient(0,pad.t,0,160-pad.b);
  grad.addColorStop(0, inverted?'rgba(229,57,53,0.15)':'rgba(0,200,83,0.15)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();
  pts.forEach((r,i)=> i===0 ? ctx.moveTo(xp(i),yp(r.yield)) : ctx.lineTo(xp(i),yp(r.yield)));
  ctx.lineTo(xp(pts.length-1),160-pad.b); ctx.lineTo(pad.l,160-pad.b);
  ctx.closePath(); ctx.fillStyle=grad; ctx.fill();

  // Line
  ctx.strokeStyle=lineCol; ctx.lineWidth=1.5;
  ctx.beginPath();
  pts.forEach((r,i)=> i===0 ? ctx.moveTo(xp(i),yp(r.yield)) : ctx.lineTo(xp(i),yp(r.yield)));
  ctx.stroke();

  // Dots + labels
  pts.forEach((r,i)=>{
    const x=xp(i), y=yp(r.yield);
    ctx.fillStyle=lineCol; ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#2a2a2a'; ctx.font='8px IBM Plex Mono'; ctx.textAlign='center';
    ctx.fillText(r.tenor, x, 160-pad.b+12);
  });

  // Store pts+coords for hover
  canvas._yieldPts = pts.map((r,i)=>({x:xp(i),y:yp(r.yield),r}));

  // Hover interaction
  canvas.onmousemove = e => {
    const rect = canvas.getBoundingClientRect();
    const mx2 = e.clientX - rect.left;
    const tip = document.getElementById('yield-curve-tooltip');
    if(!tip||!canvas._yieldPts) return;
    // Find nearest point
    let nearest=null, minD=999;
    canvas._yieldPts.forEach(p=>{
      const d=Math.abs(p.x-mx2);
      if(d<minD){minD=d;nearest=p;}
    });
    if(nearest && minD < 40){
      const r=nearest.r;
      const d1=r.d1>=0?`<span style="color:#00c853">+${r.d1.toFixed(3)}</span>`:`<span style="color:#e53935">${r.d1.toFixed(3)}</span>`;
      tip.innerHTML=`<span style="color:var(--amber)">${r.tenor}</span> &nbsp;YIELD: <span style="color:#e0e0e0">${r.yield.toFixed(3)}%</span> &nbsp;1D: ${d1} &nbsp;DUR: ${r.dur.toFixed(1)}y`;
      // Draw crosshair
      const savedW=canvas.width;
      ctx.clearRect(0,0,W,160);
      drawYieldCurveStatic(ctx,pts,W,pad,pw,ph,mn,mx,xp,yp,lineCol,grad);
      ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(nearest.x,pad.t); ctx.lineTo(nearest.x,160-pad.b); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='#ffab00'; ctx.beginPath(); ctx.arc(nearest.x,nearest.y,4,0,Math.PI*2); ctx.fill();
    } else {
      tip.innerHTML='';
    }
  };
  canvas.onmouseleave = e => {
    const tip = document.getElementById('yield-curve-tooltip');
    if(tip) tip.innerHTML='';
    ctx.clearRect(0,0,W,160);
    drawYieldCurveStatic(ctx,pts,W,pad,pw,ph,mn,mx,xp,yp,lineCol,grad);
  };
}

function drawYieldCurveStatic(ctx,pts,W,pad,pw,ph,mn,mx,xp,yp,lineCol,grad){
  const gridYs=4;
  for(let i=0;i<=gridYs;i++){
    const v=mn+(mx-mn)*(i/gridYs); const y=yp(v);
    ctx.strokeStyle='#111'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='#333'; ctx.font='8px IBM Plex Mono'; ctx.textAlign='right';
    ctx.fillText(v.toFixed(2)+'%',pad.l-2,y+3);
  }
  ctx.beginPath();
  pts.forEach((r,i)=>i===0?ctx.moveTo(xp(i),yp(r.yield)):ctx.lineTo(xp(i),yp(r.yield)));
  ctx.lineTo(xp(pts.length-1),160-pad.b); ctx.lineTo(pad.l,160-pad.b);
  ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
  ctx.strokeStyle=lineCol; ctx.lineWidth=1.5;
  ctx.beginPath();
  pts.forEach((r,i)=>i===0?ctx.moveTo(xp(i),yp(r.yield)):ctx.lineTo(xp(i),yp(r.yield)));
  ctx.stroke();
  pts.forEach((r,i)=>{
    const x=xp(i),y=yp(r.yield);
    ctx.fillStyle=lineCol; ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#2a2a2a'; ctx.font='8px IBM Plex Mono'; ctx.textAlign='center';
    ctx.fillText(r.tenor,x,160-pad.b+12);
  });
}

function rFX(){
  function fxTable(title,data){
    const rows=data.filter(r=>r.val!=null&&r.type!=='idx').map(r=>{
      const dec=r.val>100?2:4;
      return`<tr><td>${r.name}</td><td class="hl">${r.val.toFixed(dec)}</td><td>${fmtC(r.d1,dec)}</td></tr>`;
    }).join('');
    const body=rows||`<tr><td colspan="3" style="color:#555;padding:8px;text-align:center">FETCHING…</td></tr>`;
    return`<div class="sl">${title}</div>
      <table class="t"><thead><tr><th>PAIR</th><th>LAST ●</th><th>1D ●</th></tr></thead><tbody>${body}</tbody></table>`;
  }
  const g10=D.fx.filter(f=>f.type==='g10'||f.type==='idx');
  const em=D.fx.filter(f=>f.type==='em');



  // Build currency options from live D.fx data
  // Build currency list from live FX data
  // Pairs like EURUSD → EUR at rate=val (1 EUR = val USD)
  // Pairs like USDJPY → JPY at rate=1/val (1 JPY = 1/val USD)
  const _fxCcyMap = {
    'EURUSD':'EUR','GBPUSD':'GBP','AUDUSD':'AUD','NZDUSD':'NZD',
    'USDJPY':'JPY','USDCHF':'CHF','USDCAD':'CAD','USDSEK':'SEK',
    'USDNOK':'NOK','USDBRL':'BRL','USDCNY':'CNY','USDINR':'INR',
    'USDMXN':'MXN','USDZAR':'ZAR','USDTRY':'TRY'
  };
  const fxOpts = [
    {name:'USD', val:1},
    ...D.fx.filter(f=>f.val!=null&&_fxCcyMap[f.name]).map(f=>{
      const name = _fxCcyMap[f.name];
      const isUSDbase = f.name.startsWith('USD');
      const rate = isUSDbase ? 1/f.val : f.val; // rate = 1 CCY in USD
      return {name, val:rate};
    })
  ];
  const fxOptHTML = fxOpts.map((o,i)=>
    `<option value="${o.val}" data-name="${o.name}" ${i===1?'selected':''}>${o.name}</option>`
  ).join('');
  const fxToOptHTML = fxOpts.map((o,i)=>
    `<option value="${o.val}" data-name="${o.name}" ${o.name==='USD'?'selected':''}>${o.name}</option>`
  ).join('');

  const CALC_PRESETS = [
    {from:'USD',to:'EUR',amt:1000},{from:'USD',to:'GBP',amt:1000},{from:'USD',to:'JPY',amt:1000},
    {from:'EUR',to:'USD',amt:1000},{from:'GBP',to:'USD',amt:1000},{from:'USD',to:'CAD',amt:1000},
    {from:'USD',to:'CHF',amt:1000},{from:'USD',to:'CNY',amt:1000},{from:'JPY',to:'USD',amt:100000},
    {from:'EUR',to:'GBP',amt:1000},{from:'USD',to:'MXN',amt:1000},{from:'USD',to:'BRL',amt:1000},
  ];
  const presetBtns = CALC_PRESETS.map(p=>{
    const fOpt = fxOpts.find(o=>o.name===p.from);
    const tOpt = fxOpts.find(o=>o.name===p.to);
    if(!fOpt||!tOpt) return '';
    const rate = p.from==='USD' ? 1/tOpt.val : p.to==='USD' ? fOpt.val : fOpt.val/tOpt.val;
    const result = p.from==='USD' ? p.amt/tOpt.val : p.to==='USD' ? p.amt*fOpt.val : p.amt*fOpt.val/tOpt.val;
    const disp = result>1000 ? result.toFixed(0) : result.toFixed(2);
    return `<div onclick="fxSetPreset('${p.from}','${p.to}',${p.amt})"
      style="padding:5px 6px;border:1px solid #1a1a1a;cursor:pointer;background:#050505;font-size:9px;line-height:1.3"
      onmouseover="this.style.borderColor='#333'" onmouseout="this.style.borderColor='#1a1a1a'">
      <div style="color:#666;margin-bottom:1px">${p.amt>999?p.amt.toLocaleString():p.amt} ${p.from}</div>
      <div style="color:var(--amber);font-weight:600">${disp} ${p.to}</div>
    </div>`;
  }).filter(Boolean).join('');

  const calcContent = fxOpts.length<=1
    ? `<div style="padding:20px;color:#555;font-size:10px;text-align:center">LOADING RATES…</div>`
    : `
    <div style="padding:8px 12px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap">
        <input id="fxc-amount" type="number" value="1000" step="any"
               style="width:88px;background:#0a0a0a;border:1px solid #333;color:var(--text);font-family:var(--font);font-size:11px;padding:4px 6px"
               oninput="fxCalc()">
        <select id="fxc-from" onchange="fxCalc()"
                style="background:#0a0a0a;border:1px solid #333;color:var(--amber);font-family:var(--font);font-size:11px;padding:4px 6px;cursor:pointer">
          ${fxOptHTML}
        </select>
        <button onclick="fxSwapCalc()"
                style="background:#111;border:1px solid #333;color:#888;font-family:var(--font);font-size:11px;padding:4px 8px;cursor:pointer">⇄</button>
        <select id="fxc-to" onchange="fxCalc()"
                style="background:#0a0a0a;border:1px solid #333;color:var(--amber);font-family:var(--font);font-size:11px;padding:4px 6px;cursor:pointer">
          ${fxToOptHTML}
        </select>
      </div>
      <div style="font-size:24px;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:-0.5px" id="fxc-result">—</div>
      <div id="fxc-rate-box" style="font-size:10px;color:#aaa;padding:5px 0 8px;border-bottom:1px solid #111"></div>
      <div class="sl" style="margin-top:8px;margin-bottom:6px">QUICK PAIRS</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:3px">${presetBtns}</div>
      <div style="font-size:9px;color:#444;margin-top:8px">Live rates via Yahoo Finance · updated each poll cycle</div>
    </div>`;

  return buildTabs('fx-tabs',[
    {id:'fx-g10',   label:'G10 & DXY', content:(()=>{
      const dxy=D.fx.find(f=>f.name==='DXY');
      const dxyBlock=dxy&&dxy.val!=null
        ?`<div class="sf" style="margin-bottom:6px">
            <div class="si"><span class="sil">DXY</span><span class="siv" style="font-size:13px;font-weight:700">${dxy.val.toFixed(2)}</span></div>
            <div class="si"><span class="sil">1D</span><span class="siv ${dxy.d1>=0?'dn':'up'}">${dxy.d1>=0?'+':''}${(dxy.d1||0).toFixed(2)}</span></div>
          </div>`
        :`<div style="color:#555;font-size:9px;padding:2px 0 6px">DXY loading…</div>`;
      return`<div style="padding:4px 6px">${dxyBlock}${fxTable('G10 PAIRS',g10)}</div>`;
    })()},
    {id:'fx-calc',  label:'CALCULATOR', content:calcContent},
  ]);
}

// ── EQS AUTOCOMPLETE — Yahoo Finance search (no key needed) ──
let _eqsAcTimer = null;
function eqsAutocomplete(val){
  const box = document.getElementById('eqs-suggest');
  if(!box) return;
  clearTimeout(_eqsAcTimer);
  if(!val || val.length < 1){ box.style.display='none'; return; }
  _eqsAcTimer = setTimeout(async ()=>{
    try{
      const url = `https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(val)}&lang=en-US&region=US&quotesCount=6&newsCount=0`;
      const r = await proxyFetch(url, 5000);
      const d = await r.json();
      const quotes = (d.quotes||[]).filter(q=>q.symbol&&q.shortname);
      if(!quotes.length){ box.style.display='none'; return; }
      box.innerHTML = quotes.map(q=>`
        <div onclick="eqsSelectSuggest('${q.symbol}')" style="padding:4px 8px;cursor:pointer;border-bottom:1px solid var(--border);font-size:10px"
          onmouseover="this.style.background='#111'" onmouseout="this.style.background='transparent'">
          <span style="color:var(--amber)">${q.symbol}</span>
          <span style="color:var(--text-dim);margin-left:6px">${(q.shortname||'').substring(0,40)}</span>
          <span style="color:#707070;margin-left:4px;font-size:9px">${q.exchange||''}</span>
        </div>`).join('');
      box.style.display='block';
    }catch(e){ box.style.display='none'; }
  }, 250);
}

function eqsSelectSuggest(sym){
  const inp = document.getElementById('eqs-input');
  const box = document.getElementById('eqs-suggest');
  if(inp) inp.value = sym;
  if(box) box.style.display = 'none';
  fetchEQS(sym.toUpperCase());
}

function eqsSearch(){
  const inp = document.getElementById('eqs-input');
  const box = document.getElementById('eqs-suggest');
  if(!inp) return;
  const v = inp.value.trim().toUpperCase();
  if(!v) return;
  if(box) box.style.display='none';
  fetchEQS(v);
}

async function fetchEDGARCIK(ticker){
  // Step 1: get CIK from SEC's official ticker map (CORS-open, no proxy)
  const cikStr = await getTickerCIK(ticker);
  if(!cikStr) return null;
  // Step 2: fetch company submission data to get canonical name + info
  try{
    const padded = String(cikStr).padStart(10,'0');
    const r = await fetch(`https://data.sec.gov/submissions/CIK${padded}.json`,{signal:AbortSignal.timeout(6000)});
    if(!r.ok) throw new Error('bad');
    const d = await r.json();
    return {cik: d.cik, name: d.name, tickers: d.tickers, exchanges: d.exchanges};
  }catch(e){ return {cik: parseInt(cikStr), name: null, tickers:[ticker], exchanges:[]}; }
}

async function getTickerCIK(ticker){
  // SEC company_tickers.json maps every listed ticker to CIK — CORS-open
  try{
    const r = await fetch('https://www.sec.gov/files/company_tickers.json',{signal:AbortSignal.timeout(7000)});
    if(!r.ok) throw new Error('bad');
    const d = await r.json();
    // format: {"0":{"cik_str":320193,"ticker":"AAPL","title":"Apple Inc."}, ...}
    const entry = Object.values(d).find(e=>e.ticker.toUpperCase()===ticker.toUpperCase());
    return entry ? entry.cik_str : null;
  }catch(e){ return null; }
}

  // CIK=TICKER works directly in browse-edgar for most US equities
  const byTicker  = (type) => `https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=${encodeURIComponent(ticker)}&type=${encodeURIComponent(type)}&dateb=&owner=include&count=40`;
  const byCIK     = (type) => cikPadded ? `https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=${cikPadded}&type=${encodeURIComponent(type)}&dateb=&owner=include&count=40` : byTicker(type);
  const companyPage = cikPadded
    ? `https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=${cikPadded}&type=&dateb=&owner=include&count=40`

// ── Draw a line chart on a canvas element by ID ──
function drawEQSCanvas(canvasId, pts, up){
  const canvas = document.getElementById(canvasId);
  if(!canvas || !pts || pts.length < 2) return;
  const W = canvas.width, H = canvas.height;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  const valid = pts.filter(v=>v!=null&&!isNaN(v));
  if(valid.length < 2) return;

  const mn = Math.min(...valid);
  const mx = Math.max(...valid);
  const range = mx - mn || 1;
  const pad = { t:6, b:4, l:4, r:4 };
  const cW = W - pad.l - pad.r;
  const cH = H - pad.t - pad.b;

  const x = i => pad.l + (i/(valid.length-1))*cW;
  const y = v => pad.t + (1-(v-mn)/range)*cH;

  const color = up ? '#00c853' : '#ff4444';

  // Fill gradient
  const grad = ctx.createLinearGradient(0, pad.t, 0, H);
  grad.addColorStop(0, up ? 'rgba(0,180,80,0.18)' : 'rgba(220,0,0,0.18)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.moveTo(x(0), y(valid[0]));
  for(let i=1;i<valid.length;i++) ctx.lineTo(x(i), y(valid[i]));
  ctx.lineTo(x(valid.length-1), H);
  ctx.lineTo(x(0), H);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.moveTo(x(0), y(valid[0]));
  for(let i=1;i<valid.length;i++) ctx.lineTo(x(i), y(valid[i]));
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Last price dot
  const lx = x(valid.length-1), ly = y(valid[valid.length-1]);
  ctx.beginPath();
  ctx.arc(lx, ly, 2.5, 0, Math.PI*2);
  ctx.fillStyle = color;
  ctx.fill();
}

// ── FETCH STATE ──
const FETCH_STATE = {
  lastRefresh: null,       // ISO timestamp of last successful full refresh
  lastAttempt: null,       // ISO timestamp of last attempt
  staleSources: new Set(), // source names that failed
  pendingSources: new Set(),
  errors: {},              // source -> error message

function markStale(source, err){
  FETCH_STATE.staleSources.add(source);
  FETCH_STATE.pendingSources.delete(source);
  FETCH_STATE.errors[source] = err;
  updateStatusBar();
}
function markFresh(source){
  FETCH_STATE.staleSources.delete(source);
  FETCH_STATE.pendingSources.delete(source);
  delete FETCH_STATE.errors[source];
  FETCH_STATE.lastRefresh = new Date().toISOString();
  updateStatusBar();
}
function markPending(source){
  FETCH_STATE.pendingSources.add(source);
  updateStatusBar();
}

function updateStatusBar(){
  const stale = [...FETCH_STATE.staleSources];
  const pending = [...FETCH_STATE.pendingSources];
  const ts = FETCH_STATE.lastRefresh
    ? new Date(FETCH_STATE.lastRefresh).toLocaleTimeString('en-US',{hour12:false,timeZone:'America/Denver'})
    : '--:--:--';

  // Update topbar live status
  const refreshEl  = document.getElementById('live-refresh-text');
  const fetchingEl = document.getElementById('live-fetching-text');
  const statusEl   = document.getElementById('live-status-text');
  if(refreshEl)  refreshEl.textContent = 'REFRESHED: ' + ts;
  if(fetchingEl) fetchingEl.innerHTML  = pending.length
    ? ` &nbsp;<span style="color:#cc8800">⟳ FETCHING: ${pending.join(' ')}</span>`
    : (stale.length ? ` &nbsp;<span style="color:var(--red)">⚠ STALE: ${stale.join(' ')}</span>` : '');
  if(statusEl) statusEl.innerHTML = FETCH_STATE.lastRefresh
    ? '<span style="color:#4aaa4a">● LIVE</span>'
    : '<span style="color:#555">● INIT</span>';
}

// Generic rate-limited fetch with timeout + CORS proxy for blocked APIs
// ═══════════════════════════════════════════
// CORE FETCH HELPER — allorigins proxy
// ═══════════════════════════════════════════
async function proxyFetch(url, timeoutMs=10000){
  // Proxy list ordered by reliability for github.io origin (March 2026)
  // allorigins /get returns JSON wrapper: {contents:'...', status:{...}}
  const proxies = [
    { url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`, unwrap: false },
    { url: `https://cors.eu.org/${url}`, unwrap: false },
    { url: `https://corsproxy.io/?url=${encodeURIComponent(url)}`, unwrap: false },
    { url: `https://proxy.cors.sh/${url}`, unwrap: false },
    { url: `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, unwrap: true },
  ];
  let lastErr;
  for(const proxy of proxies){
    try{
      const r = await fetch(proxy.url, {signal: AbortSignal.timeout(timeoutMs)});
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      let text;
      if(proxy.unwrap){
        // allorigins /get wraps response in JSON: {"contents":"...","status":{...}}
        const json = await r.json();
        if(!json.contents) throw new Error('allorigins: no contents');
        text = json.contents;
      } else {
        text = await r.text();
      }
      // Skip proxy error pages
      const t = text.trimStart();
      if(t.startsWith('Edge') || t.startsWith('Too Many') || t.startsWith('Access denied') ||
         t.startsWith('<!DOCTYPE') || t.startsWith('<html') || t.startsWith('error')){
        throw new Error(`Proxy error page: ${t.slice(0,50)}`);
      }
      return new Response(text, {
        status: 200,
        headers: {'Content-Type': 'application/json'}
      });
    }catch(e){ lastErr=e; continue; }
  }
  throw lastErr || new Error('All proxies failed');
}

// Keep apiFetch stub so existing EQS window code doesn't break
async function apiFetch(url, source, timeoutMs=10000){
  try{
    const r = await proxyFetch(url, timeoutMs);
    return await r.json();
  }catch(e){
    markStale(source, e.message);
    return null;
  }
}

function fmtLargeNum(n){
  if(!n) return '--';
  if(n>=1e12) return (n/1e12).toFixed(2)+'T';
  if(n>=1e9)  return (n/1e9).toFixed(0)+'B';
  return n.toFixed(0);
}

async function fetchTreasuryYields(){
  markPending('TREAS');
  // Fetch full curve from FRED: DGS1MO, DGS3MO, DGS6MO, DGS1, DGS2, DGS3, DGS5, DGS7, DGS10, DGS20, DGS30
  const FRED_CURVE = [
    {id:'DGS1MO', tenor:'1M'}, {id:'DGS3MO', tenor:'3M'}, {id:'DGS6MO', tenor:'6M'},
    {id:'DGS1',   tenor:'1Y'}, {id:'DGS2',   tenor:'2Y'}, {id:'DGS3',   tenor:'3Y'},
    {id:'DGS5',   tenor:'5Y'}, {id:'DGS7',   tenor:'7Y'}, {id:'DGS10',  tenor:'10Y'},
    {id:'DGS20',  tenor:'20Y'},{id:'DGS30',  tenor:'30Y'},
  ];
  let anyOk = false;
  for(const {id, tenor} of FRED_CURVE){
    try{
      const url = `https://api.stlouisfed.org/fred/series/observations?series_id=${id}&api_key=${API_KEYS.FRED}&sort_order=desc&limit=10&file_type=json`;
      const r = await proxyFetch(url, 9000);
      const data = await r.json();
      const obs = (data?.observations || []).filter(o=>o.value!='.');
      if(!obs.length) continue;
      const latest = parseFloat(obs[0].value);
      const prev   = obs[1] ? parseFloat(obs[1].value) : latest;
      const wkAgo  = obs[5] ? parseFloat(obs[5].value) : prev;
      const moAgo  = obs[9] ? parseFloat(obs[9].value) : prev;
      const t = D.fixedIncome.treasuries.find(x=>x.tenor===tenor);
      if(!t || isNaN(latest)) continue;
      t.yield = +latest.toFixed(3);
      t.d1    = +(latest - prev).toFixed(3);
      t.w1    = +(latest - wkAgo).toFixed(3);
      t.m1    = +(latest - moAgo).toFixed(3);
      // Approximate duration and price for display
      const yrs = {1:1/12,3:0.25,6:0.5,1:1,2:2,3:3,5:5,7:7,10:10,20:20,30:30}[parseInt(tenor)] ||
        tenor.endsWith('M') ? parseInt(tenor)/12 : parseInt(tenor);
      const y = latest/100;
      t.dur   = +(yrs <= 1 ? yrs : yrs/(1+y)).toFixed(2);
      t.price = +(100 / Math.pow(1+y, yrs)).toFixed(2);
      anyOk = true;
    }catch(e){}
    await new Promise(r=>setTimeout(r,150));
  }
  if(anyOk) markFresh('TREAS');
  else markStale('TREAS','FRED curve fetch failed');
}


async function fetchTreasuryAuctions(){
  // Key terms we care about — maps API security_term → display label
  const TERM_MAP = {
    '4-Week'  : '4W T-Bill',
    '8-Week'  : '8W T-Bill',
    '13-Week' : '13W T-Bill',
    '17-Week' : '17W T-Bill',
    '26-Week' : '26W T-Bill',
    '52-Week' : '52W T-Bill',
    '2-Year'  : '2Y Note',
    '3-Year'  : '3Y Note',
    '5-Year'  : '5Y Note',
    '7-Year'  : '7Y Note',
    '10-Year' : '10Y Note',
    '20-Year' : '20Y Bond',
    '30-Year' : '30Y Bond',
  };

  const fields = [
    'security_type','security_term','auction_date','issue_date',
    'maturity_date','high_yield','bid_to_cover_ratio',
    'allotted_amt_dealer_pct','allotted_amt_direct_pct',
    'allotted_amt_indirect_pct','tail_rate_basis_points'
  ].join(',');

  // Fetch last 30 auctions — enough to get one of each tenor
  const url = `https://api.fiscaldata.treasury.gov/services/api/v1/accounting/od/auctions_query?fields=${fields}&filter=security_type:in:(Bill,Note,Bond)&sort=-auction_date&page[size]=60`;

  try {
    const r = await proxyFetch(url, 12000);
    const d = await r.json();
    if(!d?.data?.length) throw new Error('empty response');

    // For each term we track, keep only the most recent auction
    const seen = new Set();
    const fresh = [];

    for(const row of d.data){
      const label = TERM_MAP[row.security_term];
      if(!label || seen.has(label)) continue;
      seen.add(label);

      const yld   = parseFloat(row.high_yield);
      const btc   = parseFloat(row.bid_to_cover_ratio);
      const tail  = parseFloat(row.tail_rate_basis_points) || 0;
      const deal  = parseFloat(row.allotted_amt_dealer_pct)   || 0;
      const dir   = parseFloat(row.allotted_amt_direct_pct)   || 0;
      const ind   = parseFloat(row.allotted_amt_indirect_pct) || 0;

      // "Weak" = BTC below 2.35 OR tail > 2.5bp
      const weak  = (!isNaN(btc) && btc < 2.35) || tail > 2.5;

      fresh.push({
        sec:     label,
        auction: row.auction_date  || '—',
        issue:   row.issue_date    || '—',
        mat:     row.maturity_date || '—',
        yield:   isNaN(yld)  ? 0    : yld,
        btc:     isNaN(btc)  ? 0    : btc,
        tail:    isNaN(tail) ? 0    : tail,
        ind:     isNaN(ind)  ? 0    : ind,
        dir:     isNaN(dir)  ? 0    : dir,
        deal:    isNaN(deal) ? 0    : deal,
        weak,
        live: true,   // flag so UI can show "LIVE" badge
      });
    }

    if(fresh.length){
      // Sort by rough tenor order
      const ORDER = ['4W T-Bill','8W T-Bill','13W T-Bill','17W T-Bill',
                     '26W T-Bill','52W T-Bill','2Y Note','3Y Note',
                     '5Y Note','7Y Note','10Y Note','20Y Bond','30Y Bond'];
      fresh.sort((a,b)=>ORDER.indexOf(a.sec)-ORDER.indexOf(b.sec));
      D.fixedIncome.auctions = fresh;
      // Re-render TREAS panel if open
      // Re-render TREAS and AUCTION windows if open
      ['TREAS','FI'].forEach(cmd=>{
        if(WR[cmd]){ renderW(cmd,cmd,null); if(cmd==='TREAS'||cmd==='FI') setTimeout(drawYieldCurve,80); }
      });
    }
  } catch(e){
    console.warn('Treasury auction fetch failed:', e.message);
    // Keep static fallback data — no UI change needed
  }
}

async function fetchFXRates(){
  markPending('FX');
  const symbols = [
    'EURUSD=X','USDJPY=X','GBPUSD=X','USDCHF=X','AUDUSD=X','USDCAD=X',
    'NZDUSD=X','USDSEK=X','USDNOK=X','USDBRL=X','USDMXN=X','USDINR=X',
    'USDCNY=X','USDZAR=X','USDTRY=X','DX-Y.NYB'
  ];
  const yfName = {
    'EURUSD=X':'EURUSD','USDJPY=X':'USDJPY','GBPUSD=X':'GBPUSD',
    'USDCHF=X':'USDCHF','AUDUSD=X':'AUDUSD','USDCAD=X':'USDCAD',
    'NZDUSD=X':'NZDUSD','USDSEK=X':'USDSEK','USDNOK=X':'USDNOK',
    'USDBRL=X':'USDBRL','USDMXN=X':'USDMXN','USDINR=X':'USDINR',
    'USDCNY=X':'USDCNY','USDZAR=X':'USDZAR','USDTRY=X':'USDTRY',
    'DX-Y.NYB':'DXY'
  };
  // Fetch all FX pairs in batches of 4 using yfFetch (v8/chart — proven reliable)
  let anyOk = false;
  const pairs = symbols.map(yf=>({yf, name:yfName[yf]})).filter(p=>p.name);
  // Fetch in parallel batches of 4
  for(let i=0; i<pairs.length; i+=4){
    const batch = pairs.slice(i,i+4);
    const results = await Promise.allSettled(batch.map(p=>yfFetch(p.yf)));
    results.forEach((r,j)=>{
      if(r.status!=='fulfilled'||!r.value) return;
      const q = r.value;
      const p = batch[j];
      const row = D.fx.find(f=>f.name===p.name);
      if(!row) return;
      const hiPrec = p.name==='EURUSD'||p.name==='GBPUSD'||p.name==='AUDUSD'||p.name==='NZDUSD';
      const dec = p.name==='DXY' ? 2 : hiPrec ? 4 : 2;
      row.val = +q.price.toFixed(dec);
      row.d1  = +q.chg.toFixed(dec);
      row.pct = +q.pct.toFixed(3);
      anyOk = true;
    });
    if(i+4 < pairs.length) await new Promise(r=>setTimeout(r,150));
  }
  if(anyOk) markFresh('FX'); else markStale('FX','all FX fetches failed');
}

const INDEX_SYMS = ['^GSPC','^IXIC','^DJI','^RUT','^VIX'];
async function fetchEquityIndices(){
  markPending('EQ');
  // Stagger fetches 300ms apart to reduce proxy rate-limit hits
  const allResults = [];
  for(const sym of INDEX_SYMS){
    const result = await Promise.race([
      (async()=>{
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=5d`;
        const r = await proxyFetch(url, 9000);
        const d = await r.json();
        const m = d?.chart?.result?.[0]?.meta;
        if(!m) throw new Error('no meta');
        return {status:'fulfilled', value:{ sym, price: m.regularMarketPrice, prev: m.chartPreviousClose, marketState: m.marketState||'REGULAR' }};
      })().catch(e=>({status:'rejected',reason:e})),
    ]);
    allResults.push(result);
    await new Promise(r=>setTimeout(r,350));
  }
  const results = allResults;
  let anyOk = false;
  results.forEach((r, i) => {
    if(r.status !== 'fulfilled') return;
    const {price, prev} = r.value;
    const idx = D.equities.indices[i];
    if(!idx || !price) return;
    idx.val = price;
    idx.chg = +(price - prev).toFixed(2);
    idx.pct = +((price-prev)/prev*100).toFixed(2);
    if(i===0) D._marketState = r.value.marketState; // store for HOME tile display
    anyOk = true;
  });
  if(anyOk) markFresh('EQ');
  else markStale('EQ','yahoo indices failed');
}

    const row = allRows.find(c => c.name === name);
    if(!row || !price) return;
    row.spot = price;
    row.d1   = +((price-prev)/prev*100).toFixed(2);
    anyOk = true;
  });
  if(anyOk) markFresh('CMDTY');
  else markStale('CMDTY','yahoo cmdty failed');
}

const SECTOR_ETF_MAP = [
  {etf:'XLK', name:'Tech'},
  {etf:'XLF', name:'Financials'},
  {etf:'XLV', name:'Healthcare'},
  {etf:'XLE', name:'Energy'},
  {etf:'XLI', name:'Industrials'},
  {etf:'XLY', name:'Cons Disc'},
  {etf:'XLC', name:'Comm Svc'},
  {etf:'XLB', name:'Materials'},
  {etf:'XLU', name:'Utilities'},
  {etf:'XLRE',name:'Real Estate'},
  {etf:'XLP', name:'Cons Staples'},
];
async function fetchSectorETFs(){
  // Batch into 3 groups with 300ms delay between to avoid overwhelming proxy
  const groups = [
    SECTOR_ETF_MAP.slice(0,4),
    SECTOR_ETF_MAP.slice(4,8),
    SECTOR_ETF_MAP.slice(8),
  ];
  const updated = [];
  for(const group of groups){
    const results = await Promise.allSettled(group.map(async s => {
      const url = `https://query1.finance.yahoo.com/v8/finance/chart/${s.etf}?interval=1d&range=5d`;
      const r = await proxyFetch(url, 9000);
      const d = await r.json();
      const m = d?.chart?.result?.[0]?.meta;
      if(!m) throw new Error('no meta');
      const price = m.regularMarketPrice;
      const prev  = m.chartPreviousClose || price;
      const d1    = +((price-prev)/prev*100).toFixed(2);
      const closes= d?.chart?.result?.[0]?.indicators?.quote?.[0]?.close?.filter(Boolean)||[];
      const weekAgo = closes[Math.max(0,closes.length-6)] || closes[0] || prev;
      const w1    = +((price-weekAgo)/weekAgo*100).toFixed(2);
      return { name:s.name, etf:s.etf, d1, w1, mcap:s.mcap };
    }));
    results.forEach(r => { if(r.status==='fulfilled') updated.push(r.value); });
    await new Promise(res => setTimeout(res, 300));
  }
  if(updated.length > 0){
    D.equities.sectors = updated;
    }
}

function classifyNewsTag(title){
  const t = title.toLowerCase();
  if(/fed|fomc|central bank|ecb|boj|boe|rate|yield|treasury|inflation|cpi|pce|gdp|jobs|payroll|unemployment|recession/.test(t)) return 'macro';
  if(/oil|wti|brent|opec|gas|energy|crude|lng|pipeline/.test(t)) return 'energy';
  if(/credit|bond|spread|default|high.yield|investment.grade|cds|debt/.test(t)) return 'credit';
  if(/war|sanction|geopolit|military|conflict|attack|election|tariff|trade/.test(t)) return 'geo';
  if(/stock|earnings|revenue|profit|ipo|merger|acquisition|nasdaq|s&p|equity|shares/.test(t)) return 'eq';
  return 'macro';
}

const NEWS_RSS = [
  {url:'https://finance.yahoo.com/rss/topstories',              src:'YAHOO'},
  {url:'https://feeds.a.dj.com/rss/RSSMarketsMain.xml',         src:'WSJ'},
  {url:'https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=10000664', src:'CNBC'},
  {url:'https://feeds.nbcnews.com/nbcnews/public/business',      src:'NBC'},
];

async function fetchRSSFeed(feedUrl, src){
  const r = await proxyFetch(feedUrl, 14000);
  const text = await r.text();
  const xml  = new DOMParser().parseFromString(text, 'text/xml');
  return [...xml.querySelectorAll('item')].slice(0,12).map(item => {
    const title   = item.querySelector('title')?.textContent?.trim() || '';
    const link    = item.querySelector('link')?.textContent?.trim() || '';
    const pubDate = new Date(item.querySelector('pubDate')?.textContent || Date.now());
    const desc    = item.querySelector('description')?.textContent?.trim() || '';
    return { src, tag: classifyNewsTag(title), hl: title, detail: desc, url: link, pubDate,
             ts: pubDate.toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'America/Denver'})+' '+pubDate.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'America/Denver'}) };
  }).filter(n => n.hl);
}

async function fetchFREDData(){

    {id:'UNRATE',     label:'Unemployment Rate',     fmt: v=>v.toFixed(1)+'%'},
    {id:'PAYEMS',     label:'Nonfarm Payrolls',      fmt: v=>(v>0?'+':'')+Math.round(v)+'K'},

    {id:'MORTGAGE30US',label:'30Y Mortgage Rate',    fmt: v=>v.toFixed(2)+'%'},
    {id:'ICSA',       label:'Initial Claims',        fmt: v=>Math.round(v)+'K'},
    // Credit spreads (OAS in basis points)
    {id:'BAMLH0A0HYM2',  label:'HY OAS Spread',      fmt: v=>Math.round(v)+'bp'},
    {id:'BAMLC0A4CBBBEY', label:'BBB OAS Spread',     fmt: v=>Math.round(v)+'bp'},
  ];
  markPending('FRED');
  if(!D.macro.fred) D.macro.fred = {};
  let anyOk = false;
  for(const s of series){
    try{
      // For index-level series, request pch (monthly % change) to get true MoM%
      const needsPch = ['CPIAUCSL','CPILFESL','PCEPILFE','INDPRO','RETAILSMNSA'].includes(s.id);
      const units = needsPch ? '&units=pch' : '';

  }

  else markStale('FRED','all series failed');
}

// ── RESOLVER ──
function resolveQuery(raw) {
  const q = raw.trim().toUpperCase();
  if(!q) return null;
  const parts = q.split(/\s+/);
  const first = parts[0], rest = parts.slice(1).join(' ');

  // 1. Exact key match in corpus
  const corpus = buildSearchCorpus();
  const exact = corpus.find(c => c.key === q);
  if(exact) return {type:exact.type, target:q, entry:exact, matches:[exact]};

  // 2. Treasury bond patterns — UST2Y, UST10Y, UST-10, 10Y, 2Y etc.
  const ustMatch = q.match(/^UST[-\s]?(\d+[MY])$/) || q.match(/^(\d+[MY])$/)
                   || q.match(/^T(\d+[MY])$/);
  if(ustMatch){
    const tenor = (ustMatch[1]||ustMatch[0]).replace('T','');
    const row = D.fixedIncome.treasuries.find(t=>t.tenor===tenor);
    if(row) return {type:'bond', target:'UST'+tenor,
      entry:{key:'UST'+tenor, label:`${tenor} Treasury`, meta:`${row.yield.toFixed(3)}%`, type:'bond', action:()=>OW('FI')},
      matches:[]};
  }

  // 3. Known equity ticker — open EQS
  if(/^[A-Z]{1,5}$/.test(q) && !['FX','FI','EQ','CB','US','UK','EU','DE','JP','CN','AU','CA'].includes(q)){
    return {type:'equity', target:q,
      entry:{key:q, label:`${q} — Equity Search`, meta:API_KEYS.FMP?'FMP live data':'add FMP key', type:'equity', action:()=>OW('EQS',q)},
      matches:[]};
  }

  // 5. Known FX pair
  const fxRow = D.fx.find(f=>f.name.toUpperCase()===q||f.name.replace('/','').toUpperCase()===q);
  if(fxRow) return {type:'fx', target:fxRow.name,
    entry:{key:fxRow.name, label:fxRow.name, meta:`${fxRow.val}`, type:'fx', action:()=>OW('FX')},
    matches:[]};

  // 6. Panel command pass-through
  const panelCmds = ['FI','EQ','FX','CMDTY','MACRO','EQS','HELP','HEAT','SCRN','CB','WATCH','CHART'];
  if(panelCmds.includes(first)){
    return {type:'command', target:first, extra:rest||null,
      entry:{key:first, label:first, meta:'', type:'command', action:()=>OW(first, rest||null)},
      matches:[]};
  }

  // 7. Fuzzy / partial — collect candidates
  const matches = corpus.filter(c=>{
    const k = c.key.toUpperCase();
    const l = c.label.toUpperCase();
    return k.startsWith(q) || l.includes(q) || k.includes(q);
  }).slice(0,12);

  if(matches.length === 1) return {type:matches[0].type, target:matches[0].key,
    entry:matches[0], matches:[]};
  if(matches.length > 1)   return {type:'ambiguous', target:q, matches, entry:null};

  return {type:'no-match', target:q, matches:[], entry:null};
}

// ── FX CALCULATOR ──
function fxCalc(){
  const amtEl  = document.getElementById('fxc-amount');
  const fromEl = document.getElementById('fxc-from');
  const toEl   = document.getElementById('fxc-to');
  const resEl  = document.getElementById('fxc-result');
  const rateEl = document.getElementById('fxc-rate-box');
  if(!amtEl||!fromEl||!toEl||!resEl) return;

  const amt      = parseFloat(amtEl.value) || 0;
  const fromRate = parseFloat(fromEl.value) || 1; // rate vs USD
  const toRate   = parseFloat(toEl.value)   || 1;
  const fromName = fromEl.options[fromEl.selectedIndex]?.getAttribute('data-name') || 'USD';
  const toName   = toEl.options[toEl.selectedIndex]?.getAttribute('data-name')   || 'USD';

  // All rates stored as X per USD (e.g. EURUSD=1.08 means 1 USD = 1.08 EUR... actually
  // depends on convention. Our D.fx stores the rate as the pair value.
  // For USD base: from USD to EUR = multiply by EURUSD rate
  // For non-USD: convert via USD bridge
  //   amtFrom → USD: amtFrom / fromRate (if pair is XXXUSD) 
  //   Actually our pairs are stored as the pair price e.g. EURUSD = 1.0850
  //   meaning 1 EUR = 1.0850 USD → to go FROM EUR: amtEUR * 1.0850 = amtUSD
  //   to go FROM USD to EUR: amtUSD / 1.0850

  let result;
  if(fromName==='USD'){
    // USD → foreign: divide by rate (rate = foreign per USD... actually EURUSD=1.08 means 1 EUR = 1.08 USD)
    // So USD→EUR = amtUSD / EURUSD
    result = amt / toRate;
  } else if(toName==='USD'){
    // foreign → USD: multiply by rate
    result = amt * fromRate;
  } else {
    // cross rate: from → USD → to
    const amtUSD = amt * fromRate;
    result = amtUSD / toRate;
  }

  const crossRate = fromName==='USD' ? (1/toRate) : toName==='USD' ? fromRate : fromRate/toRate;
  const inv = 1/crossRate;

  resEl.textContent = result.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:4});
  if(rateEl){
    rateEl.innerHTML = `
      <span style="color:#c8c8c8">1 ${fromName}</span>
      <span style="color:#555"> = </span>
      <span style="color:var(--amber);font-weight:600">${crossRate.toFixed(4)} ${toName}</span>
      &nbsp;&nbsp;
      <span style="color:#555">|</span>
      &nbsp;&nbsp;
      <span style="color:#c8c8c8">1 ${toName}</span>
      <span style="color:#555"> = </span>
      <span style="color:var(--amber);font-weight:600">${inv.toFixed(4)} ${fromName}</span>
      <span style="color:#707070;font-size:9px;margin-left:8px">LIVE RATE</span>`;
  }
}

function fxSwapCalc(){
  const fromEl = document.getElementById('fxc-from');
  const toEl   = document.getElementById('fxc-to');
  if(!fromEl||!toEl) return;
  const tmpVal  = fromEl.value;
  const tmpIdx  = fromEl.selectedIndex;
  // Swap selected options by matching value
  const toVal = toEl.value;
  const toIdx = toEl.selectedIndex;
  fromEl.selectedIndex = toIdx;
  // Find matching option in toEl
  for(let i=0;i<toEl.options.length;i++){
    if(toEl.options[i].value===tmpVal){ toEl.selectedIndex=i; break; }
  }
  fxCalc();
}
function fxSetPreset(from, to, amt){
  const amtEl  = document.getElementById('fxc-amount');
  const fromEl = document.getElementById('fxc-from');
  const toEl   = document.getElementById('fxc-to');
  if(!amtEl||!fromEl||!toEl) return;
  amtEl.value = amt;
  // Find matching options by data-name attribute
  for(let i=0;i<fromEl.options.length;i++){
    if(fromEl.options[i].getAttribute('data-name')===from){ fromEl.selectedIndex=i; break; }
  }
  for(let i=0;i<toEl.options.length;i++){
    if(toEl.options[i].getAttribute('data-name')===to){ toEl.selectedIndex=i; break; }
  }
  fxCalc();
}



function fxSetPair(pairName){
  // pairName like "EURUSD" — set FROM to the base ccy, TO to USD (or reverse if USD base)
  const fromEl = document.getElementById('fxc-from');
  const toEl   = document.getElementById('fxc-to');
  if(!fromEl||!toEl) return;
  // Switch FX tab to calculator
  switchTab('fx-tabs','fx-calc');
  // Find the pair in FROM select and select it; TO = USD
  for(let i=0;i<fromEl.options.length;i++){
    if(fromEl.options[i].getAttribute('data-name')===pairName){
      fromEl.selectedIndex=i; break;
    }
  }
  toEl.selectedIndex=0; // USD
  fxCalc();
}

function buildMarketSummary(){
  try{
    const spx   = D.equities.indices[0];
    const ndx   = D.equities.indices[1];
    const vix   = D.equities.indices[4];
    const t     = D.fixedIncome.treasuries;
    const y10   = t.find(x=>x.tenor==='10Y')?.yield ?? 0;
    const y2    = t.find(x=>x.tenor==='2Y')?.yield  ?? 0;
    const spread= (y10-y2)*100;
    const gold  = D.commodities.metals[0];
    const wti   = D.commodities.energy[0];
    const dxy   = D.fx.find(f=>f.name==='DXY');
    const sectors = D.equities.sectors||[];
    const topSec  = sectors.length ? [...sectors].sort((a,b)=>b.d1-a.d1)[0] : null;
    const botSec  = sectors.length ? [...sectors].sort((a,b)=>a.d1-b.d1)[0] : null;
    const advSec  = sectors.filter(s=>s.d1>0).length;
    const decSec  = sectors.filter(s=>s.d1<0).length;

    // If core data not yet loaded, show loading state
    if(spx.val==null && vix.val==null){
      return `<div style="padding:6px 10px;font-size:10px;color:#555;letter-spacing:1px;border-bottom:1px solid var(--border);background:var(--bg1)">
        LOADING MARKET DATA…
      </div>`;
    }

    const lines = [];
    const spxPct  = spx.pct ?? 0;
    const ndxPct  = ndx.pct ?? 0;
    const spxDir  = spxPct > 0.5 ? 'rallying' : spxPct < -0.5 ? 'selling off' : spxPct > 0 ? 'edging higher' : 'drifting lower';
    const spxMag  = Math.abs(spxPct) > 1.5 ? 'sharply ' : Math.abs(spxPct) > 0.7 ? '' : 'modestly ';
    lines.push(`Equities ${spxMag}${spxDir} — S&P 500 ${spxPct>=0?'+':''}${spxPct.toFixed(2)}% · NASDAQ ${ndxPct>=0?'+':''}${ndxPct.toFixed(2)}%.`);

    if(sectors.length){
      if(advSec > decSec) lines.push(`Broad participation: ${advSec}/${sectors.length} sectors advancing.`);
      else if(decSec > advSec) lines.push(`Risk-off: ${decSec}/${sectors.length} sectors declining.`);
      if(topSec && botSec) lines.push(`${topSec.name} leads (+${topSec.d1.toFixed(2)}%), ${botSec.name} lags (${botSec.d1.toFixed(2)}%).`);
    }

    if(vix.val!=null){
      const vixTxt = vix.val < 15 ? `VIX low at ${vix.val.toFixed(1)} — complacency territory.`
                   : vix.val < 20 ? `VIX moderate at ${vix.val.toFixed(1)}, near historical average.`
                   : vix.val < 30 ? `VIX elevated at ${vix.val.toFixed(1)}, market anxiety elevated.`
                   : `VIX spiking at ${vix.val.toFixed(1)} — significant stress.`;
      lines.push(vixTxt);
    }

    if(y10 > 0){
      const curveShape = spread > 20 ? 'steepening' : spread > 0 ? 'flat' : 'inverted';
      const d1_10 = t.find(x=>x.tenor==='10Y')?.d1 ?? 0;
      const rateDir = d1_10 > 0 ? 'rising' : d1_10 < 0 ? 'falling' : 'unchanged';
      lines.push(`Rates: 10Y ${rateDir} at ${y10.toFixed(3)}% · 2s10s ${spread>=0?'+':''}${spread.toFixed(0)}bp (${curveShape}).`);
    }

    if(gold.spot!=null && wti.spot!=null){
      const goldChg = gold.d1!=null ? ` (${gold.d1>=0?'+':''}${gold.d1.toFixed(2)}%)` : '';
      const wtiChg  = wti.d1!=null  ? ` (${wti.d1>=0?'+':''}${wti.d1.toFixed(2)}%)`  : '';
      lines.push(`Commodities: Gold $${gold.spot.toFixed(0)}${goldChg} · WTI $${wti.spot.toFixed(2)}${wtiChg}.`);
    }
    if(dxy?.val!=null){
      lines.push(`DXY ${dxy.d1>=0?'+':''}${(dxy.d1??0).toFixed(2)} at ${dxy.val.toFixed(2)}.`);
    }

    return `<div style="padding:10px 12px;border-bottom:1px solid var(--border);background:#020202">
      <div style="display:flex;flex-wrap:wrap;gap:4px 20px">
        ${lines.map((line,i)=>`<span style="font-size:${i===0?'13':'12'}px;color:${i===0?'var(--text-bright)':'#bbb'};letter-spacing:.2px;line-height:1.6">${line}</span>`).join('')}
      </div>
    </div>`;
  }catch(e){
    return `<div style="padding:7px 10px;font-size:10px;color:#555;border-bottom:1px solid var(--border)">
      MARKET SUMMARY LOADING…
    </div>`;
  }
}

function switchHeatMode(mode){

// ── MODE: Sector performance heatmap ──
function drawHeatSector(){
  const canvas=document.getElementById('heat-canvas'); if(!canvas)return;
  const wrap=canvas.parentElement;
  const W=wrap.offsetWidth-16, H=Math.max(wrap.offsetHeight-90,200);
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,W,H);

  const sectors=D.equities.sectors;
  // Treemap-like layout: weight tiles by mcap
  if(!sectors.length){ ctx.fillStyle='#444'; ctx.font='10px monospace'; ctx.fillText('Sector data loading…',10,20); return; }
  const cols=4, rows=Math.ceil(sectors.length/cols);
  const pad=2;
  const tW=Math.floor(W/cols), tH=Math.floor(H/rows);

  sectors.forEach((s,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    const x=col*tW+pad, y=row*tH+pad, w=tW-pad*2, h=tH-pad*2;
    // Color by 1D change
    const v=s.d1;
    const bg=heatColor(v,-2,2);
    ctx.fillStyle=bg; ctx.fillRect(x,y,w,h);
    // Border
    ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1; ctx.strokeRect(x,y,w,h);
    // Name
    ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(x,y,w,Math.min(h,14));
    ctx.fillStyle=v>0.2?'rgba(255,255,255,0.9)':'rgba(200,200,200,0.85)';
    ctx.font='bold 9px IBM Plex Mono'; ctx.textAlign='center';
    ctx.fillText(s.name, x+w/2, y+10);
    // Value
    ctx.font='bold 13px IBM Plex Mono';
    ctx.fillStyle=v>0?'#c8ffd4':v<0?'#ffc8c8':'#ccc';
    ctx.fillText((v>0?'+':'')+v.toFixed(2)+'%', x+w/2, y+h/2+5);
    // Sub: 1W
    ctx.font='9px IBM Plex Mono'; ctx.fillStyle='rgba(200,200,200,0.5)';
    ctx.fillText('1W '+(s.w1>0?'+':'')+s.w1.toFixed(1)+'%', x+w/2, y+h-8);
    ctx.textAlign='left';
  });

  // Legend
  const leg=document.getElementById('heat-legend'); if(!leg)return;
  leg.innerHTML=`
    <span style="color:var(--text-dim);font-size:9px">SCALE: 1D CHANGE &nbsp;</span>
    ${[-2,-1,0,1,2].map(v=>`<div class="heat-leg-item">
      <div class="heat-leg-swatch" style="background:${heatColor(v,-2,2)}"></div>
      <span style="color:var(--text-dim)">${v>0?'+':''}${v}%</span>
    </div>`).join('')}
    <span style="color:var(--text-dim);margin-left:8px">CLICK SECTOR → SCRN</span>`;
  canvas.onclick=e=>{
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    const ci=Math.floor(mx/tW), ri=Math.floor(my/tH);
    const idx=ri*cols+ci;
    if(idx>=0&&idx<sectors.length){
      const s=sectors[idx];
      const det=document.getElementById('heat-detail');
      if(det) det.innerHTML=`<span style="color:var(--amber)">${s.name}</span> &nbsp; 1D: <span class="${s.d1>=0?'up':'dn'}">${s.d1>=0?'+':''}${s.d1.toFixed(2)}%</span> &nbsp; 1W: <span class="${s.w1>=0?'up':'dn'}">${s.w1>=0?'+':''}${s.w1.toFixed(2)}%</span>`;
    }
  };
}

// ── MODE: Treasury curve heatmap ──
function drawHeatCurve(){
  const canvas=document.getElementById('heat-canvas'); if(!canvas)return;
  const wrap=canvas.parentElement;
  const W=wrap.offsetWidth-16, H=Math.max(wrap.offsetHeight-90,180);
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,W,H);

  const tenors=D.fixedIncome.treasuries;
  const n=tenors.length;
  const bw=Math.floor((W-40)/n)-2, bh=H-60;
  const yMin=Math.min(...tenors.map(t=>t.yield))-0.1;
  const yMax=Math.max(...tenors.map(t=>t.yield))+0.1;

  tenors.forEach((t,i)=>{
    const x=40+i*(bw+2);
    const fillH=Math.max(4,((t.yield-yMin)/(yMax-yMin))*bh);
    const y=H-30-fillH;
    // Color by 1D change
    const bg=heatColor(t.d1,-0.08,0.08);
    ctx.fillStyle=bg; ctx.fillRect(x,y,bw,fillH);
    ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1;ctx.strokeRect(x,y,bw,fillH);
    // Tenor label
    ctx.fillStyle='#444'; ctx.font='8px IBM Plex Mono'; ctx.textAlign='center';
    ctx.fillText(t.tenor, x+bw/2, H-14);
    // Yield label
    ctx.fillStyle='#aaa'; ctx.font='bold 9px IBM Plex Mono';
    ctx.fillText(t.yield.toFixed(2), x+bw/2, y-3);
    // Change
    ctx.fillStyle=t.d1>0?'#00c853':t.d1<0?'#e53935':'#555';
    ctx.font='8px IBM Plex Mono';
    ctx.fillText((t.d1>0?'+':'')+t.d1.toFixed(3), x+bw/2, y+fillH/2+4);
    ctx.textAlign='left';
  });

  // Y-axis labels
  ctx.fillStyle='#333'; ctx.font='8px IBM Plex Mono'; ctx.textAlign='right';
  [0,.25,.5,.75,1].forEach(f=>{
    const yv=yMin+(yMax-yMin)*f;
    const py=H-30-f*bh;
    ctx.fillText(yv.toFixed(2)+'%',36,py+3);
    ctx.strokeStyle='#111';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(40,py);ctx.lineTo(W,py);ctx.stroke();
  });
  ctx.textAlign='left';

  // Spread annotations
  const y2=tenors.find(x=>x.tenor==='2Y')?.yield??0;
  const y10=tenors.find(x=>x.tenor==='10Y')?.yield??0;
  const s=((y10-y2)*100).toFixed(1);
  const leg=document.getElementById('heat-legend'); if(!leg)return;
  leg.innerHTML=`
    <span style="color:var(--text-dim)">2s10s: <span style="color:${y10>y2?'var(--green)':'var(--red)'}">${y10>y2?'+':''}${s}bp</span></span>
    &nbsp;&nbsp;
    ${[-0.08,-0.04,0,0.04,0.08].map(v=>`<div class="heat-leg-item">
      <div class="heat-leg-swatch" style="background:${heatColor(v,-0.08,0.08)}"></div>
      <span style="color:var(--text-dim)">${v>0?'+':''}${(v*100).toFixed(0)}bp</span>
    </div>`).join('')}
    <span style="color:var(--text-dim);margin-left:4px">COLOR = 1D CHANGE</span>`;
}

// ── Shared heat color function ──
function heatColor(v, lo, hi){
  const t=Math.max(0,Math.min(1,(v-lo)/(hi-lo)));
  if(t<0.5){
    const f=t*2;
    const r=Math.round(160+60*f), g=Math.round(20+30*f), b=Math.round(20);
    return `rgb(${r},${g},${b})`;
  } else {
    const f=(t-0.5)*2;
    const r=Math.round(20+20*f), g=Math.round(80+100*f), b=Math.round(20+20*f);
    return `rgb(${r},${g},${b})`;
  }
}

// ── WATCHLIST DRAG-TO-REORDER ──
let _wlDragTicker = null;

function wlDragStart(e, ticker){
  _wlDragTicker = ticker;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', ticker);
  const row = document.getElementById('wlr-'+ticker);
  if(row) setTimeout(()=>row.style.opacity='0.4', 0);
}

function wlDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  // Highlight target row
  const row = e.currentTarget;
  document.querySelectorAll('#wl-tbody tr').forEach(r=>r.style.background='');
  if(row) row.style.background = '#0d1a0d';
}

function wlDrop(e, targetTicker){
  e.preventDefault();
  if(!_wlDragTicker || _wlDragTicker === targetTicker) return;
  const fromIdx = WL.indexOf(_wlDragTicker);
  const toIdx   = WL.indexOf(targetTicker);
  if(fromIdx === -1 || toIdx === -1) return;
  WL.splice(fromIdx, 1);
  WL.splice(toIdx, 0, _wlDragTicker);
  wlSave();
  wlRefresh();
}

function wlDragEnd(e){
  _wlDragTicker = null;
  document.querySelectorAll('#wl-tbody tr').forEach(r=>{
    r.style.opacity = '';
    r.style.background = '';
  });
}


function wlAdd(ticker){
  const t = ticker.toUpperCase().trim();
  if(!t || WL.includes(t)) return;
  WL.push(t);
  wlSave();
  wlRefresh();
}
function wlRemove(ticker){
  WL = WL.filter(t=>t!==ticker);
  wlSave();
  wlRefresh();
}
function wlToggle(ticker){
  if(WL.includes(ticker.toUpperCase())) wlRemove(ticker.toUpperCase());
  else wlAdd(ticker.toUpperCase());
  // Update star button in EQS if open
  document.querySelectorAll('[data-wl-star]').forEach(btn=>{
    if(btn.getAttribute('data-wl-star')===ticker.toUpperCase()){
      btn.textContent = WL.includes(ticker.toUpperCase()) ? '★' : '☆';
      btn.style.color  = WL.includes(ticker.toUpperCase()) ? '#ffab00' : '#555';
    }
  });
}
