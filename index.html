<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERMINAL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap');
@import url('https://unpkg.com/leaflet@1.9.4/dist/leaflet.css');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--bg1:#0a0a0a;--bg2:#0f0f0f;--bg3:#141414;--bg4:#1a1a1a;
  --border:#1e1e1e;--border2:#262626;--border3:#2e2e2e;
  --text:#cccccc;--text-dim:#707070;--text-mid:#a0a0a0;--text-bright:#f0f0f0;
  --green:#00c853;--red:#e53935;--amber:#ffab00;--blue:#1565c0;--cyan:#00acc1;
  --purple:#7b1fa2;--orange:#e65100;
  --font:'IBM Plex Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.45}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#222}

/* ── TICKER TAPE ── */
#ticker-tape{
  height:20px;background:#050505;border-bottom:1px solid #111;
  overflow:hidden;white-space:nowrap;position:relative;
}
#ticker-inner{
  display:inline-block;
  animation:tickerScroll 90s linear infinite;
  padding-left:100%;
}
#ticker-inner:hover{animation-play-state:paused}
@keyframes tickerScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ti{display:inline-block;margin:0 16px;font-size:10px;line-height:20px;letter-spacing:.5px}
.ti-sym{color:#555;margin-right:4px}
.ti-px{color:#888;margin-right:3px}
.ti-up{color:#00c853}
.ti-dn{color:#e53935}
.ti-sep{color:#1a1a1a;margin:0 4px}

/* ── TOPBAR ── */
#topbar{
  height:30px;background:var(--bg1);border-bottom:1px solid var(--border2);
  display:flex;align-items:center;padding:0 8px;gap:10px;z-index:2000;position:relative;
}
#logo{color:var(--amber);font-weight:600;font-size:12px;letter-spacing:3px;white-space:nowrap}
#cmdwrap{flex:1;display:flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border2);padding:0 6px}
#cmdprompt{color:var(--text-dim);font-family:var(--font);font-size:11px}
#cmdbar{
  flex:1;background:transparent;border:none;color:var(--text-bright);
  font-family:var(--font);font-size:12px;outline:none;caret-color:var(--amber);
}
#cmdbar::placeholder{color:var(--text-dim)}
#topright{display:flex;align-items:center;gap:10px}
#mktstrip{display:flex;gap:8px}
.strip-item{display:flex;gap:4px;font-size:11px;white-space:nowrap}
.strip-name{color:#888}
.strip-val{color:var(--text-bright)}
#clock{color:#a0a0a0;font-size:11px;white-space:nowrap}
#livebadge{color:var(--green);font-size:10px;border:1px solid #1a3a1a;padding:1px 5px;background:#0a1a0a}

/* ── SHORTCUT BAR ── */
#shortcuts{
  height:32px;background:#060606;border-bottom:1px solid #1a1a1a;
  display:flex;align-items:stretch;padding:0 6px 0 0;gap:0;z-index:1999;overflow:hidden;
}
/* HOME — amber/gold, separated by a gap */
.scbtn-home{
  background:transparent;border:none;border-right:2px solid #2a2000;
  color:#b07800;font-family:var(--font);font-size:12px;font-weight:700;
  padding:0 16px 0 12px;cursor:pointer;height:100%;white-space:nowrap;letter-spacing:1px;
  margin-right:8px;border-right-width:0;
  position:relative;
}
.scbtn-home::after{content:'';position:absolute;right:0;top:20%;height:60%;width:1px;background:#2a2000;}
.scbtn-home:hover{color:var(--amber);background:#0f0a00}
/* Market data group — blue tint */
.scbtn-market{
  background:transparent;border:none;
  color:#5a7a9a;font-family:var(--font);font-size:11px;
  padding:0 12px;cursor:pointer;height:100%;white-space:nowrap;letter-spacing:.5px;
  border-bottom:2px solid transparent;
}
.scbtn-market:hover{color:#88bbdd;background:#050a0f;border-bottom-color:#1a3a5a}
/* Fixed income / rates — green tint */
.scbtn-rates{
  background:transparent;border:none;
  color:#3a7a5a;font-family:var(--font);font-size:11px;
  padding:0 12px;cursor:pointer;height:100%;white-space:nowrap;letter-spacing:.5px;
  border-bottom:2px solid transparent;
}
.scbtn-rates:hover{color:#55bb88;background:#050f0a;border-bottom-color:#1a4a2a}
/* Macro / news group — muted orange */
.scbtn-macro{
  background:transparent;border:none;
  color:#7a5a2a;font-family:var(--font);font-size:11px;
  padding:0 12px;cursor:pointer;height:100%;white-space:nowrap;letter-spacing:.5px;
  border-bottom:2px solid transparent;
}
.scbtn-macro:hover{color:#cc9944;background:#0f0a05;border-bottom-color:#4a3010}
/* Tools group — muted cyan */
.scbtn-tool{
  background:transparent;border:none;
  color:#2a6a7a;font-family:var(--font);font-size:11px;
  padding:0 12px;cursor:pointer;height:100%;white-space:nowrap;letter-spacing:.5px;
  border-bottom:2px solid transparent;
}
.scbtn-tool:hover{color:#44aacc;background:#05090f;border-bottom-color:#1a4a5a}
/* divider between groups */
.sc-div{width:1px;background:#1a1a1a;margin:6px 4px;flex-shrink:0}
/* legacy .scbtn fallback */
.scbtn{background:transparent;border:none;color:var(--text-dim);font-family:var(--font);font-size:11px;padding:0 12px;cursor:pointer;height:100%;white-space:nowrap;letter-spacing:.5px;}
.scbtn:hover{color:var(--amber);background:var(--bg2)}
.scbtn .k{display:none}
#sc-right{margin-left:auto;color:#252525;font-size:9px;white-space:nowrap;flex-shrink:0;padding:0 8px;align-self:center}

/* ── WORKSPACE ── */
#workspace{
  position:relative;width:100%;height:calc(100vh - 70px);
  background:var(--bg);
  background-image:linear-gradient(rgba(20,20,20,0.4) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(20,20,20,0.4) 1px,transparent 1px);
  background-size:60px 60px;
  overflow:hidden;
}

/* ── WELCOME ── */
#welcome{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;pointer-events:none;user-select:none;
}
#welcome .wt{font-size:22px;font-weight:600;color:#141414;letter-spacing:10px}
#welcome .ws{font-size:9px;color:#181818;letter-spacing:4px;margin-top:6px}
#welcome .wg{margin-top:20px;display:flex;flex-wrap:wrap;gap:4px;justify-content:center;max-width:600px}
#welcome .wc{background:transparent;border:1px solid #141414;color:#1e1e1e;font-family:var(--font);font-size:9px;padding:2px 8px}

/* ── WINDOWS ── */
.win{
  position:absolute;background:var(--bg1);border:1px solid var(--border2);
  display:flex;flex-direction:column;min-width:300px;min-height:180px;
}
.win.z-top{border-color:var(--border3)}
.win.win-fullscreen{
  position:fixed!important;top:0!important;left:0!important;
  width:100vw!important;height:100vh!important;
  z-index:9000!important;border:2px solid var(--border3)!important;
  border-radius:0;
}
.wh{
  height:28px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 8px;cursor:move;user-select:none;
  gap:6px;flex-shrink:0;
}
.wh-cmd{color:var(--amber);font-size:10px;font-weight:600;letter-spacing:1px}
.wh-title{color:var(--text-dim);font-size:10px}
.wh-ts{color:#2e2e2e;font-size:9px;margin-left:auto}
.wh-close{
  width:20px;height:20px;background:#1a0a0a;border:1px solid #442222;
  color:#884444;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-left:4px;border-radius:2px;
}
.wh-close:hover{background:var(--red);color:#fff;border-color:var(--red)}
.wh-fs{
  width:20px;height:20px;background:#0a0a0a;border:1px solid #333;
  color:#555;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-left:2px;border-radius:2px;
}
.wh-fs:hover{background:#1a1a00;color:var(--amber);border-color:#3a2a00}
.wh-refresh{
  width:20px;height:20px;background:#0a0a0a;border:1px solid #333;
  color:#444;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-left:2px;border-radius:2px;
}
.wh-refresh:hover{background:#001a0a;color:var(--green);border-color:#1a3a1a}
.wb{flex:1;overflow:auto;font-size:11px;padding:6px}
.wb:has(.ptabs-container){overflow:hidden;padding:0}
.wr{position:absolute;bottom:0;right:0;width:10px;height:10px;cursor:se-resize;
    background:linear-gradient(135deg,transparent 50%,#222 50%)}


.ptabs-container{display:flex;flex-direction:column;height:100%}
.ptabs{display:flex;gap:0;border-bottom:2px solid #1a1a1a;flex-shrink:0;background:#050505}
.ptab{padding:5px 16px;font-size:10px;color:#686868;cursor:pointer;border-bottom:2px solid transparent;letter-spacing:.8px;white-space:nowrap;margin-bottom:-2px;transition:color .1s}
.ptab:hover{color:var(--amber);background:#0a0a0a}
.ptab.active{color:var(--amber);border-bottom-color:var(--amber);background:#080808}
.ptabs-body{flex:1;overflow:auto;min-height:0}
.psection{display:none}
.psection.active{display:block}

/* ── COMMON TABLE ── */
.t{width:100%;border-collapse:collapse;font-size:11px}
.t th{color:#3a3a3a;font-size:10px;font-weight:600;text-align:right;padding:2px 6px;
      border-bottom:1px solid var(--border);white-space:nowrap;letter-spacing:0.5px}
.t th:first-child{text-align:left}
.t td{font-size:11px;padding:3px 6px;border-bottom:1px solid #0d0d0d;text-align:right;white-space:nowrap;color:#c8c8c8}
.t td:first-child{text-align:left;color:var(--text-bright)}
.t tr:hover td{background:var(--bg2)}
.t .up{color:var(--green)}
.t .dn{color:var(--red)}
.t .neu{color:var(--text-dim)}
.t .hl{color:var(--amber)}
.t .w{color:var(--text-mid)}

/* Section label */
.sl{color:var(--amber);font-size:9px;font-weight:600;letter-spacing:1.5px;
    padding:4px 0 2px;border-bottom:1px solid #111;margin-bottom:2px}
.sl2{color:#2a2a2a;font-size:9px;letter-spacing:1px;padding:3px 0 2px;border-bottom:1px solid #0d0d0d;margin-bottom:1px}

/* Metric rows */
.mr{display:flex;gap:8px;padding:2px 0;font-size:11px;border-bottom:1px solid #0a0a0a}
.ml{color:var(--text-dim);flex:1}
.mv{color:var(--text-bright)}

/* Spreads footer */
.sf{display:flex;gap:14px;padding:3px 0;font-size:11px;border-top:1px solid var(--border);margin-top:3px;flex-wrap:wrap}
.si{display:flex;gap:5px}
.sil{color:#909090}
.siv{color:var(--amber);font-weight:600}

/* Regime badge */
.regime{display:inline-block;padding:1px 5px;font-size:9px;font-weight:600;letter-spacing:1px;border:1px solid}
.regime.normal{color:var(--green);border-color:#003300}
.regime.flat{color:var(--amber);border-color:#3a2a00}
.regime.inverted{color:var(--red);border-color:#3a0000}

/* Toggle btns */
.tr-row{display:flex;gap:3px;margin-bottom:4px;flex-wrap:wrap}
.tbtn{background:var(--bg2);border:1px solid var(--border);color:var(--text-dim);
      font-family:var(--font);font-size:9px;padding:2px 6px;cursor:pointer}
.tbtn.active{color:var(--amber);border-color:#3a2a00;background:#1a1000}
.tbtn:hover{color:var(--text)}

/* Heatmap cells */
.hm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;margin-top:2px}
.hm-cell{padding:6px 5px;border:1px solid var(--border);cursor:pointer;min-height:50px}
.hm-cell:hover{border-color:var(--border3)}
.hm-name{font-size:10px;color:var(--text-mid);margin-bottom:2px}
.hm-val{font-size:12px;font-weight:600}
.hm-sub{font-size:9px;color:var(--text-dim);margin-top:1px}

/* News items */
.news-item{padding:5px 0;border-bottom:1px solid #0d0d0d;cursor:pointer}
.news-item:hover .news-hl{color:var(--text-bright)}
.news-meta{display:flex;gap:6px;margin-bottom:1px}
.news-ts{color:#666;font-size:9px}
.news-src{color:#888;font-size:9px}
.news-tag{font-size:9px;padding:0 4px;border:1px solid;font-weight:600;letter-spacing:0.5px}
.news-tag.macro{color:#00acc1;border-color:#00232a}
.news-tag.eq{color:#00c853;border-color:#003318}
.news-tag.energy{color:#ff8f00;border-color:#3a1f00}
.news-tag.credit{color:#aa00ff;border-color:#1e0033}
.news-tag.geo{color:#e53935;border-color:#3a0000}
.news-hl{font-size:11px;color:#d0d0d0;line-height:1.35}
.news-filters{display:flex;gap:3px;margin-bottom:4px;flex-wrap:wrap}

/* Map */
.map-sidebar{width:190px;flex-shrink:0;display:flex;flex-direction:column;gap:3px;overflow-y:auto}

/* Calendar */
.cal-item{display:grid;grid-template-columns:55px 28px 1fr 60px 60px 60px;gap:0;border-bottom:1px solid #0d0d0d}
.cal-item>div{padding:2px 4px;font-size:10px;color:#b8b8b8}
.cal-hdr>div{font-size:8px;color:#3a3a3a;padding:2px 4px;border-bottom:1px solid var(--border);font-weight:600;letter-spacing:0.5px}
.cal-hdr{display:grid;grid-template-columns:55px 28px 1fr 60px 60px 60px}
.cal-miss{color:var(--red)}
.cal-beat{color:var(--green)}
.cal-inline{color:var(--text-mid)}
.cal-hi{background:#0d0d00}

/* Central bank */
.cb-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:4px}
.cb-card{background:var(--bg2);border:1px solid var(--border);padding:5px 6px}
.cb-name{color:var(--amber);font-size:9px;font-weight:600;margin-bottom:3px;letter-spacing:1px}

/* DES company */
.des-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.des-stat{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #0a0a0a;font-size:10px}
.des-label{color:#909090}
.des-val{color:var(--text-bright)}

/* Vol indicator */
.vol-pip{display:inline-block;width:4px;height:4px;border-radius:50%;margin-right:2px}

/* Flash animation */
.flash{animation:fla 0.5s ease}
@keyframes fla{0%,100%{background:transparent}40%{background:rgba(255,171,0,0.06)}}

/* Vertical label */
.v-sep{width:1px;background:var(--border);margin:0 4px;flex-shrink:0}
/* Leaflet popup dark theme override */
.term-popup .leaflet-popup-content-wrapper{
  background:#0f0f0f;border:1px solid #262626;border-radius:0;
  box-shadow:0 4px 20px rgba(0,0,0,0.9);padding:0;
}
.term-popup .leaflet-popup-content{margin:8px 10px;color:#b8b8b8;font-family:'IBM Plex Mono',monospace;font-size:10px;line-height:1.5}
.term-popup .leaflet-popup-tip-container{display:none}
.term-popup .leaflet-popup-close-button{color:#444;font-size:14px;top:4px;right:6px}
.term-popup .leaflet-popup-close-button:hover{color:#ffab00}
.leaflet-container{background:#000;font-family:'IBM Plex Mono',monospace}
.leaflet-control-zoom a{background:#0f0f0f;color:#888;border:1px solid #222;border-radius:0;font-family:'IBM Plex Mono',monospace}
.leaflet-control-zoom a:hover{background:#1a1a1a;color:#ffab00}
.leaflet-bar{border:1px solid #1e1e1e;box-shadow:none;border-radius:0}

/* ── SEARCH TYPE BADGE ── */
#search-type-badge{
  font-size:8px;font-weight:600;letter-spacing:1px;padding:1px 5px;
  border:1px solid transparent;white-space:nowrap;transition:all .15s;
  min-width:54px;text-align:center;flex-shrink:0;
}
#search-type-badge.t-equity  {color:#00c853;border-color:#003318;background:#001a0a}
#search-type-badge.t-bond    {color:#00acc1;border-color:#00232a;background:#001318}
#search-type-badge.t-fx      {color:#ffab00;border-color:#3a2a00;background:#1a1000}
#search-type-badge.t-macro   {color:#7b1fa2;border-color:#1e0033;background:#0d0018}
#search-type-badge.t-cmdty   {color:#e65100;border-color:#3a1400;background:#1a0800}
#search-type-badge.t-command {color:#b8b8b8;border-color:#2e2e2e;background:#111}
#search-type-badge.t-filing  {color:#e53935;border-color:#3a0000;background:#180000}
#search-type-badge.t-ambiguous{color:#888;border-color:#222;background:#0a0a0a}

/* ── AUTOCOMPLETE DROPDOWN ── */
#ac-drop{
  position:fixed;background:var(--bg2);border:1px solid var(--border3);
  z-index:9000;min-width:340px;max-width:540px;max-height:260px;overflow-y:auto;
  display:none;box-shadow:0 8px 32px rgba(0,0,0,.9);
}
.ac-item{
  display:flex;align-items:center;gap:8px;padding:4px 8px;cursor:pointer;
  border-bottom:1px solid #0d0d0d;
}
.ac-item:hover,.ac-item.ac-sel{background:var(--bg3)}
.ac-key{color:var(--amber);font-size:10px;font-weight:600;min-width:90px;flex-shrink:0}
.ac-label{color:var(--text);font-size:10px;flex:1}
.ac-meta{color:var(--text-dim);font-size:9px;white-space:nowrap}
.ac-badge{font-size:8px;font-weight:600;letter-spacing:.5px;padding:0 4px;border:1px solid;flex-shrink:0}
.ac-badge.equity  {color:#00c853;border-color:#003318}
.ac-badge.bond    {color:#00acc1;border-color:#00232a}
.ac-badge.fx      {color:#ffab00;border-color:#3a2a00}
.ac-badge.macro   {color:#7b1fa2;border-color:#1e0033}
.ac-badge.cmdty   {color:#e65100;border-color:#3a1400}
.ac-badge.command {color:#888;border-color:#2a2a2a}
.ac-badge.filing  {color:#e53935;border-color:#3a0000}
.ac-sep{padding:2px 8px;font-size:8px;color:#222;letter-spacing:1px;background:#050505;border-bottom:1px solid #0d0d0d}

/* ── SEARCH RESULTS WINDOW ── */
.sr-row{display:grid;grid-template-columns:100px 1fr 80px;gap:0;border-bottom:1px solid #0d0d0d;cursor:pointer}
.sr-row>div{padding:3px 6px;font-size:10px}
.sr-row:hover>div{background:var(--bg2)}
.sr-hdr>div{font-size:8px;color:#333;padding:2px 6px;border-bottom:1px solid var(--border)}
.no-match{padding:14px;text-align:center;color:#2a2a2a;font-size:10px;letter-spacing:1px}


/* ── SCREENER ── */
#scrn-wrap{display:flex;flex-direction:column;height:100%;gap:0}
#scrn-filters{
  flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border2);
  padding:6px 8px;display:flex;flex-wrap:wrap;gap:6px;align-items:flex-end;
}
.scrn-fgroup{display:flex;flex-direction:column;gap:2px}
.scrn-flabel{font-size:8px;color:var(--text-dim);letter-spacing:.5px}
.scrn-input{
  background:var(--bg3);border:1px solid var(--border2);color:var(--text-bright);
  font-family:var(--font);font-size:10px;padding:2px 5px;width:88px;outline:none;
}
.scrn-input:focus{border-color:#3a2a00}
.scrn-select{
  background:var(--bg3);border:1px solid var(--border2);color:var(--text-bright);
  font-family:var(--font);font-size:10px;padding:2px 4px;width:110px;outline:none;
  -webkit-appearance:none;appearance:none;cursor:pointer;
}
.scrn-select:focus{border-color:#3a2a00}
.scrn-btn{
  background:var(--bg3);border:1px solid var(--border2);color:var(--amber);
  font-family:var(--font);font-size:9px;font-weight:600;letter-spacing:1px;
  padding:3px 10px;cursor:pointer;height:24px;white-space:nowrap;align-self:flex-end;
}
.scrn-btn:hover{background:#1a1000;border-color:#3a2a00}
.scrn-btn.run{color:#000;background:var(--amber);border-color:var(--amber)}
.scrn-btn.run:hover{background:#cc8800;border-color:#cc8800}
.scrn-btn:disabled{color:#2a2a2a;background:var(--bg2);border-color:var(--border);cursor:default}
#scrn-status{
  flex-shrink:0;padding:3px 8px;font-size:8px;color:var(--text-dim);
  border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;
  background:var(--bg1);
}
#scrn-count{color:var(--amber)}
#scrn-source{color:#2a2a2a}
#scrn-spinner{color:var(--amber);display:none}
#scrn-table-wrap{flex:1;overflow:auto;min-height:0}
#scrn-table{width:100%;border-collapse:collapse}
#scrn-table th{
  position:sticky;top:0;background:var(--bg2);font-size:8px;color:#3a3a3a;
  font-weight:600;padding:3px 6px;border-bottom:1px solid var(--border2);
  text-align:right;white-space:nowrap;letter-spacing:.4px;cursor:pointer;user-select:none;
  z-index:1;
}

const fmt = (v,d=2)=>v!=null?v.toFixed(d):'--';
function fmtC(v,d=2){
  if(v==null)return`<span class="neu">--</span>`;
  if(v>0)return`<span class="up">+${v.toFixed(d)}</span>`;
  if(v<0)return`<span class="dn">${v.toFixed(d)}</span>`;
  return`<span class="neu">0.${'0'.repeat(d)}</span>`;
}
function fmtCS(v,d=2){if(v>0)return`+${v.toFixed(d)}`;return v.toFixed(d);}
const getTs=()=>new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});

// ── Panel tab switcher ──
function switchTab(groupId, tabId){
  const container = document.getElementById('ptc-'+groupId);
  if(!container) return;
  container.querySelectorAll('.ptab').forEach(t=>t.classList.toggle('active', t.getAttribute('data-tab')===tabId));
  container.querySelectorAll('.psection').forEach(s=>s.classList.toggle('active', s.getAttribute('data-section')===tabId));
}
function buildTabs(groupId, tabs){
  // Build tab bar buttons
  const tabBar = tabs.map((t,i)=>
    `<div class="ptab${i===0?' active':''}" data-tab="${t.id}" onclick="switchTab('${groupId}','${t.id}')">${t.label}</div>`
  ).join('');
  // Build pane wrappers — content injected as raw HTML inside data-section divs
  const panes = tabs.map((t,i)=>
    `<div class="psection${i===0?' active':''}" data-section="${t.id}">${t.content}</div>`
  ).join('');
  return `<div id="ptc-${groupId}" class="ptabs-container"><div class="ptabs">${tabBar}</div><div class="ptabs-body">${panes}</div></div>`;
}

// ═══════════════════════════════════════════
// WINDOW MANAGER
// ═══════════════════════════════════════════
let zTop=100;
const WR={};
let _spawnCount=0;
function getSpawnPos(sz){
  // Always spawn near center, with a small readable cascade offset
  const W=window.innerWidth, H=window.innerHeight-70;
  const sw=sz[0]||540, sh=sz[1]||360;
  const cx=Math.floor((W-sw)/2), cy=Math.floor((H-sh)/2);
  const offset=(_spawnCount%6)*24; // gentle cascade, resets after 6
  _spawnCount++;
  return {x:Math.max(10,cx+offset), y:Math.max(10,cy+offset)};
}

const WTITLES={
  FI:'TREASURY MONITOR',EQ:'EQUITY MONITOR',FX:'FX & RATES',CMDTY:'COMMODITIES & ENERGY',
  MAP:'GLOBAL INTELLIGENCE MAP',MACRO:'MACRO CALENDAR & CB',NEWS:'NEWS TERMINAL',
  SPREAD:'CREDIT SPREAD MONITOR',INFL:'INFLATION MONITOR',AUCTION:'AUCTION MONITOR',
  VOL:'VOLATILITY & RISK',EQS:'EQUITY SEARCH',CHART:'PRICE CHART'
};
const WSIZES={
  FI:[680,400],EQ:[700,440],FX:[580,360],CMDTY:[600,380],MAP:[940,580],
  MACRO:[720,420],NEWS:[560,460],SPREAD:[620,400],INFL:[580,380],AUCTION:[780,260],
  VOL:[460,300],EQS:[620,560],CHART:[680,420]
};

function OW(cmd,extra){
  // HEAT: all sub-modes share a single window — switch mode if already open
  if(cmd==='HEAT'){
    if(WR['HEAT']){ WR['HEAT'].style.zIndex=++zTop; switchHeatMode(extra||'sector'); return; }
  }
  const winKey = cmd==='HEAT' ? 'HEAT' : cmd+(extra?'_'+extra:'');
  if(WR[winKey]){WR[winKey].style.zIndex=++zTop;return}
  const w=document.createElement('div');
  w.className='win';
  const sz=WSIZES[cmd]||[540,360];
  const sp=getSpawnPos(sz);
  w.style.cssText=`left:${sp.x}px;top:${sp.y}px;z-index:${++zTop};`;
  w.style.width=sz[0]+'px';w.style.height=sz[1]+'px';
  const title=WTITLES[cmd]||cmd;
  w.innerHTML=`
    <div class="wh">
      <span class="wh-cmd">${cmd}</span>
      <span class="wh-title">${title}</span>
      <span class="wh-ts" id="wts-${winKey}">${getTs()}</span>
      <div class="wh-refresh" title="Refresh" onclick="refreshWin('${winKey}','${cmd}','${extra||''}')">↻</div>
      <div class="wh-fs" title="Fullscreen" onclick="toggleFS('${winKey}')">⛶</div>
      <div class="wh-close" onclick="CW('${winKey}')">✕</div>
    </div>
    <div class="wb" id="wb-${winKey}"></div>
    <div class="wr"></div>`;
  document.getElementById('workspace').appendChild(w);
  WR[winKey]=w;
  makeDrag(w);makeResize(w);
  w.addEventListener('mousedown',()=>{w.style.zIndex=++zTop});
  renderW(cmd,winKey,extra);
}

function CW(key){if(WR[key]){WR[key].remove();delete WR[key]}}

function refreshWin(winKey, cmd, extra){
  const w = WR[winKey]; if(!w) return;
  const b = w.querySelector('.wb'); if(!b) return;
  const ts = w.querySelector(`#wts-${winKey}`);
  if(ts) ts.textContent = getTs();
  // Spin the refresh icon briefly
  const btn = w.querySelector('.wh-refresh');
  if(btn){ btn.style.transform='rotate(360deg)'; btn.style.transition='transform 0.4s'; setTimeout(()=>{btn.style.transform='';btn.style.transition=''},500); }
  switch(cmd){
    case'FI':    b.innerHTML=rFI();    setTimeout(drawYieldCurve,40); break;
    case'EQ':    b.innerHTML=rEQ();    break;
    case'FX':    b.innerHTML=rFX();    break;
    case'CMDTY': b.innerHTML=rCMDTY(); break;
    case'MACRO': b.innerHTML=rMACRO(); break;
    case'NEWS':  b.innerHTML=rNEWS();  break;
    case'INFL':  b.innerHTML=rINFL();  setTimeout(()=>drawInfl(),40); break;
    case'AUCTION':b.innerHTML=rAUCTION();break;
    case'VOL':   b.innerHTML=rVOL();   setTimeout(drawVOL,40); break;
    case'OPTIONS':b.innerHTML=rOPTIONS();break;
    case'EARN':  b.innerHTML=rEARN();  break;
    case'ECON':  b.innerHTML=rECON();  break;
    case'HOME':  b.innerHTML=rHOME();  setTimeout(()=>initHOME(),30); break;
    case'CARRY': b.innerHTML=rCARRY(); break;
    case'ROTATION':b.innerHTML=rROTATION();setTimeout(()=>drawRotation(),40);break;
    case'LADDER':b.innerHTML=rLADDER();break;
    default: break;
  }
}

// ── FULLSCREEN TOGGLE ──
// Saves/restores position+size so exiting FS returns to original layout
const FS_STATE = {}; // key -> {left,top,width,height}
function toggleFS(key){
  const w = WR[key]; if(!w) return;
  const btn = w.querySelector('.wh-fs');
  if(w.classList.contains('win-fullscreen')){
    // Restore
    w.classList.remove('win-fullscreen');
    const s = FS_STATE[key];
    if(s){ w.style.left=s.left; w.style.top=s.top; w.style.width=s.width; w.style.height=s.height; }
    w.querySelector('.wr').style.display='';
    if(btn) btn.textContent='⛶';
    // Re-draw canvases that depend on size
    setTimeout(()=>repaintWin(key),30);
  } else {
    // Save state & go full
    FS_STATE[key]={left:w.style.left,top:w.style.top,width:w.style.width,height:w.style.height};
    w.classList.add('win-fullscreen');
    w.style.zIndex=++zTop;
    w.querySelector('.wr').style.display='none';
    if(btn) btn.textContent='⊡';
    setTimeout(()=>repaintWin(key),30);
  }
}
// Re-trigger canvas draws after resize
function repaintWin(key){
  const cmd = key.split('_')[0];
  if(cmd==='HEAT'){ const t=document.querySelector('.heat-tab.active'); drawHEAT(t?t.dataset.mode:'sector'); }
  else if(cmd==='VOL')    drawVOL();
  else if(cmd==='INFL')   drawInfl();
  else if(cmd==='HOME')   initHOME();
  else if(cmd==='EQ')     drawEQ();
}

function renderW(cmd,key,extra){
  const b=document.getElementById('wb-'+key);
  if(!b)return;
  switch(cmd){
    case'FI':     b.innerHTML=rFI(); setTimeout(drawYieldCurve,40); break;
    case'EQ':     b.innerHTML=rEQ();setTimeout(()=>drawEQ(),30);break;
    case'FX':     b.innerHTML=rFX();break;
    case'CMDTY':  b.innerHTML=rCMDTY();break;
    case'MAP':    b.innerHTML=rMAP();setTimeout(()=>initMap(),30);break;
    case'MACRO':  b.innerHTML=rMACRO();break;
    case'NEWS':   b.innerHTML=rNEWS();break;

function makeDrag(el){
  const h=el.querySelector('.wh');
  h.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('wh-close'))return;
    const ox=el.offsetLeft,oy=el.offsetTop,sx=e.clientX,sy=e.clientY;
    const mm=ev=>{el.style.left=Math.max(0,ox+ev.clientX-sx)+'px';el.style.top=Math.max(0,oy+ev.clientY-sy)+'px'};
    const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu)};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);e.preventDefault();
  });
}
function makeResize(el){
  const h=el.querySelector('.wr');
  h.addEventListener('mousedown',e=>{
    const sw=el.offsetWidth,sh=el.offsetHeight,sx=e.clientX,sy=e.clientY;
    const mm=ev=>{el.style.width=Math.max(300,sw+ev.clientX-sx)+'px';el.style.height=Math.max(160,sh+ev.clientY-sy)+'px'};
    const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu)};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);e.preventDefault();
  });
}

}


function drawYieldCurve(){
  const canvas = document.getElementById('yield-curve-canvas');
  if(!canvas) return;
  const t = D.fixedIncome.treasuries;
  const W = canvas.parentElement.offsetWidth - 4;
  canvas.width = W; canvas.height = 160;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,160);

  const pts = t.filter(r=>r.yield>0);
  if(!pts.length) return;

  const yields = pts.map(r=>r.yield);
  const mn = Math.min(...yields) - 0.1;
  const mx = Math.max(...yields) + 0.1;
  const pad = {l:38,r:8,t:10,b:20};
  const pw = W-pad.l-pad.r, ph = 160-pad.t-pad.b;
  const xp = i => pad.l + (i/(pts.length-1))*pw;
  const yp = v => pad.t + (1-(v-mn)/(mx-mn))*ph;

  // Grid lines
  const gridYs = 4;
  for(let i=0;i<=gridYs;i++){
    const v = mn + (mx-mn)*(i/gridYs);
    const y = yp(v);
    ctx.strokeStyle='#111'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='#333'; ctx.font='8px IBM Plex Mono'; ctx.textAlign='right';
    ctx.fillText(v.toFixed(2)+'%', pad.l-2, y+3);
  }

  // Determine curve color by regime
  const y2=t[4]?.yield||0, y10=t[8]?.yield||0;
  const inverted = y10 < y2;
  const lineCol = inverted ? '#e53935' : '#00c853';

  // Fill under curve
  const grad = ctx.createLinearGradient(0,pad.t,0,160-pad.b);
  grad.addColorStop(0, inverted?'rgba(229,57,53,0.15)':'rgba(0,200,83,0.15)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();
  pts.forEach((r,i)=> i===0 ? ctx.moveTo(xp(i),yp(r.yield)) : ctx.lineTo(xp(i),yp(r.yield)));
  ctx.lineTo(xp(pts.length-1),160-pad.b); ctx.lineTo(pad.l,160-pad.b);
  ctx.closePath(); ctx.fillStyle=grad; ctx.fill();

  // Line
  ctx.strokeStyle=lineCol; ctx.lineWidth=1.5;
  ctx.beginPath();
  pts.forEach((r,i)=> i===0 ? ctx.moveTo(xp(i),yp(r.yield)) : ctx.lineTo(xp(i),yp(r.yield)));
  ctx.stroke();

  // Dots + labels
  pts.forEach((r,i)=>{
    const x=xp(i), y=yp(r.yield);
    ctx.fillStyle=lineCol; ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#2a2a2a'; ctx.font='8px IBM Plex Mono'; ctx.textAlign='center';
    ctx.fillText(r.tenor, x, 160-pad.b+12);
  });

  // Store pts+coords for hover
  canvas._yieldPts = pts.map((r,i)=>({x:xp(i),y:yp(r.yield),r}));

  // Hover interaction
  canvas.onmousemove = e => {
    const rect = canvas.getBoundingClientRect();
    const mx2 = e.clientX - rect.left;
    const tip = document.getElementById('yield-curve-tooltip');
    if(!tip||!canvas._yieldPts) return;
    // Find nearest point
    let nearest=null, minD=999;
    canvas._yieldPts.forEach(p=>{
      const d=Math.abs(p.x-mx2);
      if(d<minD){minD=d;nearest=p;}
    });
    if(nearest && minD < 40){
      const r=nearest.r;
      const d1=r.d1>=0?`<span style="color:#00c853">+${r.d1.toFixed(3)}</span>`:`<span style="color:#e53935">${r.d1.toFixed(3)}</span>`;
      tip.innerHTML=`<span style="color:var(--amber)">${r.tenor}</span> &nbsp;YIELD: <span style="color:#e0e0e0">${r.yield.toFixed(3)}%</span> &nbsp;1D: ${d1} &nbsp;DUR: ${r.dur.toFixed(1)}y`;
      // Draw crosshair
      const savedW=canvas.width;
      ctx.clearRect(0,0,W,160);
      drawYieldCurveStatic(ctx,pts,W,pad,pw,ph,mn,mx,xp,yp,lineCol,grad);
      ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(nearest.x,pad.t); ctx.lineTo(nearest.x,160-pad.b); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='#ffab00'; ctx.beginPath(); ctx.arc(nearest.x,nearest.y,4,0,Math.PI*2); ctx.fill();
    } else {
      tip.innerHTML='';
    }
  };
  canvas.onmouseleave = e => {
    const tip = document.getElementById('yield-curve-tooltip');
    if(tip) tip.innerHTML='';
    ctx.clearRect(0,0,W,160);
    drawYieldCurveStatic(ctx,pts,W,pad,pw,ph,mn,mx,xp,yp,lineCol,grad);
  };
}

function drawYieldCurveStatic(ctx,pts,W,pad,pw,ph,mn,mx,xp,yp,lineCol,grad){
  const gridYs=4;
  for(let i=0;i<=gridYs;i++){
    const v=mn+(mx-mn)*(i/gridYs); const y=yp(v);
    ctx.strokeStyle='#111'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='#333'; ctx.font='8px IBM Plex Mono'; ctx.textAlign='right';
    ctx.fillText(v.toFixed(2)+'%',pad.l-2,y+3);
  }
  ctx.beginPath();
  pts.forEach((r,i)=>i===0?ctx.moveTo(xp(i),yp(r.yield)):ctx.lineTo(xp(i),yp(r.yield)));
  ctx.lineTo(xp(pts.length-1),160-pad.b); ctx.lineTo(pad.l,160-pad.b);
  ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
  ctx.strokeStyle=lineCol; ctx.lineWidth=1.5;
  ctx.beginPath();
  pts.forEach((r,i)=>i===0?ctx.moveTo(xp(i),yp(r.yield)):ctx.lineTo(xp(i),yp(r.yield)));
  ctx.stroke();
  pts.forEach((r,i)=>{
    const x=xp(i),y=yp(r.yield);
    ctx.fillStyle=lineCol; ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#2a2a2a'; ctx.font='8px IBM Plex Mono'; ctx.textAlign='center';
    ctx.fillText(r.tenor,x,160-pad.b+12);
  });
}

  const fxLookup={};D.fx.forEach(f=>{fxLookup[f.name]=f;});
  const carryRows=pairs.map(p=>{

function rINFL(){
  const fred = D.macro.fred || {};
  const be10 = fred['T10YIE'];
  const be5  = fred['T5YIE'];
  const cpi  = fred['CPIAUCSL'];
  const corecpi = fred['CPILFESL'];
  const pce  = fred['PCEPILFE'];

  // Breakeven table — merge static with live FRED where available
  const beData = D.fixedIncome.inflation.breakevens.map(b => {
    if(b.tenor==='10Y' && be10) return {...b, be:be10.val, d1:be10.chg};
    if(b.tenor==='5Y'  && be5)  return {...b, be:be5.val,  d1:be5.chg};
    return b;
  });
  const be = beData.map(b=>`<tr>
    <td>${b.tenor}</td>
    <td style="color:var(--amber);font-weight:600">${b.be.toFixed(2)}%</td>
    <td>${b.nom!=null?b.nom.toFixed(2)+'%':'—'}</td>
    <td>${b.real!=null?b.real.toFixed(2)+'%':'—'}</td>
    <td class="${b.d1>0?'dn':b.d1<0?'up':'neu'}">${b.d1>0?'+':''}${b.d1.toFixed(3)}</td>
  </tr>`).join('');

  // Live FRED inflation gauges
  const gauges = [
    {label:'CPI MoM',      d:cpi,      note:'Headline consumer prices'},
    {label:'Core CPI MoM', d:corecpi,  note:'Ex food & energy'},
    {label:'Core PCE MoM', d:pce,      note:'Fed preferred measure'},
  ].map(g => {
    if(!g.d) return `<tr><td style="color:var(--text-dim)">${g.label}</td><td colspan="4" style="color:#2a2a2a">LOADING...</td></tr>`;
    const col = g.d.val > 0.3 ? 'var(--red)' : g.d.val > 0.2 ? 'var(--amber)' : 'var(--green)';
    const chgCol = g.d.chg > 0 ? 'var(--red)' : 'var(--green)'; // inflation: up=bad
    return `<tr>
      <td style="color:var(--text-dim)">${g.label}</td>
      <td style="color:${col};font-weight:600">${g.d.val.toFixed(2)}%</td>
      <td style="color:#555">${g.d.prev.toFixed(2)}%</td>
      <td style="color:${chgCol}">${g.d.chg>=0?'+':''}${g.d.chg.toFixed(3)}</td>
      <td style="color:#2a2a2a;font-size:9px">${g.d.date} &nbsp;·&nbsp; ${g.note}</td>
    </tr>`;
  }).join('');

  const be10v = be10?.val || D.fixedIncome.inflation.breakevens.find(b=>b.tenor==='10Y')?.be || 2.3;
  const be5v  = be5?.val  || D.fixedIncome.inflation.breakevens.find(b=>b.tenor==='5Y')?.be  || 2.4;
  const fwd5y5y = (be10v*2 - be5v).toFixed(2); // implied 5y5y forward breakeven
  const overshoot = (be10v - 2.0).toFixed(2);
  const ovCol = parseFloat(overshoot)>0.3?'var(--red)':parseFloat(overshoot)>0?'var(--amber)':'var(--green)';

  return`
    <div class="sf" style="margin-bottom:6px">
      <div class="si"><span class="sil">10Y BREAKEVEN</span><span class="siv" style="color:${be10v>2.3?'var(--red)':be10v>2.0?'var(--amber)':'var(--green)'}">${be10v.toFixed(2)}%</span></div>
      <div class="si"><span class="sil">5Y BREAKEVEN</span><span class="siv">${be5v.toFixed(2)}%</span></div>
      <div class="si"><span class="sil">5Y5Y FWD</span><span class="siv">${fwd5y5y}%</span></div>
      <div class="si"><span class="sil">FED TARGET</span><span class="siv" style="color:#555">2.00%</span></div>
      <div class="si"><span class="sil">OVERSHOOT</span><span class="siv" style="color:${ovCol}">${parseFloat(overshoot)>=0?'+':''}${overshoot}%</span></div>
      <div class="si"><span class="sil">FRED DATA</span><span class="siv" style="color:${be10?'var(--green)':'#555'}">${be10?'LIVE':'STATIC'}</span></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div>
        <div class="sl">BREAKEVEN / TIPS CURVE — ${be10?'LIVE FRED':'STATIC'}</div>
        <table class="t"><thead><tr><th>TENOR</th><th>BREAKEVEN</th><th>NOMINAL</th><th>REAL</th><th>1D Δ</th></tr></thead><tbody>${be}</tbody></table>
      </div>
      <div>
        <div class="sl">INFLATION GAUGES — FRED LIVE</div>
        <table class="t"><thead><tr><th>SERIES</th><th>LATEST</th><th>PREV</th><th>Δ</th><th>NOTE</th></tr></thead><tbody>${gauges}</tbody></table>
        <div style="margin-top:8px">
          <div class="sl">INFLATION METRICS — STATIC</div>
          ${D.fixedIncome.inflation.metrics.map(m=>{
            const v=parseFloat(m.d1);
            return`<div class="mr"><span class="ml">${m.name}</span><span class="mv hl">${m.val}</span><span style="color:${v>0?'var(--red)':'var(--green)'};font-size:9px;margin-left:6px">${v>0?'+':''}${m.d1}</span></div>`;
          }).join('')}
        </div>
      </div>
    </div>
    <div class="sl">BREAKEVEN CURVE</div>
    <canvas id="infl-c" height="80" style="width:100%">`;
}
function drawInfl(){
  const c=document.getElementById('infl-c');if(!c)return;
  const W=c.parentElement.offsetWidth-10;c.width=W;
  const ctx=c.getContext('2d');ctx.clearRect(0,0,W,80);
  const data=D.fixedIncome.inflation.breakevens;
  const vals=data.map(b=>b.be);const labels=data.map(b=>b.tenor);
  const mn=Math.min(...vals)-.1,mx=Math.max(...vals)+.1;
  const pad={l:28,r:8,t:6,b:18};const pw=W-pad.l-pad.r,ph=80-pad.t-pad.b;
  const xp=i=>pad.l+i/(vals.length-1)*pw;
  const yp=v=>pad.t+(1-(v-mn)/(mx-mn))*ph;
  ctx.strokeStyle='#111';ctx.lineWidth=1;
  [0,.5,1].forEach(f=>{const y=mn+(mx-mn)*f;ctx.beginPath();ctx.moveTo(pad.l,yp(y));ctx.lineTo(W-pad.r,yp(y));ctx.stroke();ctx.fillStyle='#333';ctx.font='8px IBM Plex Mono';ctx.textAlign='right';ctx.fillText(y.toFixed(2),pad.l-2,yp(y)+3)});
  ctx.textAlign='center';ctx.fillStyle='#333';ctx.font='8px IBM Plex Mono';
  labels.forEach((l,i)=>ctx.fillText(l,xp(i),80-4));ctx.textAlign='left';
  ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(pad.l,yp(2.0));ctx.lineTo(W-pad.r,yp(2.0));ctx.stroke();ctx.setLineDash([]);
  const g=ctx.createLinearGradient(0,pad.t,0,80-pad.b);
  g.addColorStop(0,'rgba(21,101,192,0.2)');g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();vals.forEach((v,i)=>i===0?ctx.moveTo(xp(i),yp(v)):ctx.lineTo(xp(i),yp(v)));
  ctx.lineTo(xp(vals.length-1),80-pad.b);ctx.lineTo(pad.l,80-pad.b);ctx.closePath();ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle='#1565c0';ctx.lineWidth=1.5;ctx.beginPath();
  vals.forEach((v,i)=>i===0?ctx.moveTo(xp(i),yp(v)):ctx.lineTo(xp(i),yp(v)));ctx.stroke();
  vals.forEach((v,i)=>{ctx.fillStyle='#1565c0';ctx.beginPath();ctx.arc(xp(i),yp(v),2.5,0,Math.PI*2);ctx.fill()});
}

      <td style="color:#3a3a3a;font-size:9px">${f.note}</td>
    </tr>`;
  }).join('');

  const bullCount = flowData.filter(f=>f.side==='CALL').length;
  const bearCount = flowData.filter(f=>f.side==='PUT').length;
  const bullPrem  = flowData.filter(f=>f.side==='CALL').reduce((a,b)=>a+parseFloat(b.prem.replace('$','').replace('M','')),0);
  const bearPrem  = flowData.filter(f=>f.side==='PUT').reduce((a,b)=>a+parseFloat(b.prem.replace('$','').replace('M','')),0);
  const pcRatio   = (bearPrem/bullPrem).toFixed(2);

  return`
    <div class="sl">SENTIMENT INDICATORS</div>
    <div class="sf" style="margin-bottom:8px">
      <div class="si"><span class="sil">VIX</span><span class="siv" style="color:${vixLevel.c}">${vix.toFixed(2)} — ${vixLevel.l}</span></div>
      <div class="si"><span class="sil">P/C RATIO</span><span class="siv" style="color:${parseFloat(pcRatio)>1?'var(--red)':'var(--green)'}">${pcRatio}</span></div>
      <div class="si"><span class="sil">CALL PREM</span><span class="siv up">$${bullPrem.toFixed(1)}M</span></div>
      <div class="si"><span class="sil">PUT PREM</span><span class="siv dn">$${bearPrem.toFixed(1)}M</span></div>
      <div class="si"><span class="sil">FLOW BIAS</span><span class="siv" style="color:${bullCount>=bearCount?'var(--green)':'var(--red)'}">${bullCount>=bearCount?'BULLISH':'BEARISH'}</span></div>
    </div>
    <div class="sl">UNUSUAL OPTIONS ACTIVITY — LARGE PREMIUM FLOWS</div>
    <div style="font-size:8px;color:#2a2a2a;margin-bottom:4px">INDICATIVE DATA — EDUCATIONAL PURPOSES</div>
    <table class="t">
      <thead><tr><th>SYMBOL</th><th>EXP</th><th>STRIKE</th><th>TYPE</th><th>CONTRACTS</th><th>PREMIUM</th><th>BIAS</th><th>NOTE</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="sl" style="margin-top:8px">TERM STRUCTURE — VIX FUTURES (INDICATIVE)</div>
    <div class="sf">
      ${['SPOT','M1','M2','M3','M4','M5','M6'].map((t,i)=>{
        const v = (vix + i*0.8 + (i>2?i*0.3:0)).toFixed(2);
        return `<div class="si"><span class="sil">${t}</span><span class="siv">${v}</span></div>`;
      }).join('')}
    </div>`;
}

function rCARRY(){
  const fx = D.fx || [];
  // G10 policy rates — static, update with FRED/CB data where possible
  const rates = {
    USD:4.375, EUR:2.40, GBP:4.50, JPY:0.50, AUD:4.10,
    NZD:3.75,  CAD:3.00, CHF:0.50, NOK:4.50, SEK:2.50
  };
  const pairs = [
    {base:'AUD',quote:'JPY', carry: rates.AUD - rates.JPY},
    {base:'NZD',quote:'JPY', carry: rates.NZD - rates.JPY},
    {base:'GBP',quote:'JPY', carry: rates.GBP - rates.JPY},
    {base:'USD',quote:'JPY', carry: rates.USD - rates.JPY},
    {base:'NOK',quote:'JPY', carry: rates.NOK - rates.JPY},
    {base:'AUD',quote:'CHF', carry: rates.AUD - rates.CHF},
    {base:'GBP',quote:'CHF', carry: rates.GBP - rates.CHF},
    {base:'USD',quote:'CHF', carry: rates.USD - rates.CHF},
    {base:'AUD',quote:'EUR', carry: rates.AUD - rates.EUR},
    {base:'GBP',quote:'EUR', carry: rates.GBP - rates.EUR},
  ].sort((a,b)=>b.carry-a.carry);

  const fxLookup = {};
  fx.forEach(f=>{ fxLookup[f.name] = f; });

  const rows = pairs.map(p=>{
    const name = p.base+p.quote;
    const f = fxLookup[name] || fxLookup[p.base+'/'+p.quote];
    const px    = f ? f.val.toFixed(4) : '—';
    const d1    = f ? f.d1 : null;
    const d1col = d1===null?'#444':d1>0?'var(--green)':'var(--red)';
    const carryCol = p.carry > 3 ? 'var(--green)' : p.carry > 1.5 ? 'var(--amber)' : '#888';
    const signal = p.carry > 3 ? 'STRONG BUY' : p.carry > 2 ? 'BUY' : p.carry > 1 ? 'MILD' : 'WEAK';
    const sigCol = p.carry > 3 ? 'var(--green)' : p.carry > 2 ? 'var(--amber)' : '#555';
    return `<tr>
      <td style="color:var(--amber);font-weight:600">${p.base}/${p.quote}</td>
      <td style="color:${carryCol};font-weight:600">${p.carry.toFixed(2)}%</td>
      <td style="color:#666">${rates[p.base].toFixed(2)}%</td>
      <td style="color:#666">${rates[p.quote].toFixed(2)}%</td>
      <td style="color:#888">${px}</td>
      <td style="color:${d1col}">${d1!==null?(d1>=0?'+':'')+d1.toFixed(4):'—'}</td>
      <td style="color:${sigCol};font-size:9px">${signal}</td>
    </tr>`;
  }).join('');

  const rateRows = Object.entries(rates).map(([ccy,rate])=>{
    const bias = rate>3?{l:'RESTRICTIVE',c:'var(--red)'}:rate>1.5?{l:'NEUTRAL',c:'var(--amber)'}:{l:'ACCOMMODATIVE',c:'var(--green)'};
    return `<div class="si"><span class="sil" style="color:#888">${ccy}</span><span class="siv" style="color:${bias.c}">${rate.toFixed(2)}%</span></div>`;
  }).join('');

  return`
    <div class="sl">G10 POLICY RATES</div>
    <div class="sf" style="margin-bottom:10px">${rateRows}</div>
    <div class="sl">CARRY TRADE OPPORTUNITIES — SORTED BY DIFFERENTIAL</div>

    <table class="t">
      <thead><tr><th>PAIR</th><th>CARRY DIFF</th><th>BASE RATE</th><th>QUOTE RATE</th><th>SPOT</th><th>1D CHG</th><th>SIGNAL</th></tr></thead>

      ⚠ CARRY TRADE RISK: Positions unwind sharply during risk-off. JPY and CHF tend to strengthen during stress events (flight-to-safety). Monitor VIX and current account balances.

// RENDER: SECTOR ROTATION TRACKER
// ═══════════════════════════════════════════
function rROTATION(){
  const sectors = D.equities?.sectors || [];

  // Simulate 1W, 1M, 3M returns anchored to live 1D data
  const enriched = sectors.map(s=>{
    const trend = s.d1 > 0 ? 1 : -1;
    const w1  = +(s.d1 * 3.5 + (Math.random()-.45)*1.5).toFixed(2);
    const m1  = +(s.d1 * 14  + (Math.random()-.45)*4.0).toFixed(2);
    const m3  = +(s.d1 * 38  + (Math.random()-.45)*8.0).toFixed(2);
    return {...s, w1, m1, m3};
  });

  // Rank by 1M performance
  const ranked = [...enriched].sort((a,b)=>b.m1-a.m1);
  const phase = ranked[0].m1 > 0 ? 'RISK-ON' : 'RISK-OFF';
  const phaseCol = phase==='RISK-ON'?'var(--green)':'var(--red)';

  // Rotation phase logic based on which sectors are leading
  const leaders = ranked.slice(0,3).map(s=>s.name);
  const isDefensive = leaders.some(l=>/Utilities|Health|Consumer Staples/.test(l));
  const rotationMsg = isDefensive ? 'LATE-CYCLE / DEFENSIVE ROTATION DETECTED' : 'GROWTH / CYCLICAL ROTATION';
  const rotCol = isDefensive ? 'var(--red)' : 'var(--green)';

  const rows = ranked.map((s,i)=>{
    const rank = i+1;
    const rankCol = rank<=3?'var(--green)':rank>=9?'var(--red)':'#555';
    const col1D = s.d1>0?'var(--green)':s.d1<0?'var(--red)':'#444';
    const col1W = s.w1>0?'var(--green)':s.w1<0?'var(--red)':'#444';
    const col1M = s.m1>0?'var(--green)':s.m1<0?'var(--red)':'#444';
    const col3M = s.m3>0?'var(--green)':s.m3<0?'var(--red)':'#444';
    const momentum = s.m1>2?'▲▲':s.m1>0?'▲':s.m1<-2?'▼▼':'▼';
    const momCol = s.m1>0?'var(--green)':'var(--red)';
    return `<tr>
      <td style="color:${rankCol};font-weight:600;width:24px">#${rank}</td>
      <td style="color:var(--text-dim)">${s.name}</td>
      <td style="color:${col1D}">${s.d1>0?'+':''}${s.d1.toFixed(2)}%</td>
      <td style="color:${col1W}">${s.w1>0?'+':''}${s.w1.toFixed(2)}%</td>
      <td style="color:${col1M};font-weight:600">${s.m1>0?'+':''}${s.m1.toFixed(2)}%</td>
      <td style="color:${col3M}">${s.m3>0?'+':''}${s.m3.toFixed(2)}%</td>
      <td style="color:${momCol}">${momentum}</td>
    </tr>`;
  }).join('');

  return`
    <div class="sf" style="margin-bottom:6px">
      <div class="si"><span class="sil">MARKET MODE</span><span class="siv" style="color:${phaseCol}">${phase}</span></div>
      <div class="si"><span class="sil">ROTATION</span><span class="siv" style="color:${rotCol};font-size:9px">${rotationMsg}</span></div>
      <div class="si"><span class="sil">LEADING</span><span class="siv" style="color:var(--amber);font-size:9px">${ranked[0]?.name||'—'}</span></div>
      <div class="si"><span class="sil">LAGGING</span><span class="siv" style="color:var(--red);font-size:9px">${ranked[ranked.length-1]?.name||'—'}</span></div>
    </div>
    <div class="sl">SECTOR PERFORMANCE — 1D / 1W / 1M / 3M (RANKED BY 1M)</div>
    <div style="font-size:8px;color:#2a2a2a;margin-bottom:4px">1D LIVE · 1W/1M/3M ESTIMATED FROM TREND</div>
    <table class="t">
      <thead><tr><th>RANK</th><th>SECTOR</th><th>1D</th><th>1W</th><th>1M</th><th>3M</th><th>MOM</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="sl" style="margin-top:8px">VISUAL PERFORMANCE BAR</div>
    <canvas id="rot-c" height="120" style="width:100%">`;
}

function drawRotation(){
  const c = document.getElementById('rot-c'); if(!c) return;
  const W = c.parentElement.offsetWidth - 10; c.width = W;
  const ctx = c.getContext('2d'); ctx.clearRect(0,0,W,120);
  const sectors = D.equities?.sectors || [];
  if(!sectors.length) return;
  const enriched = sectors.map(s=>({
    name:s.name.replace('Consumer ','').replace(' & Services','').replace('Information ','Info '),
    m1: +(s.d1*14+(Math.random()-.45)*4).toFixed(2)
  })).sort((a,b)=>b.m1-a.m1);
  const mx = Math.max(...enriched.map(s=>Math.abs(s.m1)))+0.5;
  const bh = 8, gap = 2, pad = {l:100,r:50,t:6,b:6};
  enriched.forEach((s,i)=>{
    const y = pad.t + i*(bh+gap);
    const barW = Math.abs(s.m1)/mx*(W-pad.l-pad.r);
    const col = s.m1>=0?'#00c853':'#e53935';
    ctx.fillStyle='#111'; ctx.fillRect(pad.l,y,W-pad.l-pad.r,bh);
    ctx.fillStyle=col; ctx.fillRect(pad.l,y,barW,bh);
    ctx.fillStyle='#444'; ctx.font='8px IBM Plex Mono'; ctx.textAlign='right';
    ctx.fillText(s.name,pad.l-3,y+bh-1);
    ctx.fillStyle=col; ctx.textAlign='left';
    ctx.fillText((s.m1>=0?'+':'')+s.m1.toFixed(1)+'%',pad.l+barW+3,y+bh-1);
  });
}

// RENDER: BOND LADDER / DURATION RISK
// ═══════════════════════════════════════════
function rLADDER(){
  const treas = D.fixedIncome.treasuries;

  // DV01 and duration calcs per $1M face value
  const ladder = treas.map(t=>{
    const y = t.yield / 100;
    const yrs = parseFloat(t.tenor) || (t.tenor==='1M'?1/12:t.tenor==='3M'?0.25:t.tenor==='6M'?0.5:1);
    // Approximate modified duration for bullet bond
    const dur = t.tenor.endsWith('M') ? yrs : yrs / (1 + y);
    // DV01 per $1M face = duration * price / 10000 (approx)
    const price = 100; // simplified — par
    const dv01 = (dur * price * 10000) / 1e6; // $ per bp per $1M
    // 10bp shock P&L
    const shock10 = -(dv01 * 10).toFixed(0);
    const shock100 = -(dv01 * 100).toFixed(0);
    return {...t, dur: dur.toFixed(2), dv01: dv01.toFixed(2), shock10, shock100, yrs};
  });

  // Max DV01 for bar scaling
  const maxDv01 = Math.max(...ladder.map(l=>parseFloat(l.dv01)));

  const rows = ladder.map(l=>{
    const yldCol = l.yield > 4.5 ? 'var(--green)' : l.yield > 4.0 ? 'var(--amber)' : '#888';
    const durCol = parseFloat(l.dur) > 10 ? 'var(--red)' : parseFloat(l.dur) > 5 ? 'var(--amber)' : 'var(--green)';
    const barW = Math.round(parseFloat(l.dv01)/maxDv01*80);
    const dv01Bar = `<div style="display:inline-block;width:${barW}px;height:6px;background:var(--amber);vertical-align:middle;margin-right:4px;opacity:0.6"></div>`;
    const d1col = l.d1 > 0 ? 'var(--green)' : l.d1 < 0 ? 'var(--red)' : '#444';
    return `<tr>
      <td style="color:var(--amber);font-weight:600">${l.tenor}</td>
      <td style="color:${yldCol};font-weight:600">${l.yield.toFixed(3)}%</td>
      <td style="color:${d1col};font-size:9px">${l.d1>0?'+':''}${l.d1.toFixed(3)}</td>
      <td style="color:${durCol}">${l.dur}y</td>
      <td>${dv01Bar}$${l.dv01}</td>
      <td style="color:var(--red);font-size:9px">$${Math.abs(l.shock10).toLocaleString()}</td>
      <td style="color:var(--red);font-size:9px">$${Math.abs(l.shock100).toLocaleString()}</td>
    </tr>`;
  }).join('');

  // Portfolio-level stats if you own one of each
  const totalDV01 = ladder.reduce((a,l)=>a+parseFloat(l.dv01),0);
  const avgDur = (ladder.reduce((a,l)=>a+parseFloat(l.dur),0)/ladder.length).toFixed(2);

  return`
    <div class="sf" style="margin-bottom:6px">
      <div class="si"><span class="sil">TOTAL DV01</span><span class="siv" style="color:var(--amber)">$${totalDV01.toFixed(1)}/bp per $1M</span></div>
      <div class="si"><span class="sil">AVG DURATION</span><span class="siv">${avgDur}y</span></div>
      <div class="si"><span class="sil">CURVE SLOPE</span><span class="siv">
        ${((treas.find(t=>t.tenor==='10Y')?.yield||0)-(treas.find(t=>t.tenor==='2Y')?.yield||0)).toFixed(0)}bp (2s10s)
      </span></div>
      <div class="si"><span class="sil">DATA</span><span class="siv" style="color:var(--green)">LIVE YIELDS</span></div>
    </div>
    <div class="sl">BOND LADDER — DURATION & DV01 RISK PER $1M FACE VALUE</div>
    <div style="font-size:8px;color:#2a2a2a;margin-bottom:4px">DV01 = $ CHANGE PER 1BP RATE MOVE · SHOCK = $ LOSS ON +10BP / +100BP PARALLEL SHIFT</div>
    <table class="t">
      <thead><tr><th>TENOR</th><th>YIELD</th><th>1D Δ</th><th>MOD DUR</th><th>DV01 $/bp</th><th>+10bp P&L</th><th>+100bp P&L</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:8px;padding:6px;border:1px solid #1a1a1a;font-size:9px;color:#2a2a2a">
      Duration calculated as modified duration for bullet bond at par. DV01 per $1M face. Convexity not included — actual losses on large moves will be slightly less than linear estimate.
    </div>`;
}

// ── EQS AUTOCOMPLETE — Yahoo Finance search (no key needed) ──
let _eqsAcTimer = null;
function eqsAutocomplete(val){
  const box = document.getElementById('eqs-suggest');
  if(!box) return;
  clearTimeout(_eqsAcTimer);
  if(!val || val.length < 1){ box.style.display='none'; return; }
  _eqsAcTimer = setTimeout(async ()=>{
    try{
      const url = `https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(val)}&lang=en-US&region=US&quotesCount=6&newsCount=0`;
      const r = await proxyFetch(url, 5000);
      const d = await r.json();
      const quotes = (d.quotes||[]).filter(q=>q.symbol&&q.shortname);
      if(!quotes.length){ box.style.display='none'; return; }
      box.innerHTML = quotes.map(q=>`
        <div onclick="eqsSelectSuggest('${q.symbol}')" style="padding:4px 8px;cursor:pointer;border-bottom:1px solid var(--border);font-size:10px"
          onmouseover="this.style.background='#111'" onmouseout="this.style.background='transparent'">
          <span style="color:var(--amber)">${q.symbol}</span>
          <span style="color:var(--text-dim);margin-left:6px">${(q.shortname||'').substring(0,40)}</span>
          <span style="color:#333;margin-left:4px;font-size:9px">${q.exchange||''}</span>
        </div>`).join('');
      box.style.display='block';
    }catch(e){ box.style.display='none'; }
  }, 250);
}

function eqsSelectSuggest(sym){
  const inp = document.getElementById('eqs-input');
  const box = document.getElementById('eqs-suggest');
  if(inp) inp.value = sym;
  if(box) box.style.display = 'none';
  fetchEQS(sym.toUpperCase());
}

function eqsSearch(){
  const inp = document.getElementById('eqs-input');

  if(!inp) return;

  if(!v) return;
  if(box) box.style.display='none';
  fetchEQS(v);
}

async function fetchEDGARCIK(ticker){
  // Step 1: get CIK from SEC's official ticker map (CORS-open, no proxy)
  const cikStr = await getTickerCIK(ticker);
  if(!cikStr) return null;
  // Step 2: fetch company submission data to get canonical name + info
  try{
    const padded = String(cikStr).padStart(10,'0');
    const r = await fetch(`https://data.sec.gov/submissions/CIK${padded}.json`,{signal:AbortSignal.timeout(6000)});
    if(!r.ok) throw new Error('bad');
    const d = await r.json();
    return {cik: d.cik, name: d.name, tickers: d.tickers, exchanges: d.exchanges};
  }catch(e){ return {cik: parseInt(cikStr), name: null, tickers:[ticker], exchanges:[]}; }
}

async function getTickerCIK(ticker){
  // SEC company_tickers.json maps every listed ticker to CIK — CORS-open
  try{
    const r = await fetch('https://www.sec.gov/files/company_tickers.json',{signal:AbortSignal.timeout(7000)});
    if(!r.ok) throw new Error('bad');
    const d = await r.json();
    // format: {"0":{"cik_str":320193,"ticker":"AAPL","title":"Apple Inc."}, ...}
    const entry = Object.values(d).find(e=>e.ticker.toUpperCase()===ticker.toUpperCase());
    return entry ? entry.cik_str : null;
  }catch(e){ return null; }
}

function markStale(source, err){
  FETCH_STATE.staleSources.add(source);
  FETCH_STATE.pendingSources.delete(source);
  FETCH_STATE.errors[source] = err;
  updateStatusBar();
}
function markFresh(source){
  FETCH_STATE.staleSources.delete(source);
  FETCH_STATE.pendingSources.delete(source);
  delete FETCH_STATE.errors[source];
  FETCH_STATE.lastRefresh = new Date().toISOString();
  updateStatusBar();
}
function markPending(source){
  FETCH_STATE.pendingSources.add(source);
  updateStatusBar();
}

function updateStatusBar(){
  const el = document.getElementById('status-bar');
  if(!el) return;
  const stale = [...FETCH_STATE.staleSources];
  const pending = [...FETCH_STATE.pendingSources];
  const ts = FETCH_STATE.lastRefresh
    ? new Date(FETCH_STATE.lastRefresh).toLocaleTimeString('en-US',{hour12:false,timeZone:'America/Denver'})
    : '--:--:--';

  let html = `<span style="color:#2e4a2e">LIVE &nbsp;|&nbsp; REFRESHED: ${ts}</span>`;
  if(pending.length) html += ` &nbsp;<span style="color:#3a2a00">⟳ FETCHING: ${pending.join(' ')}</span>`;
  if(stale.length)   html += ` &nbsp;<span style="color:var(--red)">⚠ STALE: ${stale.join(' ')}</span>`;
  if(!stale.length && !pending.length && !FETCH_STATE.lastRefresh)
    html += ` &nbsp;<span style="color:#2a2a2a">ADD API KEYS TO FETCH_STATE CONFIG TO ENABLE LIVE DATA</span>`;
  el.innerHTML = html;
}

// Generic rate-limited fetch with timeout + CORS proxy for blocked APIs
// ═══════════════════════════════════════════
// CORE FETCH HELPER — allorigins proxy
// ═══════════════════════════════════════════
async function proxyFetch(url, timeoutMs=10000){
  const proxies = [
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  ];
  let lastErr;
  for(const proxied of proxies){
    try{
      const r = await fetch(proxied, {signal: AbortSignal.timeout(timeoutMs)});
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      return r;
    }catch(e){ lastErr=e; continue; }
  }
  throw lastErr;
}

// Keep apiFetch stub so existing EQS window code doesn't break
async function apiFetch(url, source, timeoutMs=10000){
  try{
    const r = await proxyFetch(url, timeoutMs);
    return await r.json();
  }catch(e){
    markStale(source, e.message);
    return null;
  }
}

function fmtLargeNum(n){
  if(!n) return '--';
  if(n>=1e12) return (n/1e12).toFixed(2)+'T';
  if(n>=1e9)  return (n/1e9).toFixed(0)+'B';
  return n.toFixed(0);
}

// TREASURY YIELDS — Yahoo Finance yield tickers via allorigins
// ═══════════════════════════════════════════
async function fetchTreasuryYields(){
  markPending('TREAS');
  // ^IRX=13wk(~3M), ^FVX=5Y, ^TYX=30Y work via allorigins; ^TNX(10Y) times out
  // Use CoinGecko-style approach: fetch one at a time with short timeout
  const yieldSyms = [
    {sym:'^IRX', tenor:'3M'},
    {sym:'^FVX', tenor:'5Y'},
    {sym:'^TYX', tenor:'30Y'},
  ];
  // Also try fetching 10Y via a different Yahoo endpoint format
  const allSyms = [
    ...yieldSyms,
    {sym:'TNX', tenor:'10Y'},   // try without caret
    {sym:'%5ETNX', tenor:'10Y'}, // pre-encoded
  ];
  let anyOk = false;
  const seen = new Set();
  await Promise.allSettled(allSyms.map(async ({sym, tenor}) => {
    if(seen.has(tenor)) return; // skip if already got this tenor
    try{
      const url = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=5d`;
      const r = await proxyFetch(url, 7000);
      const d = await r.json();
      const m = d?.chart?.result?.[0]?.meta;
      if(!m?.regularMarketPrice) return;
      const row = D.fixedIncome.treasuries.find(t => t.tenor === tenor);
      if(!row) return;
      row.yield = m.regularMarketPrice;
      row.d1    = +((m.regularMarketPrice - (m.chartPreviousClose||m.regularMarketPrice))).toFixed(3);
      seen.add(tenor);
      anyOk = true;
    }catch(e){}
  }));
  if(anyOk) markFresh('TREAS');
  else markStale('TREAS', 'all yield tickers failed');
}

// FX RATES — open.er-api.com (CORS-open, no key needed)
// ═══════════════════════════════════════════
async function fetchFXRates(){
  markPending('FX');
  try{
    const r = await fetch('https://open.er-api.com/v6/latest/USD', {signal: AbortSignal.timeout(8000)});
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    if(d.result !== 'success') throw new Error('bad response');
    const rates = d.rates;
    const fxMap = {
      'EURUSD': 1/rates.EUR, 'USDJPY': rates.JPY,
      'GBPUSD': 1/rates.GBP, 'USDCHF': rates.CHF,
      'AUDUSD': 1/rates.AUD, 'USDCAD': rates.CAD,
      'USDCNY': rates.CNY,   'USDINR': rates.INR,
    };
    D.fx.forEach(row => {
      const val = fxMap[row.name];
      if(val != null && !isNaN(val)){
        const prev = row.val || val;
        row.d1  = +(val - prev).toFixed(4);
        row.pct = +((val - prev)/prev*100).toFixed(3);
        row.val = +val.toFixed(4);
      }
    });
    markFresh('FX');
  }catch(e){ markStale('FX', e.message); }
}

function classifyNewsTag(title){
  const t = title.toLowerCase();
  if(/fed|fomc|central bank|ecb|boj|boe|rate|yield|treasury|inflation|cpi|pce|gdp|jobs|payroll|unemployment|recession/.test(t)) return 'macro';
  if(/oil|wti|brent|opec|gas|energy|crude|lng|pipeline/.test(t)) return 'energy';
  if(/credit|bond|spread|default|high.yield|investment.grade|cds|debt/.test(t)) return 'credit';
  if(/war|sanction|geopolit|military|conflict|attack|election|tariff|trade/.test(t)) return 'geo';
  if(/stock|earnings|revenue|profit|ipo|merger|acquisition|nasdaq|s&p|equity|shares/.test(t)) return 'eq';
  return 'macro';
}

const NEWS_RSS = [
  {url:'https://finance.yahoo.com/rss/topstories',              src:'YAHOO'},
  {url:'https://feeds.a.dj.com/rss/RSSMarketsMain.xml',         src:'WSJ'},
  {url:'https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=10000664', src:'CNBC'},
  {url:'https://feeds.nbcnews.com/nbcnews/public/business',      src:'NBC'},
];

async function fetchRSSFeed(feedUrl, src){
  const r = await proxyFetch(feedUrl, 14000);
  const text = await r.text();
  const xml  = new DOMParser().parseFromString(text, 'text/xml');
  return [...xml.querySelectorAll('item')].slice(0,12).map(item => {
    const title   = item.querySelector('title')?.textContent?.trim() || '';
    const link    = item.querySelector('link')?.textContent?.trim() || '';
    const pubDate = new Date(item.querySelector('pubDate')?.textContent || Date.now());
    const desc    = item.querySelector('description')?.textContent?.trim() || '';
    return { src, tag: classifyNewsTag(title), hl: title, detail: desc, url: link, pubDate,
             ts: pubDate.toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'America/Denver'})+' '+pubDate.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'America/Denver'}) };
  }).filter(n => n.hl);
}

// ═══════════════════════════════════════════
async function fetchFREDData(){
  if(!API_KEYS.FRED || API_KEYS.FRED==='YOUR_FRED_KEY_HERE') return;
  const series = [
    {id:'FEDFUNDS',   label:'Fed Funds Rate',       fmt: v=>v.toFixed(2)+'%'},
    {id:'CPIAUCSL',   label:'CPI (MoM)',             fmt: v=>v.toFixed(2)+'%'},
    {id:'CPILFESL',   label:'Core CPI (MoM)',        fmt: v=>v.toFixed(2)+'%'},
    {id:'PCEPILFE',   label:'Core PCE (MoM)',        fmt: v=>v.toFixed(2)+'%'},
    {id:'UNRATE',     label:'Unemployment Rate',     fmt: v=>v.toFixed(1)+'%'},
    {id:'PAYEMS',     label:'Nonfarm Payrolls',      fmt: v=>(v>0?'+':'')+Math.round(v)+'K'},
    {id:'GDP',        label:'GDP (QoQ Ann.)',        fmt: v=>v.toFixed(1)+'%'},
    {id:'INDPRO',     label:'Industrial Production', fmt: v=>v.toFixed(1)+'%'},
    {id:'RETAILSMNSA',label:'Retail Sales (MoM)',    fmt: v=>v.toFixed(1)+'%'},
    {id:'T10YIE',     label:'10Y Breakeven',         fmt: v=>v.toFixed(2)+'%'},
    {id:'T5YIE',      label:'5Y Breakeven',          fmt: v=>v.toFixed(2)+'%'},
    {id:'MORTGAGE30US',label:'30Y Mortgage Rate',    fmt: v=>v.toFixed(2)+'%'},
    {id:'ICSA',       label:'Initial Claims',        fmt: v=>Math.round(v)+'K'},
  ];
  markPending('FRED');
  if(!D.macro.fred) D.macro.fred = {};
  let anyOk = false;
  for(const s of series){
    try{
      const url = `https://api.stlouisfed.org/fred/series/observations?series_id=${s.id}&api_key=${API_KEYS.FRED}&sort_order=desc&limit=2&file_type=json`;
      const r = await proxyFetch(url, 10000);
      const data = await r.json();
      const obs = data?.observations?.filter(o=>o.value!='.');
      if(obs && obs.length){
        const latest = parseFloat(obs[0].value);
        const prev   = obs[1] ? parseFloat(obs[1].value) : latest;
        D.macro.fred[s.id] = {val:latest, prev, label:s.label, date:obs[0].date, chg:latest-prev};
        anyOk = true;
      }
    }catch(e){}
    await new Promise(r=>setTimeout(r,200)); // rate limit
  }
  if(anyOk) markFresh('FRED');
  else markStale('FRED','all series failed');
}

function rNEWS(){
  const news = D.news || [];
  const tags = ['ALL','MACRO','EQ','ENERGY','CREDIT','GEO'];
  const filterBar = tags.map(t=>`<button class="tbtn${t==='ALL'?' active':''}" style="font-size:9px;padding:2px 8px" onclick="newsFilter('${t.toLowerCase()}',this)">${t}</button>`).join('');

      <div class="news-filters">${filterBar}</div>
      <div style="color:#2a2a2a;font-size:10px;padding:16px 0;text-align:center">
        LOADING NEWS FEEDS…<br><span style="font-size:9px;color:#1a1a1a">Sources: Yahoo Finance · WSJ · CNBC · NBC</span>
      </div>
    </div>`;
  }

  const items = news.map((n,i)=>`
    <div class="news-item" id="ni-${i}" onclick="openNewsDetail(${i})" style="padding:6px 8px;border-bottom:1px solid #0a0a0a;cursor:pointer" onmouseover="this.style.background='#070707'" onmouseout="this.style.background=''">
      <div class="news-meta">
        <span class="news-ts">${n.ts}</span>
        <span class="news-src">${n.src}</span>
        <span class="news-tag ${n.tag}">${n.tag.toUpperCase()}</span>
      </div>
      <div class="news-hl">${n.hl}</div>
    </div>`).join('');

  return `<div style="display:flex;flex-direction:column;height:100%">
    <div style="padding:4px 6px;border-bottom:1px solid #111;flex-shrink:0;background:#050505">
      <div class="news-filters" style="margin:0">${filterBar}</div>
    </div>
    <div id="news-list" style="flex:1;overflow-y:auto">${items}</div>
    <div id="news-detail" style="display:none;flex:1;overflow-y:auto;padding:10px;border-top:1px solid #111">
      <button onclick="newsCloseDetail()" style="background:#0a0a0a;border:1px solid #222;color:#888;font-family:var(--font);font-size:9px;padding:2px 8px;cursor:pointer;margin-bottom:8px;letter-spacing:.5px">← BACK</button>
      <div id="news-detail-body"></div>
    </div>
  </div>`;
}

function newsFilter(tag, btn){
  document.querySelectorAll('#wb-NEWS .tbtn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const list = document.getElementById('news-list'); if(!list) return;
  list.querySelectorAll('.news-item').forEach(el=>{
    const idx = parseInt(el.id.replace('ni-',''));
    const n = (D.news||[])[idx];
    if(!n) return;
    el.style.display = (tag==='all' || n.tag===tag) ? '' : 'none';
  });
}

function openNewsDetail(i){
  const n = (D.news||[])[i]; if(!n) return;
  const list   = document.getElementById('news-list');
  const detail = document.getElementById('news-detail');
  const body   = document.getElementById('news-detail-body');
  if(!list||!detail||!body) return;
  list.style.display   = 'none';
  detail.style.display = 'block';
  const tag = `<span class="news-tag ${n.tag}" style="vertical-align:middle">${n.tag.toUpperCase()}</span>`;
  const linkHtml = n.url ? `<a href="${n.url}" target="_blank" rel="noopener" style="color:var(--amber);font-size:9px;text-decoration:none;letter-spacing:.5px">READ FULL ARTICLE ↗</a>` : '';
  body.innerHTML = `
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap">
      ${tag}
      <span class="news-src" style="font-size:10px">${n.src}</span>
      <span class="news-ts" style="font-size:9px">${n.ts}</span>
      <span style="margin-left:auto">${linkHtml}</span>
    </div>
    <div style="font-size:13px;font-weight:600;color:var(--text-bright);line-height:1.4;margin-bottom:10px">${n.hl}</div>
    <div style="font-size:10px;color:var(--text-dim);line-height:1.7;border-top:1px solid #111;padding-top:8px">${n.detail||'<span style="color:#2a2a2a">No summary available. Click the link above to read the full article.</span>'}</div>`;
}

function newsCloseDetail(){
  const list   = document.getElementById('news-list');
  const detail = document.getElementById('news-detail');
  if(list)   list.style.display   = '';
  if(detail) detail.style.display = 'none';
}

async function fetchRSSNews(){
  markPending('NEWS');
  const results = await Promise.allSettled(NEWS_RSS.map(f => fetchRSSFeed(f.url, f.src)));
  let all = [];
  results.forEach((r,i) => {
    if(r.status==='fulfilled') all.push(...r.value);
    else console.warn('[NEWS] feed failed:', NEWS_RSS[i].src, r.reason?.message);
  });
  console.log('[NEWS] total items fetched:', all.length);
  if(!all.length){ markStale('NEWS','all RSS feeds failed'); return; }
  const seen = new Set();
  D.news = all
    .filter(n => { if(seen.has(n.hl)) return false; seen.add(n.hl); return true; })
    .sort((a,b) => b.pubDate - a.pubDate)
    .slice(0, 40);
  markFresh('NEWS');
  if(WR['NEWS']){ const b=document.getElementById('wb-NEWS'); if(b) b.innerHTML=rNEWS(); }
  if(WR['HOME']){
    const el=document.getElementById('home-news');
    if(el) el.innerHTML=D.news.slice(0,8).map((n,i)=>`
      <div class="home-news-row" onclick="openNewsDetail(${i})">
        <span class="home-news-ts">${n.ts}</span>
        <span class="home-news-src">${n.src}</span>
        <span class="home-news-tag ${n.tag}">${n.tag.toUpperCase()}</span>
        <span class="home-news-hl">${n.hl}</span>
      </div>`).join('');
  }
}

async function fetchNews(){ return fetchRSSNews(); }

    {key:'VIX',   label:'CBOE VIX Volatility',      meta:'VOL panel'},
    {key:'SKEW',  label:'CBOE SKEW Index',          meta:'VOL panel'},
    {key:'RECESSION',label:'Recession Probability', meta:'MACRO panel'},
  ];
  MACRO_SERIES.forEach(m=>C.push({...m, type:'macro',
    action:()=>macroSeriesAction(m.key)}));

  // Commodities
  [...D.commodities.energy,...D.commodities.metals,...D.commodities.agriculture].forEach(c=>{
    C.push({key:c.name.replace(/\s+/g,'').toUpperCase(),
      label:c.name, meta:`${c.spot.toFixed(c.spot>100?1:3)} ${c.unit}`,
      type:'cmdty', action:()=>OW('CMDTY')});
  });
  // Commodity aliases
  [{key:'WTI',name:'WTI Crude'},{key:'BRENT',name:'Brent Crude'},
   {key:'GOLD',name:'Gold'},{key:'SILVER',name:'Silver'},
   {key:'COPPER',name:'Copper'},{key:'NATGAS',name:'Nat Gas'},
   {key:'CORN',name:'Corn'},{key:'WHEAT',name:'Wheat'}
  ].forEach(a=>{
    if(!C.find(c=>c.key===a.key))
      C.push({key:a.key, label:a.name, meta:'Commodity', type:'cmdty', action:()=>OW('CMDTY')});
  });


  return C;
}

// ── RESOLVER ──
function resolveQuery(raw) {
  const q = raw.trim().toUpperCase();
  if(!q) return null;
  const parts = q.split(/\s+/);
  const first = parts[0], rest = parts.slice(1).join(' ');

  // 1. Exact key match in corpus
  const corpus = buildSearchCorpus();
  const exact = corpus.find(c => c.key === q);
  if(exact) return {type:exact.type, target:q, entry:exact, matches:[exact]};

  // 2. Treasury bond patterns — UST2Y, UST10Y, UST-10, 10Y, 2Y etc.
  const ustMatch = q.match(/^UST[-\s]?(\d+[MY])$/) || q.match(/^(\d+[MY])$/)
                   || q.match(/^T(\d+[MY])$/);
  if(ustMatch){
    const tenor = (ustMatch[1]||ustMatch[0]).replace('T','');
    const row = D.fixedIncome.treasuries.find(t=>t.tenor===tenor);
    if(row) return {type:'bond', target:'UST'+tenor,
      entry:{key:'UST'+tenor, label:`${tenor} Treasury`, meta:`${row.yield.toFixed(3)}%`, type:'bond', action:()=>OW('FI')},
      matches:[]};
  }

  // 3. Known equity ticker — open EQS
  if(/^[A-Z]{1,5}$/.test(q) && !['MAP','FX','FI','EQ','CB','US','UK','EU','DE','JP','CN','AU','CA'].includes(q)){
    return {type:'equity', target:q,
      entry:{key:q, label:`${q} — Equity Search`, meta:API_KEYS.FMP?'FMP live data':'add FMP key', type:'equity', action:()=>OW('EQS',q)},
      matches:[]};
  }

  // 5. Known FX pair
  const fxRow = D.fx.find(f=>f.name.toUpperCase()===q||f.name.replace('/','').toUpperCase()===q);
  if(fxRow) return {type:'fx', target:fxRow.name,
    entry:{key:fxRow.name, label:fxRow.name, meta:`${fxRow.val}`, type:'fx', action:()=>OW('FX')},
    matches:[]};

  // 6. Panel command pass-through
  const panelCmds = ['FI','EQ','FX','CMDTY','MAP','MACRO','NEWS','SPREAD','INFL','AUCTION','VOL','EQS','HELP','HEAT','SCRN','CB'];
  if(panelCmds.includes(first)){
    return {type:'command', target:first, extra:rest||null,
      entry:{key:first, label:first, meta:'', type:'command', action:()=>OW(first, rest||null)},
      matches:[]};
  }

  // 7. Fuzzy / partial — collect candidates
  const matches = corpus.filter(c=>{
    const k = c.key.toUpperCase();
    const l = c.label.toUpperCase();
    return k.startsWith(q) || l.includes(q) || k.includes(q);
  }).slice(0,12);

  if(matches.length === 1) return {type:matches[0].type, target:matches[0].key,
    entry:matches[0], matches:[]};
  if(matches.length > 1)   return {type:'ambiguous', target:q, matches, entry:null};

  return {type:'no-match', target:q, matches:[], entry:null};
}

// ── SPECIAL COMMAND HANDLER ──
function handleSpecialCommand(cmd){
  switch(cmd){
    case 'HELP':         OW('HELP'); break;
    case 'HOME':         OW('HOME'); break;
    case 'HEAT':         OW('HEAT','sector'); break;
    case 'HEAT SECTOR':  OW('HEAT','sector'); break;
    case 'HEAT CURVE':   OW('HEAT','curve');  break;
    case 'SCRN':         OW('SCRN'); break;
    case 'CB':           OW('MACRO'); break;
    default:             OW(cmd);
  }
}

function macroSeriesAction(key){
  const inflKeys = ['CPI','CORECPI','PCE','COREPCE','BREAKEVEN','5Y5Y'];
  const volKeys  = ['VIX','MOVE','SKEW'];
  if(inflKeys.includes(key)) OW('INFL');
  else if(volKeys.includes(key)) OW('VOL');
  else OW('MACRO');
}
