// ── Init: load state into inputs, restore previous filter values ──
function initSCRN(){
  const f = SCRN_STATE.filters;
  const el = id => document.getElementById(id);
  const sf = el('sf-sector'); if(sf) sf.value = f.sector;
  ['mcap','pe','div','px','chgmin','chgmax'].forEach(k=>{
    const inp = el('sf-'+k);
    if(inp) inp.value = f[k==='chgmin'?'chgMin':k==='chgmax'?'chgMax':k] || '';
  });
  // If we already have results, re-render them
  if(SCRN_STATE.filtered.length) scrnRenderTable();
  // Update sort headers
  scrnUpdateSortHeaders();
  // Seed raw data from universe if empty
  if(!SCRN_STATE.rawData.length)
    SCRN_STATE.rawData = SCRN_UNIVERSE.map(r=>({...r}));
}

// ── Read filters from DOM ──
function scrnReadFilters(){
  const v = id => { const el=document.getElementById(id); return el?el.value.trim():''; };
  SCRN_STATE.filters = {
    sector:  v('sf-sector') || 'ALL',
    mcapMin: v('sf-mcap'),
    peMax:   v('sf-pe'),
    divMin:  v('sf-div'),
    pxMin:   v('sf-px'),
    chgMin:  v('sf-chgmin'),
    chgMax:  v('sf-chgmax'),
  };
}

// ── Apply filters in browser ──
function scrnApplyFilters(data){
  const f = SCRN_STATE.filters;
  const n = v => v===''||v===null||v===undefined ? null : parseFloat(v);
  const mcapMin = n(f.mcapMin);
  const peMax   = n(f.peMax);
  const divMin  = n(f.divMin);
  const pxMin   = n(f.pxMin);
  const chgMin  = n(f.chgMin);
  const chgMax  = n(f.chgMax);

  // Deduplicate by symbol first
  const seen = new Set();
  const deduped = data.filter(r=>{ if(seen.has(r.sym)) return false; seen.add(r.sym); return true; });

  return deduped.filter(r=>{
    if(f.sector !== 'ALL' && r.sector !== f.sector) return false;
    if(mcapMin !== null && (r.mcap == null || r.mcap < mcapMin)) return false;
    if(peMax   !== null && (r.pe   == null || r.pe   > peMax))   return false;
    if(divMin  !== null && (r.div  == null || r.div  < divMin))  return false;
    if(pxMin   !== null && (r.px   == null || r.px   < pxMin))   return false;
    if(chgMin  !== null && (r.chg  == null || r.chg  < chgMin))  return false;
    if(chgMax  !== null && (r.chg  == null || r.chg  > chgMax))  return false;
    return true;
  });
}

// ── Sort ──
function scrnSort(col){
  if(SCRN_STATE.sortCol === col){
    SCRN_STATE.sortDir = SCRN_STATE.sortDir==='desc'?'asc':'desc';
  } else {
    SCRN_STATE.sortCol = col;
    SCRN_STATE.sortDir = ['sym','name','sector'].includes(col) ? 'asc' : 'desc';
  }
  scrnApplySortAndRender();
}

function scrnApplySortAndRender(){
  const col = SCRN_STATE.sortCol;
  const dir = SCRN_STATE.sortDir;
  SCRN_STATE.filtered.sort((a,b)=>{
    const av = a[col], bv = b[col];
    if(av == null && bv == null) return 0;
    if(av == null) return 1;
    if(bv == null) return -1;
    if(typeof av === 'string') return dir==='asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    return dir==='asc' ? av-bv : bv-av;
  });
  scrnRenderTable();
  scrnUpdateSortHeaders();
}

function scrnUpdateSortHeaders(){
  document.querySelectorAll('#scrn-table th').forEach(th=>{
    th.classList.remove('sort-asc','sort-desc');
    if(th.dataset.col === SCRN_STATE.sortCol)
      th.classList.add('sort-'+SCRN_STATE.sortDir);
  });
}

// ── Render results table ──
function scrnRenderTable(){
  const tbody = document.getElementById('scrn-tbody');
  if(!tbody) return;
  const rows = SCRN_STATE.filtered.slice(0,50); // hard cap 50
  const countEl = document.getElementById('scrn-count');
  if(countEl) countEl.textContent = rows.length + (SCRN_STATE.filtered.length>50?' (capped at 50)':'');

  if(!rows.length){
    tbody.innerHTML=`<tr><td colspan="10" class="scrn-no-results">◈ NO RESULTS MATCH FILTERS</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(r=>{
    const chgCol = r.chg > 0 ? 'var(--green)' : r.chg < 0 ? 'var(--red)' : 'var(--text-dim)';
    const chgSign = r.chg > 0 ? '+' : '';
    const peStr = r.pe != null ? r.pe.toFixed(1) : '<span style="color:#2a2a2a">—</span>';
    const fwdStr = r.fwdPe != null ? r.fwdPe.toFixed(1) : '<span style="color:#2a2a2a">—</span>';
    const divStr = r.div > 0 ? r.div.toFixed(2)+'%' : '<span style="color:#2a2a2a">—</span>';
    const volStr = r.vol >= 1e6 ? (r.vol/1e6).toFixed(1)+'M' : (r.vol/1e3).toFixed(0)+'K';
    const mcapStr = r.mcap >= 1000 ? (r.mcap/1000).toFixed(2)+'T' : r.mcap.toFixed(0)+'B';
    return `<tr>
      <td onclick="OW('EQS','${r.sym}')" style="color:var(--amber);cursor:pointer">${r.sym}</td>
      <td style="text-align:left;color:var(--text-mid);max-width:140px;overflow:hidden;text-overflow:ellipsis">${r.name}</td>
      <td style="text-align:left;color:var(--text-dim)">${r.sector}</td>
      <td>$${r.px.toFixed(2)}</td>
      <td style="color:${chgCol}">${chgSign}${r.chg.toFixed(2)}%</td>
      <td>$${mcapStr}</td>
      <td>${peStr}</td>
      <td>${fwdStr}</td>
      <td>${divStr}</td>
      <td style="color:var(--text-dim)">${volStr}</td>
    </tr>`;
  }).join('');
}

// ── Run screen ──
function scrnRun(){
  scrnReadFilters();
  if(!SCRN_STATE.rawData.length)
    SCRN_STATE.rawData = SCRN_UNIVERSE.map(r=>({...r}));
  SCRN_STATE.filtered = scrnApplyFilters(SCRN_STATE.rawData);
  scrnApplySortAndRender();
}

// ── Presets ──
function scrnPreset(name){
  scrnClear();
  const set = (id,v)=>{ const el=document.getElementById(id); if(el) el.value=v; };
  switch(name){
    case 'div':
      set('sf-div','3'); set('sf-mcap','10'); break;
    case 'growth':
      set('sf-mcap','50'); set('sf-pe','50'); set('sf-chgmin','-0.5'); break;
    case 'value':
      set('sf-pe','15'); set('sf-mcap','20'); break;
    case 'momentum':
      set('sf-chgmin','0.5'); set('sf-mcap','10'); break;
  }
  scrnRun();
}

function scrnClear(){
  ['sf-mcap','sf-pe','sf-div','sf-px','sf-chgmin','sf-chgmax'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  const sec=document.getElementById('sf-sector'); if(sec) sec.value='ALL';
}

// ── Live data fetch (FMP or AV, rate-limited) ──
async function scrnFetchLive(){
  const btn = document.getElementById('scrn-live-btn');
  const spinner = document.getElementById('scrn-spinner');
  const src = document.getElementById('scrn-source');

  if(true){  // live screener enrichment disabled — using static data
    if(src) src.textContent = 'STATIC SCREENER DATA';
    return;
  }

  if(SCRN_STATE.isLoading) return;
  SCRN_STATE.isLoading = true;
  if(btn) btn.disabled = true;
  if(spinner) spinner.style.display = 'inline';

  try {
    let enriched = 0;

    if(API_KEYS.FMP){
      // FMP batch quote — free tier supports comma-separated symbols
      // Split into chunks of 20 to stay well within rate limits
      const syms = SCRN_UNIVERSE.map(r=>r.sym);
      const dedupedSyms = [...new Set(syms)];
      const chunks = [];
      for(let i=0; i<dedupedSyms.length; i+=20) chunks.push(dedupedSyms.slice(i,i+20));

      for(const chunk of chunks){
        const url = `https://financialmodelingprep.com/api/v3/quote/${chunk.join(',')}?apikey=${API_KEYS.FMP}`;
        const data = await apiFetch(url, 'SCRN');
        if(Array.isArray(data)){
          const bySymbol = {};
          data.forEach(q=>{ bySymbol[q.symbol]=q; });
          SCRN_UNIVERSE.forEach((row,i)=>{
            const q = bySymbol[row.sym];
            if(!q) return;
            SCRN_STATE.rawData[i] = {
              ...row,
              px:   q.price ?? row.px,
              chg:  q.changesPercentage ?? row.chg,
              pe:   q.pe ?? row.pe,
              mcap: q.marketCap ? q.marketCap/1e9 : row.mcap,
              vol:  q.volume ?? row.vol,
            };
            enriched++;
          });
        }
        // Polite delay between chunks — FMP free tier: 250 req/day
        await new Promise(r=>setTimeout(r, 300));
      }

    } else if(API_KEYS.ALPHA_VANTAGE){
      // AV free tier: 25 req/day, 5/min — only fetch first 20 symbols
      const limited = [...new Set(SCRN_UNIVERSE.map(r=>r.sym))].slice(0,20);
      for(const sym of limited){
        const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${sym}&apikey=${API_KEYS.ALPHA_VANTAGE}`;
        const data = await apiFetch(url, 'SCRN');
        const q = data?.['Global Quote'];
        if(q){
          const idx = SCRN_STATE.rawData.findIndex(r=>r.sym===sym);
          if(idx>=0){
            SCRN_STATE.rawData[idx].px  = parseFloat(q['05. price']) || SCRN_STATE.rawData[idx].px;
            SCRN_STATE.rawData[idx].chg = parseFloat(q['10. change percent']) || SCRN_STATE.rawData[idx].chg;
            enriched++;
          }
        }
        // AV rate limit: 5 req/min → 12s between calls
        await new Promise(r=>setTimeout(r, 12500));
      }
    }

    SCRN_STATE.lastFetch = new Date();
    if(src) src.textContent = `LIVE DATA · ${enriched} SYMBOLS ENRICHED · ${SCRN_STATE.lastFetch.toLocaleTimeString('en-US',{hour12:false})}`;
    // Re-run filter with enriched data
    scrnRun();

  } finally {
    SCRN_STATE.isLoading = false;
    if(btn) btn.disabled = false;
    if(spinner) spinner.style.display = 'none';
  }
}

function rHEAT(mode){
  mode = (mode||'sector').toLowerCase();
  const modeLabel = {sector:'SECTOR PERFORMANCE',curve:'TREASURY CURVE'};
  const tabs = ['sector','curve'].map(m=>`
    <div class="heat-tab${m===mode?' active':''}" data-mode="${m}" onclick="switchHeatMode('${m}')">${{sector:'SECTORS',curve:'CURVE'}[m]}</div>`).join('');
  return `<div id="heat-wrap">
    <div id="heat-tabs">${tabs}</div>
    <div id="heat-canvas-wrap">
      <div id="heat-subtitle" style="font-size:8px;color:var(--text-dim);letter-spacing:1px;margin-bottom:6px">${modeLabel[mode]||''}</div>
      <canvas id="heat-canvas" style="width:100%;display:block"></canvas>
      <div id="heat-legend"></div>
      <div id="heat-detail" style="margin-top:6px;font-size:9px;color:var(--text-dim)"></div>
    </div>
  </div>`;
}

function switchHeatMode(mode){
  // Update tab active state
  document.querySelectorAll('.heat-tab').forEach(t=>{
    t.classList.toggle('active', t.dataset.mode===mode);
  });
  // Re-render just the canvas area
  const subtitle=document.getElementById('heat-subtitle');
  if(subtitle){
    const labels={sector:'SECTOR PERFORMANCE',curve:'TREASURY CURVE'};
    subtitle.textContent=labels[mode]||'';
  }
  drawHEAT(mode);
}

function drawHEAT(mode){
  mode=(mode||'sector').toLowerCase();
  if(mode==='sector')    drawHeatSector();
  else if(mode==='curve') drawHeatCurve();
}

// ── MODE: Sector performance heatmap ──
function drawHeatSector(){
  const canvas=document.getElementById('heat-canvas'); if(!canvas)return;
  const wrap=canvas.parentElement;
  const W=wrap.offsetWidth-16, H=Math.max(wrap.offsetHeight-90,200);
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,W,H);

  const sectors=D.equities.sectors;
  // Treemap-like layout: weight tiles by mcap
  const totalMcap=sectors.reduce((a,s)=>a+s.mcap,0);
  const cols=4, rows=Math.ceil(sectors.length/cols);
  const pad=2;
  const tW=Math.floor(W/cols), tH=Math.floor(H/rows);

  sectors.forEach((s,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    const x=col*tW+pad, y=row*tH+pad, w=tW-pad*2, h=tH-pad*2;
    // Color by 1D change
    const v=s.d1;
    const bg=heatColor(v,-2,2);
    ctx.fillStyle=bg; ctx.fillRect(x,y,w,h);
    // Border
    ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1; ctx.strokeRect(x,y,w,h);
    // Name
    ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(x,y,w,Math.min(h,14));
    ctx.fillStyle=v>0.2?'rgba(255,255,255,0.9)':'rgba(200,200,200,0.85)';
    ctx.font='bold 9px IBM Plex Mono'; ctx.textAlign='center';
    ctx.fillText(s.name, x+w/2, y+10);
    // Value
    ctx.font='bold 13px IBM Plex Mono';
    ctx.fillStyle=v>0?'#c8ffd4':v<0?'#ffc8c8':'#ccc';
    ctx.fillText((v>0?'+':'')+v.toFixed(2)+'%', x+w/2, y+h/2+5);
    // Sub: 1W
    ctx.font='9px IBM Plex Mono'; ctx.fillStyle='rgba(200,200,200,0.5)';
    ctx.fillText('1W '+(s.w1>0?'+':'')+s.w1.toFixed(1)+'%', x+w/2, y+h-8);
    ctx.textAlign='left';
  });

  // Legend
  const leg=document.getElementById('heat-legend'); if(!leg)return;
  leg.innerHTML=`
    <span style="color:var(--text-dim);font-size:8px">SCALE: 1D CHANGE &nbsp;</span>
    ${[-2,-1,0,1,2].map(v=>`<div class="heat-leg-item">
      <div class="heat-leg-swatch" style="background:${heatColor(v,-2,2)}"></div>
      <span style="color:var(--text-dim)">${v>0?'+':''}${v}%</span>
    </div>`).join('')}
    <span style="color:var(--text-dim);margin-left:8px">CLICK SECTOR → SCRN</span>`;
  canvas.onclick=e=>{
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    const ci=Math.floor(mx/tW), ri=Math.floor(my/tH);
    const idx=ri*cols+ci;
    if(idx>=0&&idx<sectors.length){
      const s=sectors[idx];
      const det=document.getElementById('heat-detail');
      if(det) det.innerHTML=`<span style="color:var(--amber)">${s.name}</span> &nbsp; 1D: <span class="${s.d1>=0?'up':'dn'}">${s.d1>=0?'+':''}${s.d1.toFixed(2)}%</span> &nbsp; 1W: <span class="${s.w1>=0?'up':'dn'}">${s.w1>=0?'+':''}${s.w1.toFixed(2)}%</span> &nbsp; MktCap: $${s.mcap}T`;
    }
  };
}

// ── MODE: Treasury curve heatmap ──
function drawHeatCurve(){
  const canvas=document.getElementById('heat-canvas'); if(!canvas)return;
  const wrap=canvas.parentElement;
  const W=wrap.offsetWidth-16, H=Math.max(wrap.offsetHeight-90,180);
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,W,H);

  const tenors=D.fixedIncome.treasuries;
  const n=tenors.length;
  const bw=Math.floor((W-40)/n)-2, bh=H-60;
  const yMin=Math.min(...tenors.map(t=>t.yield))-0.1;
  const yMax=Math.max(...tenors.map(t=>t.yield))+0.1;

  tenors.forEach((t,i)=>{
    const x=40+i*(bw+2);
    const fillH=Math.max(4,((t.yield-yMin)/(yMax-yMin))*bh);
    const y=H-30-fillH;
    // Color by 1D change
    const bg=heatColor(t.d1,-0.08,0.08);
    ctx.fillStyle=bg; ctx.fillRect(x,y,bw,fillH);
    ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1;ctx.strokeRect(x,y,bw,fillH);
    // Tenor label
    ctx.fillStyle='#444'; ctx.font='8px IBM Plex Mono'; ctx.textAlign='center';
    ctx.fillText(t.tenor, x+bw/2, H-14);
    // Yield label
    ctx.fillStyle='#aaa'; ctx.font='bold 9px IBM Plex Mono';
    ctx.fillText(t.yield.toFixed(2), x+bw/2, y-3);
    // Change
    ctx.fillStyle=t.d1>0?'#00c853':t.d1<0?'#e53935':'#555';
    ctx.font='8px IBM Plex Mono';
    ctx.fillText((t.d1>0?'+':'')+t.d1.toFixed(3), x+bw/2, y+fillH/2+4);
    ctx.textAlign='left';
  });

  // Y-axis labels
  ctx.fillStyle='#333'; ctx.font='8px IBM Plex Mono'; ctx.textAlign='right';
  [0,.25,.5,.75,1].forEach(f=>{
    const yv=yMin+(yMax-yMin)*f;
    const py=H-30-f*bh;
    ctx.fillText(yv.toFixed(2)+'%',36,py+3);
    ctx.strokeStyle='#111';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(40,py);ctx.lineTo(W,py);ctx.stroke();
  });
  ctx.textAlign='left';

  // Spread annotations
  const y2=tenors.find(x=>x.tenor==='2Y')?.yield??0;
  const y10=tenors.find(x=>x.tenor==='10Y')?.yield??0;
  const s=((y10-y2)*100).toFixed(1);
  const leg=document.getElementById('heat-legend'); if(!leg)return;
  leg.innerHTML=`
    <span style="color:var(--text-dim)">2s10s: <span style="color:${y10>y2?'var(--green)':'var(--red)'}">${y10>y2?'+':''}${s}bp</span></span>
    &nbsp;&nbsp;
    ${[-0.08,-0.04,0,0.04,0.08].map(v=>`<div class="heat-leg-item">
      <div class="heat-leg-swatch" style="background:${heatColor(v,-0.08,0.08)}"></div>
      <span style="color:var(--text-dim)">${v>0?'+':''}${(v*100).toFixed(0)}bp</span>
    </div>`).join('')}
    <span style="color:var(--text-dim);margin-left:4px">COLOR = 1D CHANGE</span>`;
}

// ── Shared heat color function ──
function heatColor(v, lo, hi){
  const t=Math.max(0,Math.min(1,(v-lo)/(hi-lo)));
  if(t<0.5){
    const f=t*2;
    const r=Math.round(160+60*f), g=Math.round(20+30*f), b=Math.round(20);
    return `rgb(${r},${g},${b})`;
  } else {
    const f=(t-0.5)*2;
    const r=Math.round(20+20*f), g=Math.round(80+100*f), b=Math.round(20+20*f);
    return `rgb(${r},${g},${b})`;
  }
}

function rSRCH(query){
  if(!query) return `<div class="no-match">NO QUERY</div>`;
  const q = query.toUpperCase();
  const corpus = buildSearchCorpus();
  const matches = corpus.filter(c=>{
    const k=c.key.toUpperCase(), l=c.label.toUpperCase();
    return k.startsWith(q)||l.includes(q)||k.includes(q);
  }).slice(0,30);
  if(!matches.length) return `<div class="no-match">◈ NO MATCH FOUND: <span style="color:var(--amber)">${query}</span></div>`;
  const grouped = {};
  matches.forEach(m=>{ (grouped[m.type]=grouped[m.type]||[]).push(m); });
  return Object.entries(grouped).map(([type,items])=>`
    <div class="sl">${type.toUpperCase()}</div>
    ${items.map(m=>`
      <div class="sr-row" onclick="(${m.action.toString()})();CW('SRCH_${q.replace(/[^A-Z0-9]/g,'_')}')">
        <div style="color:var(--amber)">${m.key}</div>
        <div>${m.label}</div>
        <div style="color:var(--text-dim)">${m.meta}</div>
      </div>`).join('')}
  `).join('');
}

// ── COMMAND HISTORY ──
const CMD_HISTORY = [];
let histIdx = -1;

function pushHistory(v){
  if(!v) return;
  // Deduplicate: remove if already exists, then push to front
  const i = CMD_HISTORY.indexOf(v);
  if(i !== -1) CMD_HISTORY.splice(i,1);
  CMD_HISTORY.unshift(v);
  if(CMD_HISTORY.length > 100) CMD_HISTORY.pop();
  histIdx = -1;
}

// ── AUTOCOMPLETE ENGINE ──
let acIdx = -1; // selected index in dropdown

function buildAcItems(raw){
  if(!raw || raw.length < 1) return [];
  const q = raw.toUpperCase().trim();
  const corpus = buildSearchCorpus();
  // Score: exact-start of key > exact-start of label > contains key > contains label
  const scored = corpus.map(c=>{
    const k=c.key.toUpperCase(), l=c.label.toUpperCase();
    let score = 0;
    if(k === q) score = 100;
    else if(k.startsWith(q)) score = 80 - k.length;
    else if(l.startsWith(q)) score = 60;
    else if(k.includes(q)) score = 40;
    else if(l.includes(q)) score = 20;
    return score > 0 ? {score, item:c} : null;
  }).filter(Boolean).sort((a,b)=>b.score-a.score);

  // Group by type, limit total to 12
  const seen = new Set();
  const result = [];
  const typeOrder = ['command','equity','bond','fx','cmdty','macro','filing'];
  for(const type of typeOrder){
    scored.filter(s=>s.item.type===type).slice(0,4).forEach(s=>{
      if(!seen.has(s.item.key) && result.length < 14){
        seen.add(s.item.key);
        result.push(s.item);
      }
    });
  }
  return result;
}

function renderAcDrop(items, inputEl){
  const drop = document.getElementById('ac-drop');
  if(!items.length){ drop.style.display='none'; acIdx=-1; return; }

  const rect = inputEl.closest('#cmdwrap').getBoundingClientRect();
  drop.style.left  = rect.left+'px';
  drop.style.top   = (rect.bottom+2)+'px';
  drop.style.width = Math.max(rect.width, 360)+'px';
  drop.style.display = 'block';
  acIdx = -1;

  // Group items by type for section headers
  let lastType = null;
  drop.innerHTML = items.map((item,i)=>{
    let sep = '';
    if(item.type !== lastType){
      sep = `<div class="ac-sep">${item.type.toUpperCase()}</div>`;
      lastType = item.type;
    }
    return sep + `<div class="ac-item" data-idx="${i}"
      onmouseenter="acHover(${i})"
      onclick="acSelect(${i})">
      <span class="ac-key">${item.key}</span>
      <span class="ac-label">${item.label}</span>
      <span class="ac-meta">${item.meta}</span>
      <span class="ac-badge ${item.type}">${item.type.toUpperCase()}</span>
    </div>`;
  }).join('');
  // Store items on drop for access
  drop._items = items;
}

function acHover(i){ acIdx=i; highlightAc(); }
function highlightAc(){
  document.querySelectorAll('.ac-item').forEach((el,i)=>{
    el.classList.toggle('ac-sel', i===acIdx);
  });
}
function hideAcDrop(){
  document.getElementById('ac-drop').style.display='none';
  acIdx=-1;
}
function acSelect(i){
  const drop = document.getElementById('ac-drop');
  const items = drop._items;
  if(!items||!items[i]) return;
  const item = items[i];
  pushHistory(item.key);
  hideAcDrop();
  document.getElementById('cmdbar').value='';
  document.getElementById('search-type-badge').className='';
  document.getElementById('search-type-badge').textContent='';
  item.action();
}

function updateTypeBadge(q){
  const badge = document.getElementById('search-type-badge');
  if(!q){ badge.className=''; badge.textContent=''; return; }
  const result = resolveQuery(q);
  if(!result){ badge.className=''; badge.textContent=''; return; }
  const typeLabels = {
    equity:'EQUITY', bond:'BOND', fx:'FX', macro:'MACRO',
    cmdty:'CMDTY', command:'CMD', filing:'FILING', ambiguous:'~MATCH',
    'no-match':'?'
  };
  badge.className = 't-'+(result.type==='no-match'?'ambiguous':result.type);
  badge.textContent = typeLabels[result.type]||result.type.toUpperCase();
}

});

document.getElementById('cmdbar').addEventListener('keydown', e=>{
  const drop = document.getElementById('ac-drop');
  const dropVisible = drop.style.display !== 'none';
  const items = drop._items || [];

  // ── Dropdown navigation ──
  if(dropVisible && (e.key==='ArrowDown'||e.key==='Tab'&&!e.shiftKey)){
    e.preventDefault();
    acIdx = Math.min(acIdx+1, items.length-1);
    highlightAc();
    return;
  }
  if(dropVisible && (e.key==='ArrowUp'&&acIdx>=0)){
    e.preventDefault();
    acIdx = Math.max(acIdx-1, -1);
    highlightAc();
    return;
  }
  if(dropVisible && e.key==='Enter' && acIdx >= 0){
    e.preventDefault();
    acSelect(acIdx);
    return;
  }
  if(e.key==='Escape'){
    if(dropVisible){ hideAcDrop(); return; }
    e.target.value='';
    document.getElementById('search-type-badge').className='';
    document.getElementById('search-type-badge').textContent='';
    e.target.blur();
    return;
  }

  // ── History navigation (when dropdown closed) ──
  if(!dropVisible && e.key==='ArrowUp'){
    e.preventDefault();
    if(histIdx < CMD_HISTORY.length-1){ histIdx++; e.target.value=CMD_HISTORY[histIdx]; updateTypeBadge(e.target.value); }
    return;
  }
  if(!dropVisible && e.key==='ArrowDown'){
    e.preventDefault();
    if(histIdx > 0){ histIdx--; e.target.value=CMD_HISTORY[histIdx]; updateTypeBadge(e.target.value); }
    else { histIdx=-1; e.target.value=''; updateTypeBadge(''); }
    return;
  }

  // ── Enter: resolve + dispatch ──
  if(e.key==='Enter'){
    const raw = e.target.value.trim();
    if(!raw) return;
    pushHistory(raw);
    hideAcDrop();
    e.target.value='';
    document.getElementById('search-type-badge').className='';
    document.getElementById('search-type-badge').textContent='';

    const result = resolveQuery(raw);
    if(!result || result.type==='no-match'){
      // Show no-match window
      const k = 'SRCH_NOMATCH';
      if(WR[k]) CW(k);
      OW('SRCH', raw); // will open SRCH panel showing "NO MATCH FOUND"
      // Retitle it
      setTimeout(()=>{
        const w=WR[k]||Object.values(WR).find(w=>w.querySelector('.wh-cmd')?.textContent==='SRCH');
        if(w) w.querySelector('.wh-title').textContent=`NO MATCH — ${raw.toUpperCase()}`;
      }, 20);
      return;
    }
    if(result.type==='ambiguous'){
      // Show search results window
      const k = 'SRCH_'+raw.replace(/[^A-Z0-9]/gi,'_').toUpperCase();
      if(WR[k]) CW(k);
      // We need to open a SRCH window with the query as extra
      const w=document.createElement('div');
      w.className='win';
      w.style.cssText=`left:${posX}px;top:${posY}px;z-index:${++zTop};width:560px;height:360px;`;
      posX=(posX+22)%(window.innerWidth-500);
      posY=(posY+22)%(window.innerHeight-300);
      w.innerHTML=`<div class="wh"><span class="wh-cmd">SRCH</span><span class="wh-title">RESULTS — ${raw.toUpperCase()}</span><span class="wh-ts">${getTs()}</span><div class="wh-close" onclick="CW('${k}')">✕</div></div>
        <div class="wb">${rSRCH(raw)}</div><div class="wr"></div>`;
      document.getElementById('workspace').appendChild(w);
      WR[k]=w; makeDrag(w); makeResize(w);
      w.addEventListener('mousedown',()=>{w.style.zIndex=++zTop});
      return;
    }
    // Single match — execute action directly
    result.entry.action();
  }
});

function arrangeAuto(){
  const keys=Object.keys(WR); const n=keys.length; if(!n)return;
  const cols=Math.ceil(Math.sqrt(n)); const rows=Math.ceil(n/cols);
  const W=window.innerWidth, H=window.innerHeight-46;
  const minW=360, minH=260;
  const cellW=Math.max(minW, Math.floor(W/cols)-6);
  const cellH=Math.max(minH, Math.floor(H/rows)-6);
  keys.forEach((k,i)=>{
    const c=i%cols, r=Math.floor(i/cols);
    const w=WR[k];
    w.style.left=(c*(W/cols))+'px'; w.style.top=(r*(H/rows))+'px';
    w.style.width=cellW+'px'; w.style.height=cellH+'px';
  });
}

function arrangeGrid(cols, rows){
  const keys=Object.keys(WR); if(!keys.length)return;
  const W=window.innerWidth, H=window.innerHeight-46;
  const cellW=Math.floor(W/cols)-6, cellH=Math.floor(H/rows)-6;
  keys.forEach((k,i)=>{
    const c=i%cols, r=Math.floor(i/rows);
    const w=WR[k];
    w.style.left=(c*Math.floor(W/cols))+'px';
    w.style.top=(r*Math.floor(H/rows))+'px';
    w.style.width=cellW+'px';
    w.style.height=cellH+'px';
  });
}

function arrangeSplit(leftRatio){
  const keys=Object.keys(WR); if(!keys.length)return;
  const W=window.innerWidth, H=window.innerHeight-46;
  const leftW=Math.floor(W*leftRatio)-6;
  const rightW=W-leftW-12;
  const rightH=Math.floor(H/Math.max(1,keys.length-1))-6;
  keys.forEach((k,i)=>{
    const w=WR[k];
    if(i===0){ w.style.left='0px'; w.style.top='0px'; w.style.width=leftW+'px'; w.style.height=(H-4)+'px'; }
    else{ w.style.left=(leftW+8)+'px'; w.style.top=((i-1)*(rightH+6))+'px'; w.style.width=rightW+'px'; w.style.height=rightH+'px'; }
  });
}

function arrangeMainStack(){
  const keys=Object.keys(WR); if(!keys.length)return;
  const W=window.innerWidth, H=window.innerHeight-46;
  const leftW=Math.floor(W*0.62)-4;
  const rightW=W-leftW-10;
  const stackCount=Math.max(1,keys.length-1);
  const stackH=Math.floor(H/stackCount)-6;
  keys.forEach((k,i)=>{
    const w=WR[k];
    if(i===0){ w.style.left='0px'; w.style.top='0px'; w.style.width=leftW+'px'; w.style.height=(H-4)+'px'; }
    else{ w.style.left=(leftW+6)+'px'; w.style.top=((i-1)*(stackH+6))+'px'; w.style.width=rightW+'px'; w.style.height=stackH+'px'; }
  });
}

function arrangeFocus(){
  const keys=Object.keys(WR); if(!keys.length)return;
  // Find topmost window
  let topKey=keys[0], topZ=-1;
  keys.forEach(k=>{ const z=parseInt(WR[k].style.zIndex)||0; if(z>topZ){topZ=z;topKey=k;} });
  const W=window.innerWidth, H=window.innerHeight-46;
  // Topmost fills workspace, others tucked behind
  keys.forEach((k,i)=>{
    const w=WR[k];
    if(k===topKey){ w.style.left='0px'; w.style.top='0px'; w.style.width=(W-4)+'px'; w.style.height=(H-4)+'px'; w.style.zIndex=++zTop; }
    else{ w.style.left=(20+i*16)+'px'; w.style.top=(20+i*16)+'px'; w.style.width='400px'; w.style.height='280px'; }
  });
}

function arrangeCascade(){
  const keys=Object.keys(WR); if(!keys.length)return;
  const baseW=Math.min(680, window.innerWidth*0.65);

    w.style.width=baseW+'px'; w.style.height=baseH+'px';

  });
}

    if(!m || !m.regularMarketPrice) throw new Error('no price');
    const price = m.regularMarketPrice;
    const prev  = m.chartPreviousClose || m.previousClose || price;
    return {sym, price, chg: price-prev, pct: (price-prev)/prev*100, name: m.shortName||sym};
  }catch(e){ return null; }
}

async function yfFetchHistory(sym, range, interval){
  try{
    // Auto-select interval if not provided
    if(!interval){
      const intervalMap = {
        '1d':'5m', '5d':'15m', '1mo':'1h', '3mo':'1d',
        '6mo':'1d', '1y':'1d', '2y':'1wk', '5y':'1wk', '10y':'1mo', 'max':'1mo'
      };
      interval = intervalMap[range] || '1d';
    }
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=${interval}&range=${range}&includePrePost=false`;
    const r = await proxyFetch(url, 14000);
    const d = await r.json();
    const res = d?.chart?.result?.[0];
    if(!res || !res.timestamp) throw new Error('no timeseries');
    return res;
  }catch(e){ return null; }
}


async function fetchYahooStrip(){
  const results=await Promise.allSettled(YF_SYMBOLS.strip.map(s=>yfFetch(s.sym)));
  results.forEach((r,i)=>{

    const cfg=YF_SYMBOLS.strip[i];
    const q=r.value;
    const el=document.getElementById(cfg.id);

async function buildTickerTape(){
  // fetch sequentially in small batches to avoid overwhelming the proxy
  const syms = YF_SYMBOLS.ticker;
  const valid = [];
  for(let i=0; i<syms.length; i+=4){
    const batch = syms.slice(i,i+4);
    const results = await Promise.allSettled(batch.map(s=>yfFetch(s)));
    results.forEach(r=>{ if(r.status==='fulfilled'&&r.value) valid.push(r.value); });
    if(i+4<syms.length) await new Promise(res=>setTimeout(res,500));
  }
  if(!valid.length) return;
  let html='';
  for(const q of valid){
    const up=q.chg>=0;
    const arrow=up?'▲':'▼';
    const cls=up?'ti-up':'ti-dn';
    const label=q.sym.replace('=X','').replace('-USD',' USD').replace('^','').replace('=F','');
    // Determine if this is an equity we can look up vs an index/commodity
    const isEquity = !q.sym.startsWith('^') && !q.sym.endsWith('=F') && !q.sym.endsWith('=X');
    const clickable = isEquity ? `style="cursor:pointer" onclick="OW('EQS');setTimeout(()=>fetchEQS('${q.sym}'),100)"` : '';
    html+=`<span class="ti" ${clickable}><span class="ti-sym" style="${isEquity?'color:var(--amber)':''}">${label}</span><span class="ti-px">${q.price.toFixed(q.price>100?1:3)}</span><span class="${cls}">${arrow}${Math.abs(q.pct).toFixed(2)}%</span></span><span class="ti-sep">|</span>`;
  }
  const inner=document.getElementById('ticker-inner');
  if(inner) inner.innerHTML=html+html; // duplicate for seamless loop
}

let _chartInstance=null;
let _chartVolInstance=null;
let _chartRange='1y';

function setChartRange(range,btn){
  _chartRange=range;
  document.querySelectorAll('#wb-CHART .tbtn[onclick*="setChartRange"]').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');

function setChartType(type,btn){

  document.querySelectorAll('#wb-CHART .tbtn[id^="chart-type"]').forEach(b=>b.classList.remove('active'));

function fmtChartDate(ts, range){
  const d = new Date(ts*1000);
  if(range==='1d'||range==='5d') return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
  if(range==='1mo'||range==='3mo') return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  if(range==='6mo'||range==='1y') return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return d.toLocaleDateString('en-US',{year:'2-digit',month:'short'});
}

async function loadChartData(){
  const input = document.getElementById('chart-sym-input');
  const sym   = (input ? input.value.trim().toUpperCase() : 'SPY') || 'SPY';
  const loader = document.getElementById('chart-loader');
  const label  = document.getElementById('chart-price-label');
  if(loader){ loader.style.display='flex'; loader.style.color='#3a3a3a'; loader.textContent='FETCHING '+sym+'…'; }
  if(label) label.textContent='';

  const res = await yfFetchHistory(sym, _chartRange);
  if(!res){
    if(loader){ loader.style.display='flex'; loader.style.color='var(--red)'; loader.textContent='ERROR — CHECK TICKER OR NETWORK'; }
    return;
  }
  _chartData = {res, sym};
  renderChartFromData(_chartData);
}

function renderChartFromData({res, sym}){
  const loader = document.getElementById('chart-loader');
  const label  = document.getElementById('chart-price-label');
  const statsBar = document.getElementById('chart-stats-bar');

  const ts      = res.timestamp;
  const q       = res.indicators.quote[0];
  const closes  = q.close;
  const opens   = q.open   || closes;
  const highs   = q.high   || closes;
  const lows    = q.low    || closes;
  const volumes = q.volume || [];
  const meta    = res.meta;

  const validCloses = closes.filter(Boolean);
  const lastPx      = meta.regularMarketPrice || validCloses.slice(-1)[0];
  const firstPx     = validCloses[0] || lastPx;
  const chgTotal    = ((lastPx - firstPx) / firstPx * 100).toFixed(2);
  const prevClose   = meta.chartPreviousClose || firstPx;
  const chg1D       = ((lastPx - prevClose) / prevClose * 100).toFixed(2);
  const up          = parseFloat(chg1D) >= 0;

  // Period high/low
  const periodHigh = Math.max(...highs.filter(Boolean));
  const periodLow  = Math.min(...lows.filter(Boolean));
  const avgVol     = volumes.filter(Boolean).reduce((a,b)=>a+b,0) / (volumes.filter(Boolean).length||1);

  if(label){
    label.innerHTML = `<span style="color:var(--amber);margin-right:8px">${sym}</span><span style="color:#e0e0e0">$${lastPx.toFixed(2)}</span><span class="${up?'up':'dn'}" style="margin-left:6px">${up?'▲':'▼'}${Math.abs(chg1D)}%</span>`;
  }
  if(statsBar){
    statsBar.innerHTML = [
      `<span>O <b style="color:#888">${opens[opens.length-1]?.toFixed(2)||'—'}</b></span>`,
      `<span>H <b style="color:var(--green)">${periodHigh.toFixed(2)}</b></span>`,
      `<span>L <b style="color:var(--red)">${periodLow.toFixed(2)}</b></span>`,
      `<span>C <b style="color:#e0e0e0">${lastPx.toFixed(2)}</b></span>`,
      `<span style="margin-left:8px">PERIOD CHG <b class="${parseFloat(chgTotal)>=0?'up':'dn'}">${parseFloat(chgTotal)>=0?'+':''}${chgTotal}%</b></span>`,
      `<span>AVG VOL <b style="color:#555">${avgVol>1e6?(avgVol/1e6).toFixed(1)+'M':avgVol>1e3?(avgVol/1e3).toFixed(0)+'K':avgVol.toFixed(0)}</b></span>`,
      `<span>52W H <b style="color:var(--green)">${meta.fiftyTwoWeekHigh?'$'+meta.fiftyTwoWeekHigh.toFixed(2):'—'}</b></span>`,
      `<span>52W L <b style="color:var(--red)">${meta.fiftyTwoWeekLow?'$'+meta.fiftyTwoWeekLow.toFixed(2):'—'}</b></span>`,
    ].join('');
  }

  const labels = ts.map(t=>fmtChartDate(t, _chartRange));

  const ctx = document.getElementById('chart-canvas');
  if(!ctx) return;

  if(_chartInstance){ _chartInstance.destroy(); _chartInstance=null; }

  const ctxCtx = ctx.getContext('2d');
  const grad   = ctxCtx.createLinearGradient(0,0,0,ctx.clientHeight||300);
  const base   = up ? '0,200,83' : '229,57,53';
  grad.addColorStop(0,`rgba(${base},0.18)`);
  grad.addColorStop(1,`rgba(${base},0.01)`);

  if(_chartType==='line'){
    _chartInstance = new Chart(ctx, {
      type:'line',
      data:{
        labels,
        datasets:[{
          data: closes.map(v=>v??null),
          borderColor: up?'#00c853':'#e53935',
          borderWidth:1.5,
          backgroundColor: grad,
          fill:true, tension:0.05,
          pointRadius:0, pointHoverRadius:4,
          pointHoverBackgroundColor: up?'#00c853':'#e53935',
          spanGaps:true,
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        animation:{duration:300},
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{display:false},
          tooltip:{
            backgroundColor:'#0a0a0a',borderColor:'#222',borderWidth:1,
            titleColor:'#666',bodyColor:'#e0e0e0',
            titleFont:{family:'IBM Plex Mono',size:9},
            bodyFont:{family:'IBM Plex Mono',size:11},
            callbacks:{
              title:items=>labels[items[0].dataIndex],
              label:c=>{
                const i=c.dataIndex;
                const parts=[`  C $${c.parsed.y!=null?c.parsed.y.toFixed(2):'—'}`];
                if(opens[i]) parts.push(`  O $${opens[i].toFixed(2)}`);
                if(highs[i]) parts.push(`  H $${highs[i].toFixed(2)}`);
                if(lows[i])  parts.push(`  L $${lows[i].toFixed(2)}`);
                if(volumes[i]) parts.push(`  V ${volumes[i]>1e6?(volumes[i]/1e6).toFixed(1)+'M':(volumes[i]/1e3).toFixed(0)+'K'}`);
                return parts;
              }
            }
          }
        },
        scales:{
          x:{grid:{color:'rgba(255,255,255,0.02)'},ticks:{color:'#2a2a2a',font:{family:'IBM Plex Mono',size:9},maxTicksLimit:10,maxRotation:0},border:{color:'#111'}},
          y:{position:'right',grid:{color:'rgba(255,255,255,0.02)'},ticks:{color:'#2a2a2a',font:{family:'IBM Plex Mono',size:9},callback:v=>'$'+v.toFixed(v>100?0:2)},border:{color:'#111'}}
        }
      }
    });
  } else {
    // OHLC bars drawn on raw canvas (Chart.js doesn't have OHLC natively)
    drawOHLCCanvas(ctx, ts, opens, highs, lows, closes, labels, up);
  }

  // Volume chart
  drawVolumeChart(volumes, ts, labels, up);

  // Crosshair mousemove
  if(_chartType==='line' && _chartInstance){
    ctx.onmousemove = e => {
      const bar = document.getElementById('chart-crosshair-bar'); if(!bar) return;
      const pts = _chartInstance.getElementsAtEventForMode(e,'index',{intersect:false},true);
      if(pts.length){
        const i = pts[0].index;
        const v = closes[i]; const h=highs[i]; const l=lows[i]; const vol=volumes[i];
        bar.innerHTML = `<span style="color:var(--amber)">${labels[i]}</span>` +
          (v?`<span>C <b style="color:#e0e0e0">$${v.toFixed(2)}</b></span>`:'') +
          (h?`<span>H <b style="color:var(--green)">$${h.toFixed(2)}</b></span>`:'') +
          (l?`<span>L <b style="color:var(--red)">$${l.toFixed(2)}</b></span>`:'') +
          (vol?`<span>V <b style="color:#444">${vol>1e6?(vol/1e6).toFixed(1)+'M':(vol/1e3).toFixed(0)+'K'}</b></span>`:'');
      } else bar.innerHTML='';
    };
    ctx.onmouseleave = ()=>{ const b=document.getElementById('chart-crosshair-bar'); if(b) b.innerHTML=''; };
  }

  if(loader) loader.style.display='none';
}

function drawOHLCCanvas(canvas, timestamps, opens, highs, lows, closes, labels, up){
  if(_chartInstance){ _chartInstance.destroy(); _chartInstance=null; }
  const W = canvas.parentElement.offsetWidth||600;
  const H = canvas.parentElement.offsetHeight||300;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  const validI = closes.map((c,i)=>c!=null?i:-1).filter(i=>i>=0);
  if(!validI.length) return;
  const allH = validI.map(i=>highs[i]||closes[i]);
  const allL = validI.map(i=>lows[i]||closes[i]);
  const mn=Math.min(...allL)*0.999, mx=Math.max(...allH)*1.001;
  const pad={l:48,r:6,t:10,b:18};
  const pw=W-pad.l-pad.r, ph=H-pad.t-pad.b;
  const n=validI.length;
  const bw=Math.max(1,Math.floor(pw/n)-1);
  const xp=k=>pad.l+(k/n)*pw+bw/2;
  const yp=v=>pad.t+(1-(v-mn)/(mx-mn))*ph;

  // Grid
  for(let gi=0;gi<=4;gi++){
    const v=mn+(mx-mn)*(gi/4);
    ctx.strokeStyle='#0d0d0d'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.l,yp(v)); ctx.lineTo(W-pad.r,yp(v)); ctx.stroke();
    ctx.fillStyle='#2a2a2a'; ctx.font='8px IBM Plex Mono'; ctx.textAlign='right';
    ctx.fillText('$'+v.toFixed(v>100?0:2),pad.l-2,yp(v)+3);
  }

  // OHLC bars
  validI.forEach((i,k)=>{
    const o=opens[i]||closes[i], h=highs[i]||closes[i], l=lows[i]||closes[i], c=closes[i];
    const isUp=c>=o;
    const col=isUp?'#00c853':'#e53935';
    const x=xp(k);
    ctx.strokeStyle=col; ctx.lineWidth=1;
    // Wick
    ctx.beginPath(); ctx.moveTo(x,yp(h)); ctx.lineTo(x,yp(l)); ctx.stroke();
    // Body
    const bodyTop=yp(Math.max(o,c)), bodyBot=yp(Math.min(o,c));
    const bodyH=Math.max(1,bodyBot-bodyTop);
    ctx.fillStyle=isUp?'rgba(0,200,83,0.7)':'rgba(229,57,53,0.7)';
    ctx.fillRect(x-bw/2,bodyTop,bw,bodyH);
  });

  // X axis labels
  const step=Math.max(1,Math.floor(n/10));
  validI.forEach((i,k)=>{
    if(k%step===0){
      ctx.fillStyle='#2a2a2a'; ctx.font='8px IBM Plex Mono'; ctx.textAlign='center';
      ctx.fillText(labels[i],xp(k),H-pad.b+12);
    }
  });

  // Crosshair on hover
  canvas.onmousemove=e=>{
    const rect=canvas.getBoundingClientRect();
    const mx2=e.clientX-rect.left;
    const k=Math.round((mx2-pad.l-bw/2)/pw*n);
    if(k<0||k>=validI.length) return;
    const i=validI[k];
    const bar=document.getElementById('chart-crosshair-bar'); if(!bar) return;
    const o=opens[i],h=highs[i],l=lows[i],c=closes[i],v=volumes[i];
    bar.innerHTML=`<span style="color:var(--amber)">${labels[i]}</span>`+
      (o?`<span>O <b style="color:#888">$${o.toFixed(2)}</b></span>`:'')+
      (h?`<span>H <b style="color:var(--green)">$${h.toFixed(2)}</b></span>`:'')+
      (l?`<span>L <b style="color:var(--red)">$${l.toFixed(2)}</b></span>`:'')+
      (c?`<span>C <b style="color:#e0e0e0">$${c.toFixed(2)}</b></span>`:'')+
      (v?`<span>V <b style="color:#444">${v>1e6?(v/1e6).toFixed(1)+'M':(v/1e3).toFixed(0)+'K'}</b></span>`:'');
  };
  canvas.onmouseleave=()=>{const b=document.getElementById('chart-crosshair-bar');if(b)b.innerHTML='';};
}

function drawVolumeChart(volumes, timestamps, labels, up){
  const canvas=document.getElementById('chart-vol-canvas'); if(!canvas) return;
  const W=canvas.parentElement.offsetWidth||600;
  const H=canvas.parentElement.offsetHeight||50;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const validVols=volumes.filter(Boolean);
  if(!validVols.length) return;
  const maxV=Math.max(...validVols);
  const n=volumes.length;
  const bw=Math.max(1,Math.floor((W-40)/n)-1);
  const pad={l:40,r:4,t:4,b:2};
  const pw=W-pad.l-pad.r, ph=H-pad.t-pad.b;
  volumes.forEach((v,i)=>{
    if(!v) return;
    const x=pad.l+(i/n)*pw;
    const h=Math.max(1,(v/maxV)*ph);
    ctx.fillStyle=up?'rgba(0,200,83,0.35)':'rgba(229,57,53,0.35)';
    ctx.fillRect(x,H-pad.b-h,bw,h);
  });
  // Max volume label
  ctx.fillStyle='#1a1a1a'; ctx.font='8px IBM Plex Mono'; ctx.textAlign='right';
  ctx.fillText(maxV>1e6?(maxV/1e6).toFixed(0)+'M':(maxV/1e3).toFixed(0)+'K',38,pad.t+10);
}

    const w=document.createElement('div');
    w.className='win';
    w.style.cssText='left:80px;top:60px;z-index:9999;width:520px;height:240px;';
    w.innerHTML=`<div class="wh"><span class="wh-cmd">DIAG</span><span class="wh-title">NETWORK CONNECTIVITY TEST</span><span class="wh-ts"></span><div class="wh-close" onclick="CW('${diagKey}')">✕</div></div><div class="wb" id="wb-${diagKey}" style="font-size:11px;line-height:2"></div><div class="wr"></div>`;
    document.getElementById('workspace').appendChild(w);
    WR[diagKey]=w; makeDrag(w); makeResize(w);
    w.addEventListener('mousedown',()=>{w.style.zIndex=++zTop});
    const body=document.getElementById('wb-'+diagKey);
    let rows='';
    for(const t of tests){
      body.innerHTML=rows+`<div><span style="color:#3a2a00">⟳ ${t.name}...</span></div>`;
      try{ const res=await t.fn(); rows+=`<div><span style="color:var(--green)">✓</span> <span style="color:#666">${t.name}</span> — <span style="color:#3a5a3a">${res}</span></div>`; }
      catch(e){ rows+=`<div><span style="color:var(--red)">✗</span> <span style="color:#666">${t.name}</span> — <span style="color:#5a2a2a">${e.message}</span></div>`; }
      body.innerHTML=rows;
    }
    body.innerHTML=rows+'<div style="margin-top:8px;color:#2a2a2a;font-size:9px;letter-spacing:1px">✓ = LIVE DATA AVAILABLE &nbsp;|&nbsp; ✗ = SOURCE UNAVAILABLE FROM YOUR NETWORK</div>';
  }

  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js';
  s.onload=()=>{
    // Run DIAG first, then poll after it finishes (avoid proxy contention)
    setTimeout(async ()=>{
      await runNetworkTest();
      await pollAllUpgraded();
      buildTickerTape();
    }, 600);
    // Regular polling every 60s
    setInterval(pollAllUpgraded,60000);
    setInterval(buildTickerTape,120000);
    // Live clock — updates every second
    setInterval(()=>{
      const el = document.getElementById('home-clock');
      if(el){
        const now = new Date();
        el.textContent = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false,timeZone:'America/Denver'})+' MT';
      }
    }, 1000);
  };
  document.head.appendChild(s);
});

</script>
</body>
</html>
